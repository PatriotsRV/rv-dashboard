<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRVS — New RO DB Tester (Sidebar Layout)</title>
<!-- ============================================================
     SIDEBAR LAYOUT LAUNCHER — v1.0 (S152, 2026-07-21)
     Replaces the v0.7 read-only design mockup that previously lived at
     this path (preserved at git tag sidebar-mockup-v0.7). Per Roland's
     S152 deploy decisions: the sidebar tester ships on its OWN PAGE with
     ONE codebase — this page just sets localStorage prvs_layout='sidebar'
     and forwards to index.html, where js/layout.js + css/sidebar-layout.css
     render the sidebar layout around the real, fully-functional dashboard.
     Return path: the ↩ Classic View button in the sidebar footer (sets
     prvs_layout='classic' and reloads).
     Links are RELATIVE (./index.html) — GitHub Pages project path;
     root-relative would 404 (S146 gotcha).
     ============================================================ -->
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center;
    justify-content: center; background: #0d1117; color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .card { text-align: center; padding: 32px; }
  .card h1 { font-size: 1.1rem; font-weight: 700; color: #93c5fd; margin: 0 0 8px; }
  .card p { font-size: 0.85rem; color: #8b949e; margin: 0 0 16px; }
  .card a { color: #58a6ff; font-size: 0.8rem; }
</style>
</head>
<body>
<div class="card">
  <h1>🧪 Opening the New RO DB Tester…</h1>
  <p>Switching to the sidebar layout. Use <strong>↩ Classic View</strong> (bottom of the sidebar) to switch back.</p>
  <a href="./index.html">Click here if you are not redirected.</a>
</div>
<script>
  try { localStorage.setItem('prvs_layout', 'sidebar'); } catch (e) {}
  // location.replace keeps this launcher out of the Back-button history.
  location.replace('./index.html');
</script>
</body>
</html>
