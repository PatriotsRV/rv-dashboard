// S2 — Role-based access (replaces hardcoded email arrays)
let userRoles = [];

async function loadUserRoles() {
    if (!supabaseSession) return;
    try {
        const email = supabaseSession.user.email;
        const { data: userRecord } = await getSB()
            .from('users')
            .select('id')
            .eq('email', email)
            .maybeSingle();
        if (!userRecord) return;
        const { data: roleData } = await getSB()
            .from('user_roles')
            .select('roles(name)')
            .eq('user_id', userRecord.id);
        if (roleData) {
            userRoles = roleData.map(r => r.roles?.name).filter(Boolean);
        }
        // Merge staff table role
        try {
            const { data: staffRecord } = await getSB()
                .from('staff')
                .select('role, service_silo, active')
                .eq('email', email)
                .single();
            if (staffRecord && staffRecord.active) {
                const staffRoleMap = { 'sr_manager': 'Sr Manager', 'manager': 'Manager', 'parts_manager': 'Manager', 'tech': 'Tech' };
                const mapped = staffRoleMap[staffRecord.role];
                if (mapped && !userRoles.includes(mapped)) userRoles.push(mapped);
            }
        } catch (e) { /* non-critical */ }
    } catch (e) {
        warn('Could not load roles:', e);
    }
}

function getSB() {
    if (!_sb) {
        _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true, autoRefreshToken: true, storageKey: 'prvs_report_auth' }
        });
    }
    return _sb;
}

// ── Auth ─────────────────────────────────────────────────
async function initAuth() {
    // Try restoring session
    getSB().auth.onAuthStateChange((event, session) => {
        if (event === 'TOKEN_REFRESHED' || event === 'SIGNED_IN') {
            supabaseSession = session;
        } else if (event === 'SIGNED_OUT') {
            supabaseSession = null;
            currentUser = null;
        }
    });

    const { data: { session } } = await getSB().auth.getSession();
    if (session) {
        supabaseSession = session;
        currentUser = {
            email: session.user.email,
            name: session.user.user_metadata?.full_name || session.user.email,
        };
        await loadUserRoles();
        if (isAdmin()) {
            showApp();
            return;
        }
    }

    // Also check stored identity (only useful if we have a session for role lookup)
    const stored = localStorage.getItem('prvs_user_identity');
    if (stored && supabaseSession) {
        try {
            const parsed = JSON.parse(stored);
            if (parsed.email) {
                currentUser = { email: parsed.email, name: parsed.name };
                await loadUserRoles();
                if (isAdmin()) {
                    showApp();
                    return;
                }
            }
        } catch(e) {}
    }

    // Show Google sign-in
    showGoogleSignIn();
}

function isAdmin() {
    return userRoles.includes('Admin');
}

function showGoogleSignIn() {
    const nonce = Array.from(crypto.getRandomValues(new Uint8Array(16)))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    crypto.subtle.digest('SHA-256', new TextEncoder().encode(nonce)).then(buf => {
        const hashedNonce = Array.from(new Uint8Array(buf))
            .map(b => b.toString(16).padStart(2, '0')).join('');
        localStorage.setItem('prvs_report_nonce', nonce);

        google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            nonce: hashedNonce,
            callback: handleGoogleSignIn,
            auto_select: true,
        });
        google.accounts.id.prompt();
        google.accounts.id.renderButton(document.getElementById('g_id_onload'), {
            theme: 'filled_blue', size: 'large', text: 'signin_with', shape: 'pill'
        });
    });
}

async function handleGoogleSignIn(response) {
    if (!response.credential) return;
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    currentUser = { email: payload.email, name: payload.name };

    // Exchange for Supabase session first (needed for role lookup)
    try {
        const rawNonce = localStorage.getItem('prvs_report_nonce');
        const { data, error } = await getSB().auth.signInWithIdToken({
            provider: 'google', token: response.credential, nonce: rawNonce,
        });
        if (!error && data.session) supabaseSession = data.session;
        localStorage.removeItem('prvs_report_nonce');
    } catch(e) { warn('Supabase auth exchange failed:', e); }

    await loadUserRoles();

    if (!isAdmin()) {
        document.getElementById('authGate').innerHTML =
            '<div style="text-align:center;padding:60px;"><h2 style="color:#ef4444;">Access Denied</h2><p style="color:#94a3b8;margin-top:8px;">This report is restricted to Admins only.</p></div>';
        return;
    }

    showApp();
}

function showApp() {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('app').style.display = '';
    document.getElementById('userBadge').textContent = currentUser?.name || 'Admin';
    loadAllData();
    startAutoRefresh();
}

// ── Auto-refresh ─────────────────────────────────────────
function startAutoRefresh() {
    if (_refreshTimer) clearInterval(_refreshTimer);
    _countdownSec = 180;
    _refreshTimer = setInterval(() => {
        _countdownSec--;
        const m = Math.floor(_countdownSec / 60);
        const s = _countdownSec % 60;
        const el = document.getElementById('refreshCountdown');
        if (el) el.textContent = `Next refresh: ${m}:${s.toString().padStart(2, '0')}`;
        if (_countdownSec <= 0) {
            _countdownSec = 180;
            loadAllData();
        }
    }, 1000);
}

// ── Data Loading ─────────────────────────────────────────
async function loadAllData() {
    _countdownSec = 180;
    const body = document.getElementById('reportBody');
    body.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Loading work lists...</div></div>';

    try {
        // 1. Load ALL work list entries
        const { data: workLists, error: wlErr } = await getSB()
            .from('manager_work_lists')
            .select('*')
            .order('manager_email').order('priority', { ascending: true });
        if (wlErr) throw wlErr;
        _allWorkLists = workLists || [];

        // 2. Load all active staff (for tech tiles)
        const { data: staff, error: stErr } = await getSB()
            .from('staff')
            .select('*')
            .eq('active', true)
            .order('name');
        if (stErr) throw stErr;
        _allStaff = staff || [];

        // 3. Load ALL currently active clock-ins (clock_out IS NULL) — for tech tiles
        const { data: activeClocks, error: acErr } = await getSB()
            .from('time_logs')
            .select('*, repair_orders(ro_id, customer_name, rv, is_training)')
            .is('clock_out', null)
            .order('clock_in', { ascending: false });
        if (acErr) throw acErr;
        _allActiveClockIns = activeClocks || [];

        // 3b. Load ALL time logs for today (completed + active) — for tech tile expand
        const todayStart = new Date();
        todayStart.setHours(0, 0, 0, 0);
        const { data: todayLogs, error: tlTodayErr } = await getSB()
            .from('time_logs')
            .select('*, repair_orders(ro_id, customer_name, rv, is_training)')
            .gte('clock_in', todayStart.toISOString())
            .order('clock_in', { ascending: true });
        if (tlTodayErr) throw tlTodayErr;
        _allTodayTimeLogs = todayLogs || [];

        // 3c. v1.7 / v1.9 — Load auto-closed sessions from the last 14 days for the Staff Status audit.
        //     Close reasons we care about:
        //       'auto_eod_5pm'       — new M-F 5 PM cron (Session 53, 2026-04-21) — shown orange
        //       'auto_eod_8h_recalc' — retroactively rewritten from the old 12h cap — shown gray (data-corrected)
        //       'auto_eod'           — legacy 12h cap (deprecated; rows still exist for any not yet rewritten)
        //     LIKE 'auto_%' catches all three, and the renderer colors them differently.
        const fourteenDaysAgo = new Date();
        fourteenDaysAgo.setDate(fourteenDaysAgo.getDate() - 14);
        const { data: autoClosed, error: acAuditErr } = await getSB()
            .from('time_logs')
            .select('*, repair_orders(ro_id, customer_name, rv, is_training)')
            .like('close_reason', 'auto_%')
            .gte('clock_out', fourteenDaysAgo.toISOString())
            .order('clock_out', { ascending: false });
        if (acAuditErr) throw acAuditErr;
        _allAutoClosed = autoClosed || [];

        // 4. Collect unique RO UUIDs from work lists
        const roIds = [...new Set(_allWorkLists.map(w => w.ro_id).filter(Boolean))];

        if (roIds.length === 0) {
            _allROs = [];
            _allTimeLogs = [];
            renderReport();
            return;
        }

        // 5. Load RO data for those UUIDs
        //    v1.5 — added is_training + urgency to the SELECT.
        const { data: ros, error: roErr } = await getSB()
            .from('repair_orders')
            .select('id, ro_id, customer_name, rv, repair_type, status, urgency, date_received, date_arrived, dollar_value, parking_spot, is_training')
            .in('id', roIds);
        if (roErr) throw roErr;
        _allROs = ros || [];

        // 6. Load time logs for those ROs (for work list detail)
        //    v1.10 — service_type explicit in SELECT (was implicit via *, but locking
        //    it in here makes the per-silo split feature obvious to future maintainers).
        const { data: logs, error: tlErr } = await getSB()
            .from('time_logs')
            .select('*')
            .in('ro_id', roIds)
            .order('clock_in', { ascending: false });
        if (tlErr) throw tlErr;
        _allTimeLogs = logs || [];

        // 6b. v1.10 — Load last 7 days of time_logs for ALL techs (cross-RO).
        //     Used by Staff Status weekly mini-bars + per-tech-day drill-down modal.
        //     Independent of work list ROs — captures techs working on ROs that
        //     are no longer on any active work list (e.g., closed mid-week).
        const sevenDaysAgo = new Date();
        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
        const { data: weekLogs, error: weekErr } = await getSB()
            .from('time_logs')
            .select('*, repair_orders(ro_id, customer_name, rv, is_training)')
            .gte('clock_in', sevenDaysAgo.toISOString())
            .order('clock_in', { ascending: true });
        if (weekErr) throw weekErr;
        _allWeekTimeLogs = weekLogs || [];

        // 7. v1.5 — Apply report exclusions (testers + training ROs).
        //    Must run after staff + ROs are loaded so both lookups are populated.
        applyReportExclusions();

        renderReport();
    } catch (err) {
        console.error('[Report] load error:', err);
        body.innerHTML = `<div class="empty-state" style="color:#ef4444;">Error loading data: ${err.message || err}</div>`;
    }
}

// ── v1.3 Labor Cost Analytics ────────────────────────────
// Rate source: staff.hourly_rate (NUMERIC, seeded via add_staff_hourly_rate.sql).
// Lookup key: lowercased tech email (with user_id fallback).
// Active logs count against Date.now(). Missing rate → 0 (excluded from totals).
function buildRateByEmail() {
    const map = {};
    _allStaff.forEach(s => {
        const em = (s.email || '').toLowerCase();
        if (em) map[em] = Number(s.hourly_rate) || 0;
    });
    return map;
}

// v1.8 — Regular managers (Manager role, not Sr Manager) don't set
// manager_work_lists.service_silo — that column is only populated by Sr Managers
// via the silo tab picker in index.html. Result: Jason/Mauricio/Andrew/Riley's
// work list rows were silently dropped from buildSiloLanes(), so the Labor Load
// chart and Per-Silo Active Work List showed nothing for them.
// Fix: fall back to staff.service_silo by manager_email. parts_insurance is
// intentionally excluded (not a service silo in SERVICE_SILOS) — Bobby/Brandon's
// work list ROs won't bucket into any silo lane until we expand the report to
// include parts/insurance labor later.
function buildManagerSiloByEmail() {
    const map = {};
    _allStaff.forEach(s => {
        const em = (s.email || '').toLowerCase();
        const silo = s.service_silo;
        if (!em || !silo) return;
        if (!SILO_MAP[silo]) return; // skip parts_insurance and any non-service silo
        map[em] = silo;
    });
    return map;
}

function logHours(l) {
    if (!l || !l.clock_in) return 0;
    const end = l.clock_out ? new Date(l.clock_out).getTime() : Date.now();
    const start = new Date(l.clock_in).getTime();
    const h = (end - start) / 3600000;
    return h > 0 ? h : 0;
}

function logCost(l, rateByEmail) {
    const em = ((l.tech_email || l.user_id || '') + '').toLowerCase();
    const rate = rateByEmail[em] || 0;
    return logHours(l) * rate;
}

// Returns { byRO: { [ro_uuid]: { hours, cost } }, total: { hours, cost } }
function buildLaborStats(rateByEmail) {
    const byRO = {};
    let totalHours = 0, totalCost = 0;
    _allTimeLogs.forEach(l => {
        const id = l.ro_id;
        if (!id) return;
        const h = logHours(l);
        const c = logCost(l, rateByEmail);
        if (!byRO[id]) byRO[id] = { hours: 0, cost: 0 };
        byRO[id].hours += h;
        byRO[id].cost  += c;
        totalHours += h;
        totalCost  += c;
    });
    return { byRO, total: { hours: totalHours, cost: totalCost } };
}

/** v1.10 — per-(RO, silo) labor split with per-tech breakdown.
 *  Returns: { [ro_uuid]: { [silo_key]: { hours, cost, perTech: { [email]: { techEmail, hours, cost } } } } }
 *
 *  How the split works:
 *    A time_log is attributed to silo(s) returned by getSilosForLog(). When that
 *    list has > 1 entry, the duration and cost are EVENLY SPLIT across the silos
 *    (e.g. 4h on a "Roof, Awnings" log → 2h Roof + 2h Awnings). In practice every
 *    real row has exactly one silo (checkin.html selectedService is singular), so
 *    the split is a no-op the vast majority of the time. Defensive code only.
 *
 *  Logs with empty silo list (NULL service_type, 'Shop', or unknown value) do NOT
 *  appear in this map — they still flow through buildLaborStats() into the RO
 *  total, manager total, and grand total, but they aren't shown in any per-silo
 *  lane / silo subtotal / silo-context labor chip. That means the sum of
 *  per-silo labor for an RO will sometimes be LESS than the RO's full labor —
 *  and that's the correct signal: those hours weren't tagged to a service.
 */
function buildLaborByROSilo(rateByEmail) {
    const out = {};
    _allTimeLogs.forEach(l => {
        const id = l.ro_id;
        if (!id) return;
        const silos = getSilosForLog(l);
        if (silos.length === 0) return;
        const h = logHours(l);
        const c = logCost(l, rateByEmail);
        const splitH = h / silos.length;
        const splitC = c / silos.length;
        const em = ((l.tech_email || l.user_id || '') + '').toLowerCase();
        silos.forEach(silo => {
            if (!out[id]) out[id] = {};
            if (!out[id][silo]) out[id][silo] = { hours: 0, cost: 0, perTech: {} };
            const bucket = out[id][silo];
            bucket.hours += splitH;
            bucket.cost  += splitC;
            if (!bucket.perTech[em]) bucket.perTech[em] = { techEmail: em, hours: 0, cost: 0 };
            bucket.perTech[em].hours += splitH;
            bucket.perTech[em].cost  += splitC;
        });
    });
    return out;
}

/** v1.10 — pull the silo-specific labor for one (RO, silo) pair, with safe defaults.
 *  Returns { hours, cost, perTechSorted } where perTechSorted is per-tech entries
 *  sorted by cost descending (ready for the chart bar's stacked segments). */
function getSiloLaborForRO(laborByROSilo, roId, siloKey) {
    const bucket = laborByROSilo && laborByROSilo[roId] && laborByROSilo[roId][siloKey];
    if (!bucket) return { hours: 0, cost: 0, perTechSorted: [] };
    const perTechSorted = Object.values(bucket.perTech || {})
        .sort((a, b) => b.cost - a.cost);
    return { hours: bucket.hours || 0, cost: bucket.cost || 0, perTechSorted };
}

// Format as USD with no cents, thousands separators.
function fmtUsd(n) {
    const v = Math.round(Number(n) || 0);
    return '$' + v.toLocaleString('en-US');
}

// v1.5 — Applied once per load cycle in loadAllData() after staff + ROs land.
// Mutates _allWorkLists, _allROs, _allTimeLogs, _allActiveClockIns, _allTodayTimeLogs
// to drop anything pointing at a training RO OR logged by a tester.
// Leaves _allStaff intact so rate lookups by email still work (all testers at $0
// are a no-op for rate anyway).
function applyReportExclusions() {
    // Build exclusion sets up front (one O(n) pass each).
    const trainingRoIds = new Set(
        (_allROs || []).filter(r => r && r.is_training === true).map(r => r.id)
    );
    const testerEmails = new Set(
        (_allStaff || [])
            .filter(s => s && Number(s.hourly_rate || 0) === 0)
            .map(s => (s.email || '').toLowerCase())
            .filter(Boolean)
    );

    const isTrainingRO = (roId) => !!roId && trainingRoIds.has(roId);
    // For logs joined with repair_orders, log.repair_orders?.is_training is the direct signal
    // (handles ROs that weren't in _allROs because they're not on any tracked work list).
    const logIsTraining = (l) =>
        (l.repair_orders && l.repair_orders.is_training === true) || isTrainingRO(l.ro_id);
    const logIsTester = (l) =>
        testerEmails.has(((l.tech_email || l.user_id || '') + '').toLowerCase());

    _allROs = _allROs.filter(r => !r.is_training);
    _allWorkLists = _allWorkLists.filter(w => !isTrainingRO(w.ro_id));
    _allTimeLogs = _allTimeLogs.filter(l => !logIsTester(l) && !isTrainingRO(l.ro_id));
    _allActiveClockIns = _allActiveClockIns.filter(l => !logIsTester(l) && !logIsTraining(l));
    _allTodayTimeLogs  = _allTodayTimeLogs.filter(l => !logIsTester(l) && !logIsTraining(l));
    // v1.7 — same exclusion rules for the auto-close audit feed
    _allAutoClosed     = _allAutoClosed.filter(l => !logIsTester(l) && !logIsTraining(l));
    // v1.10 — also drop testers + training-RO logs from the week-wide drill-down feed
    _allWeekTimeLogs   = _allWeekTimeLogs.filter(l => !logIsTester(l) && !logIsTraining(l));
}

// ── v1.4 Labor Load Chart ────────────────────────────────
// Deterministic tech color: hash email → HSL so same tech gets same color
// across every bar. Hue avoids the urgency palette (reds/oranges/yellows/greens
// between 330–150) by picking from 170–330 (cyan→purple→magenta band).
function techColor(email) {
    const s = (email || '').toLowerCase();
    let h = 0;
    for (let i = 0; i < s.length; i++) {
        h = ((h << 5) - h) + s.charCodeAt(i);
        h |= 0;
    }
    const hue = 170 + (Math.abs(h) % 160); // 170..330
    return `hsl(${hue}, 55%, 52%)`;
}

// Pretty tech name from email ("mauricio.tellez@…" → "Mauricio Tellez").
function techDisplayName(email, staffMap) {
    const em = (email || '').toLowerCase();
    if (staffMap && staffMap[em] && staffMap[em].name) return staffMap[em].name;
    const local = em.split('@')[0];
    return local.replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// v1.10 — buildPerTechByRO removed. Replaced by buildLaborByROSilo (which
// includes a per-tech sub-breakdown PER silo, not just per RO). The Labor Load
// chart's per-tech bar segments now read from getSiloLaborForRO(...).perTechSorted
// inside buildSiloLanes — narrower scope, correct stacking for the per-silo split.

// Escape HTML for tooltip titles.
function escAttr(s) {
    return (s == null ? '' : String(s))
        .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
        .replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Map status → urgency CSS class. ro.urgency is the canonical field;
// fall back to status-based heuristic if missing.
function urgencyClass(ro) {
    const u = (ro.urgency || '').toLowerCase();
    if (u.includes('critical')) return 'urg-critical';
    if (u.includes('high'))     return 'urg-high';
    if (u.includes('medium'))   return 'urg-medium';
    if (u.includes('low'))      return 'urg-low';
    return '';
}

// Build { [silo_key]: [{ro, laborCost, laborHours, perTech, daysOnLot, roLaborCost, roLaborHours}, ...] }.
// An RO on multiple silo lists appears in each lane (per-silo manager decision).
// Sorted labor-cost desc within each silo.
// v1.8 — `managerSiloByEmail` is used as a NULL fallback: regular managers' work
// list rows have service_silo=NULL (only Sr Managers populate it), so we resolve
// their silo via staff.service_silo. See buildManagerSiloByEmail() comment.
// v1.10 — `laborByROSilo` is the per-(RO, silo) split. Each bar's laborCost /
// laborHours / perTech are now silo-specific (e.g. only Roof hours in the Roof
// lane), not the whole RO's totals. The full-RO totals are kept on the same
// object as `roLaborCost` / `roLaborHours` so the bar tooltip and the RO-value
// reference line + ratio tag still have the holistic context they need.
function buildSiloLanes(roLookup, laborByRO, laborByROSilo, managerSiloByEmail) {
    const silos = {};
    // Collect unique (silo, ro_id) pairs from work lists; skip _unsorted.
    const seen = new Set();
    const mgrSiloFallback = managerSiloByEmail || {};
    _allWorkLists.forEach(w => {
        const mgrEmail = (w.manager_email || '').toLowerCase();
        const siloKey = w.service_silo || mgrSiloFallback[mgrEmail];
        if (!siloKey) return; // no silo on row AND no staff.service_silo → skip
        const key = siloKey + '::' + w.ro_id;
        if (seen.has(key)) return;
        seen.add(key);
        if (!silos[siloKey]) silos[siloKey] = [];
        const ro = roLookup[w.ro_id] || {};
        const roLab = laborByRO[w.ro_id] || { cost: 0, hours: 0 };
        // v1.10 — silo-specific labor + per-tech split for THIS lane only.
        const siloLab = getSiloLaborForRO(laborByROSilo, w.ro_id, siloKey);
        const startDate = ro.date_arrived || ro.date_received;
        const daysOnLot = (ro.status === 'Not On Lot' && !ro.date_arrived) ? null
            : startDate ? Math.floor((Date.now() - new Date(startDate).getTime()) / 86400000) : null;
        silos[siloKey].push({
            ro, ro_id: w.ro_id,
            // Per-silo split — drives the bar height + per-tech segments + footer label.
            laborCost: siloLab.cost, laborHours: siloLab.hours,
            perTech: siloLab.perTechSorted,
            // Full-RO totals — drive the ratio tag, ref-line context, and tooltip.
            roLaborCost: roLab.cost, roLaborHours: roLab.hours,
            daysOnLot,
        });
    });
    // Sort within lane by per-silo labor cost desc (was already cost-desc — same metric, narrower scope).
    for (const k in silos) silos[k].sort((a, b) => b.laborCost - a.laborCost);
    return silos;
}

function renderLaborChart(roLookup, laborByRO, laborByROSilo, rateByEmail, managerSiloByEmail) {
    // v1.10 — bars are now silo-specific (Roof lane shows only Roof labor, etc.).
    // Per-tech segments come from the per-silo split inside buildSiloLanes, which
    // pulls perTechSorted out of laborByROSilo[ro][silo]. rateByEmail is no longer
    // needed here directly (kept in the signature for forward compatibility with
    // future per-bar enrichments).
    const lanes = buildSiloLanes(roLookup, laborByRO, laborByROSilo, managerSiloByEmail);

    // Lanes in SERVICE_SILOS order, only those with at least one RO.
    const laneOrder = SERVICE_SILOS.map(s => s.key).filter(k => lanes[k] && lanes[k].length);

    if (laneOrder.length === 0) {
        return `
            <div class="labor-chart-section" id="laborChartSection">
                <div class="labor-chart-header">
                    <div class="labor-chart-title" onclick="toggleLaborChart()">
                        <span>&#128202; Labor Load by Silo</span>
                    </div>
                </div>
                <div class="labor-chart-body ${_laborChartOpen ? '' : 'collapsed'}" id="laborChartBody">
                    <div style="padding:18px;color:#64748b;font-size:0.82rem;text-align:center;">No work list entries with a silo assignment yet.</div>
                </div>
            </div>
        `;
    }

    // Global scale — max value across ALL bars for the active metric.
    let peak = 0;
    laneOrder.forEach(k => lanes[k].forEach(b => {
        const v = _laborMetric === 'hours' ? b.laborHours : b.laborCost;
        if (v > peak) peak = v;
    }));
    if (peak <= 0) peak = 1; // avoid /0

    const BAR_PX = 180;
    const MIN_VISIBLE_PX = 4; // any nonzero value gets at least this much height

    // Staff name lookup for tooltips.
    const staffMap = {};
    _allStaff.forEach(s => {
        const em = (s.email || '').toLowerCase();
        if (em) staffMap[em] = s;
    });

    const lanesHtml = laneOrder.map(siloKey => {
        const silo = SILO_MAP[siloKey];
        const label = silo ? `${silo.emoji} ${silo.label}` : siloKey;
        const bars = lanes[siloKey];
        const laneSubtotal = bars.reduce((s, b) => s + b.laborCost, 0);
        const laneSubtotalHrs = bars.reduce((s, b) => s + b.laborHours, 0);

        const barsHtml = bars.map(b => {
            const rawValue = _laborMetric === 'hours' ? b.laborHours : b.laborCost;
            const pxTotal = rawValue > 0
                ? Math.max(MIN_VISIBLE_PX, Math.round((rawValue / peak) * BAR_PX))
                : 0;

            // Per-tech stacked segments (proportional to pxTotal).
            let segmentsHtml = '';
            if (pxTotal > 0 && b.perTech.length > 0) {
                const rawSum = b.perTech.reduce((s, t) => s + (_laborMetric === 'hours' ? t.hours : t.cost), 0) || 1;
                segmentsHtml = b.perTech.map(t => {
                    const tv = _laborMetric === 'hours' ? t.hours : t.cost;
                    if (tv <= 0) return '';
                    const segPx = Math.max(1, Math.round((tv / rawSum) * pxTotal));
                    const color = techColor(t.techEmail);
                    const nm = techDisplayName(t.techEmail, staffMap);
                    const tip = `${nm}: ${t.hours.toFixed(1)}h · ${fmtUsd(t.cost)}`;
                    return `<span class="labor-bar-segment" style="background:${color};height:${segPx}px;" title="${escAttr(tip)}"></span>`;
                }).join('');
            }

            // Reference line for dollar_value (only when metric='cost' AND value>0)
            let refLineHtml = '';
            let ratioTagHtml = '';
            const dv = Number(b.ro.dollar_value) || 0;
            if (_laborMetric === 'cost' && dv > 0) {
                const refPx = Math.round((dv / peak) * BAR_PX);
                if (refPx >= 0 && refPx <= BAR_PX) {
                    // bottom offset (column renders bottom-up)
                    refLineHtml = `<div class="labor-bar-ref" style="bottom:${refPx}px;" title="RO value ${fmtUsd(dv)}"></div>`;
                }
                if (b.laborCost > 0) {
                    const ratio = (b.laborCost / dv) * 100;
                    const label = ratio >= 100 ? '>100%' : ratio.toFixed(0) + '%';
                    // v1.10 \u2014 ratio is now THIS SILO's labor share / RO value (per-lane signal).
                    ratioTagHtml = `<div class="labor-bar-ratio-tag" title="This silo's labor \u00f7 RO value">${label}</div>`;
                }
            }

            const primary = _laborMetric === 'hours'
                ? `${b.laborHours.toFixed(1)}h`
                : fmtUsd(b.laborCost);

            const urg = urgencyClass(b.ro);
            const roIdText = b.ro.ro_id || '';
            const custName = b.ro.customer_name || 'Unknown';
            const rv = b.ro.rv || '';
            const tipLines = [
                `${custName}${rv ? ' — ' + rv : ''}`,
                roIdText ? `RO ${roIdText}` : '',
                b.ro.urgency ? `Urgency: ${b.ro.urgency}` : '',
                b.daysOnLot !== null ? `${b.daysOnLot} days on lot` : '',
                dv > 0 ? `RO value: ${fmtUsd(dv)}` : '',
                `This silo: ${b.laborHours.toFixed(1)}h · ${fmtUsd(b.laborCost)}`,
                ((b.roLaborCost > b.laborCost + 0.01) || (b.roLaborHours > b.laborHours + 0.01))
                    ? `RO total (all silos): ${b.roLaborHours.toFixed(1)}h · ${fmtUsd(b.roLaborCost)}`
                    : '',
            ].filter(Boolean).join('\n');

            const daysLabel = b.daysOnLot !== null ? `${b.daysOnLot}d` : '—';

            // v1.6 — show customer name as the primary footer identifier,
            // RO ID tail underneath as secondary disambiguation.
            const custLabel = custName || 'Unknown';
            const roIdTail  = roIdText ? roIdText.split('-').slice(-2).join('-') : '';

            return `
                <div class="labor-bar-wrap" data-ro-id="${escAttr(b.ro_id)}"
                     onclick="scrollToROInReport('${escAttr(b.ro_id)}')"
                     title="${escAttr(tipLines)}">
                    <div class="labor-bar-column ${urg}">
                        ${refLineHtml}
                        ${ratioTagHtml}
                        ${segmentsHtml}
                    </div>
                    <div class="labor-bar-label">
                        <span class="lbl-primary">${primary}</span>
                        <span class="lbl-days">${daysLabel}</span>
                        <span class="lbl-customer">${escHtml(custLabel)}</span>
                        ${roIdTail ? `<span class="lbl-id">${escHtml(roIdTail)}</span>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        return `
            <div class="labor-silo-lane">
                <div class="labor-silo-label">
                    <span>${label}</span>
                    <span class="labor-silo-subtotal">${fmtUsd(laneSubtotal)} · ${laneSubtotalHrs.toFixed(1)}h · ${bars.length} RO${bars.length !== 1 ? 's' : ''}</span>
                </div>
                <div class="labor-silo-bars">
                    ${barsHtml || '<span class="labor-silo-bars-empty">No time logged yet</span>'}
                </div>
            </div>
        `;
    }).join('');

    const peakLabel = _laborMetric === 'hours' ? `${peak.toFixed(1)}h` : fmtUsd(peak);

    return `
        <div class="labor-chart-section" id="laborChartSection">
            <div class="labor-chart-header">
                <div class="labor-chart-title" onclick="toggleLaborChart()">
                    <span>&#128202; Labor Load by Silo</span>
                    <span class="labor-chart-chev ${_laborChartOpen ? 'open' : ''}" id="laborChartChev">&#9660;</span>
                </div>
                <div class="labor-chart-controls">
                    <div class="labor-metric-toggle" role="tablist" aria-label="Metric">
                        <button class="labor-metric-btn ${_laborMetric === 'cost' ? 'active' : ''}" onclick="setLaborMetric('cost')">$</button>
                        <button class="labor-metric-btn ${_laborMetric === 'hours' ? 'active' : ''}" onclick="setLaborMetric('hours')">Hrs</button>
                    </div>
                    <span>Peak: <span class="labor-scale-readout">${peakLabel}</span></span>
                </div>
            </div>
            <div class="labor-chart-body ${_laborChartOpen ? '' : 'collapsed'}" id="laborChartBody">
                ${lanesHtml}
            </div>
        </div>
    `;
}

// v1.8 — Per-Silo Active Work List data builder.
// Pivots _allWorkLists by silo, deduping by ro_id, collecting all owner emails.
// Uses the same service_silo || managerSiloByEmail[email] fallback as buildSiloLanes
// so regular managers' rows bucket correctly.
// v1.10 — Each item now carries the per-silo labor share (laborCost/laborHours/totalHours)
// instead of the full-RO totals — the section is per-silo so its numbers should be too.
// Returns { [siloKey]: [{ ro_id, ro_name, owners: [email], priority, laborCost, laborHours, totalHours }, ...] }
function buildPerSiloView(roLookup, laborByRO, laborByROSilo, logsByRO, managerSiloByEmail) {
    const bySilo = {};
    const mgrSiloFallback = managerSiloByEmail || {};
    _allWorkLists.forEach(w => {
        const mgrEmail = (w.manager_email || '').toLowerCase();
        const siloKey = w.service_silo || mgrSiloFallback[mgrEmail];
        if (!siloKey || !SILO_MAP[siloKey]) return; // skip unsorted + parts_insurance
        if (!bySilo[siloKey]) bySilo[siloKey] = {};
        const bucket = bySilo[siloKey];
        if (!bucket[w.ro_id]) {
            bucket[w.ro_id] = {
                ro_id: w.ro_id,
                ro_name: w.ro_name,
                owners: new Set(),
                priority: w.priority,
            };
        } else if (w.priority != null && (bucket[w.ro_id].priority == null || w.priority < bucket[w.ro_id].priority)) {
            bucket[w.ro_id].priority = w.priority;
        }
        if (mgrEmail) bucket[w.ro_id].owners.add(mgrEmail);
    });
    // Convert inner { ro_id: {...} } maps into arrays sorted by labor cost desc.
    const out = {};
    Object.keys(bySilo).forEach(siloKey => {
        const items = Object.values(bySilo[siloKey]).map(it => {
            // v1.10 — silo-specific labor (cost + hours) for this RO's share in this silo.
            const siloShare = getSiloLaborForRO(laborByROSilo, it.ro_id, siloKey);
            return {
                ro_id: it.ro_id,
                ro_name: it.ro_name,
                priority: it.priority,
                owners: Array.from(it.owners),
                laborCost: siloShare.cost,
                laborHours: siloShare.hours,
                totalHours: siloShare.hours, // alias retained for the silo-header chip
            };
        });
        items.sort((a, b) => b.laborCost - a.laborCost);
        out[siloKey] = items;
    });
    return out;
}

// v1.8 — Render the Per-Silo Active Work List section.
// Sits between the Labor Load chart and the manager accordions.
// One block per silo (SERVICE_SILOS order, only silos with ≥1 RO).
// Each block: silo subheader (count, hours, labor $) + deduped RO rows reusing
// renderRORow for consistent styling. Owner pills prepended to each row show
// which manager(s) have the RO on their work list.
function renderPerSiloSection(roLookup, laborByRO, laborByROSilo, logsByRO, managerSiloByEmail) {
    const bySilo = buildPerSiloView(roLookup, laborByRO, laborByROSilo, logsByRO, managerSiloByEmail);
    const siloOrder = SERVICE_SILOS.map(s => s.key).filter(k => bySilo[k] && bySilo[k].length > 0);

    if (siloOrder.length === 0) {
        return `
            <div class="persilo-section" id="perSiloSection">
                <div class="persilo-header" onclick="togglePerSilo()">
                    <div class="persilo-title"><span>&#128203; Per-Silo Active Work List</span></div>
                    <span class="persilo-chev ${_perSiloOpen ? 'open' : ''}" id="perSiloChev">&#9660;</span>
                </div>
                <div class="persilo-body ${_perSiloOpen ? '' : 'collapsed'}" id="perSiloBody">
                    <div style="padding:18px;color:#64748b;font-size:0.82rem;text-align:center;">No work list entries yet.</div>
                </div>
            </div>
        `;
    }

    // Staff name + role lookup for owner pills
    const staffByEmail = {};
    _allStaff.forEach(s => {
        const em = (s.email || '').toLowerCase();
        if (em) staffByEmail[em] = s;
    });
    const displayNameFor = (em) => {
        const s = staffByEmail[em];
        if (s && s.name) return s.name;
        return em.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    };
    const isSrOwner = (em) => {
        const s = staffByEmail[em];
        return !!(s && s.role === 'sr_manager');
    };

    // Grand totals across the whole section (for header readout)
    let grandROs = 0, grandHours = 0, grandCost = 0;
    siloOrder.forEach(k => bySilo[k].forEach(it => {
        grandROs += 1;
        grandHours += it.totalHours;
        grandCost += it.laborCost;
    }));

    const silosHtml = siloOrder.map(siloKey => {
        const silo = SILO_MAP[siloKey];
        const items = bySilo[siloKey];
        const siloLaborCost = items.reduce((s, it) => s + it.laborCost, 0);
        const siloHours = items.reduce((s, it) => s + it.totalHours, 0);

        const rowsHtml = items.map((it, idx) => {
            const ownersHtml = it.owners.map(em => {
                const nm = displayNameFor(em);
                const cls = isSrOwner(em) ? 'owner-pill sr' : 'owner-pill';
                return `<span class="${cls}">${escAttr(nm)}</span>`;
            }).join('');
            const ownerBanner = `<div class="ro-owners"><span class="owners-label">&#128100; On list:</span>${ownersHtml}</div>`;
            // Synthesize a work list item for renderRORow; mIdx='ps' keeps DOM IDs
            // distinct from the manager accordion (which uses numeric indices).
            const syntheticItem = { ro_id: it.ro_id, ro_name: it.ro_name, priority: it.priority };
            // v1.10 — laborByROSilo wired through so the row's labor + hours chips
            // show silo-specific values (matching the per-silo subheader subtotals).
            return ownerBanner + renderRORow(syntheticItem, idx, roLookup, logsByRO, 'ps', siloKey, laborByRO, laborByROSilo);
        }).join('');

        return `
            <div class="silo-subheader">
                <span>${silo.emoji} ${silo.label}</span>
                <span class="silo-count">${items.length} RO${items.length !== 1 ? 's' : ''}</span>
                <span class="silo-hours" title="Total labor hours across all ROs in this silo">&#9201;&#65039; ${siloHours.toFixed(1)}h</span>
                <span class="silo-labor" title="Total labor cost across all ROs in this silo">&#129505; ${fmtUsd(siloLaborCost)}</span>
            </div>
            ${rowsHtml}
        `;
    }).join('');

    return `
        <div class="persilo-section" id="perSiloSection">
            <div class="persilo-header" onclick="togglePerSilo()">
                <div class="persilo-title">
                    <span>&#128203; Per-Silo Active Work List</span>
                    <span style="color:#64748b;font-weight:500;font-size:0.78rem;">— ${grandROs} RO${grandROs !== 1 ? 's' : ''} · ${grandHours.toFixed(1)}h · ${fmtUsd(grandCost)}</span>
                </div>
                <span class="persilo-chev ${_perSiloOpen ? 'open' : ''}" id="perSiloChev">&#9660;</span>
            </div>
            <div class="persilo-body ${_perSiloOpen ? '' : 'collapsed'}" id="perSiloBody">
                ${silosHtml}
            </div>
        </div>
    `;
}

// v1.4 — click handler for chart bars. Opens the right manager accordion
// + scrolls to the matching RO row + flashes a highlight border.
// v1.8 — prefer a row inside a manager accordion (canonical context); fall back
// to the per-silo row and force-open the section if it's collapsed.
function scrollToROInReport(roId) {
    if (!roId) return;
    const matches = document.querySelectorAll(`.ro-row[data-ro-id="${CSS.escape(roId)}"]`);
    if (matches.length === 0) return;
    // Prefer manager-accordion row; fall back to first match (per-silo).
    let row = null;
    matches.forEach(el => {
        if (!row && el.closest('.manager-body')) row = el;
    });
    if (!row) row = matches[0];
    // Open whichever collapsible container the row is inside.
    const mgrBody = row.closest('.manager-body');
    if (mgrBody && !mgrBody.classList.contains('open')) mgrBody.classList.add('open');
    const psBody = row.closest('.persilo-body');
    if (psBody && psBody.classList.contains('collapsed')) togglePerSilo();
    // Scroll + flash.
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    row.classList.remove('flash-highlight');
    // Force reflow so the animation restarts if clicked twice.
    void row.offsetWidth;
    row.classList.add('flash-highlight');
    setTimeout(() => row.classList.remove('flash-highlight'), 1700);
}

// ── Render ───────────────────────────────────────────────
function renderReport() {
    const body = document.getElementById('reportBody');

    // Group work list entries by manager
    const byManager = {};
    _allWorkLists.forEach(item => {
        const email = item.manager_email;
        if (!byManager[email]) byManager[email] = [];
        byManager[email].push(item);
    });

    // Build RO lookup
    const roLookup = Object.fromEntries(_allROs.map(r => [r.id, r]));

    // Build time log lookup by RO UUID
    const logsByRO = {};
    _allTimeLogs.forEach(log => {
        if (!logsByRO[log.ro_id]) logsByRO[log.ro_id] = [];
        logsByRO[log.ro_id].push(log);
    });

    // Filter out pure Admins — only show operational staff (Sr Managers, Managers, Techs)
    // v1.5 — Also drop tester managers (hourly_rate = 0) so Kevin/Roland/Sofia don't clutter.
    Object.keys(byManager).forEach(email => {
        const staffRec = _allStaff.find(s => s.email.toLowerCase() === email.toLowerCase());
        if (!staffRec) delete byManager[email]; // not in staff table = admin-only user
        else if (isTester(email)) delete byManager[email]; // v1.5 tester exclusion
    });

    // Determine manager ordering: Sr Managers first, then regular managers
    const managerOrder = Object.keys(byManager).sort((a, b) => {
        const aIsSr = _allStaff.find(s => s.email.toLowerCase() === a.toLowerCase())?.role === 'sr_manager';
        const bIsSr = _allStaff.find(s => s.email.toLowerCase() === b.toLowerCase())?.role === 'sr_manager';
        if (aIsSr && !bIsSr) return -1;
        if (!aIsSr && bIsSr) return 1;
        return a.localeCompare(b);
    });

    // v1.3 — Build rate map + labor stats ONCE per render, pass down.
    const rateByEmail = buildRateByEmail();
    const laborStats = buildLaborStats(rateByEmail);
    const laborByRO = laborStats.byRO;
    // v1.10 — per-(RO, silo) split with per-tech breakdown. Powers the Labor Load
    // chart bars (silo-specific height + segments), the Sr Manager silo-subheader
    // subtotals, the Per-Silo Active Work List, and the per-RO labor chip when
    // shown in a silo lane context. The full-RO total stays in laborByRO and
    // continues to drive the manager accordion total + grand-total chip.
    const laborByROSilo = buildLaborByROSilo(rateByEmail);
    // v1.8 — manager → silo fallback (for regular managers whose work list rows
    // have NULL service_silo). Used by Labor Load chart + Per-Silo Active Work List.
    const managerSiloByEmail = buildManagerSiloByEmail();

    // Stats
    const totalManagers = managerOrder.length;
    const totalROs = new Set(_allWorkLists.map(w => w.ro_id)).size;
    const activeTechs = new Set(_allTimeLogs.filter(l => !l.clock_out).map(l => l.tech_email)).size;
    const totalHours = _allTimeLogs.reduce((sum, l) => {
        if (l.clock_in && l.clock_out) {
            return sum + (new Date(l.clock_out) - new Date(l.clock_in)) / 3600000;
        }
        return sum;
    }, 0);

    // v1.3 — Grand-total labor across EVERY RO the report tracks (i.e., on any active work list).
    const grandLaborCost = laborStats.total.cost;

    document.getElementById('statsBar').innerHTML = `
        <div class="stat-chip"><strong>${totalManagers}</strong> Managers</div>
        <div class="stat-chip"><strong>${totalROs}</strong> Unique ROs</div>
        <div class="stat-chip"><strong>${activeTechs}</strong> Techs Active Now</div>
        <div class="stat-chip"><strong>${totalHours.toFixed(1)}h</strong> Total Logged</div>
        <div class="stat-chip stat-chip-labor" title="Cumulative labor cost across all active Manager Work Lists"><strong>${fmtUsd(grandLaborCost)}</strong> Total Labor</div>
        <div class="stat-chip"><strong>${_allWorkLists.length}</strong> List Entries</div>
    `;

    // v1.4 — Labor Load chart lives between the stats strip and the manager accordions.
    // v1.8 — Pass managerSiloByEmail so regular managers' work list rows get bucketed.
    // v1.10 — Pass laborByROSilo so each bar shows ONLY that silo's labor share.
    const laborChartHtml = renderLaborChart(roLookup, laborByRO, laborByROSilo, rateByEmail, managerSiloByEmail);

    // v1.8 — Per-Silo Active Work List: pivots work list data by silo (not by
    // manager), dedupes by ro_id, shows who has it on their list. Answers "how
    // many active ROs are in Repair right now across all my managers?" directly.
    // v1.10 — laborByROSilo also passed so silo-header subtotal + per-row chip
    // are silo-specific (only Roof labor in Roof block, etc.).
    const perSiloHtml = renderPerSiloSection(roLookup, laborByRO, laborByROSilo, logsByRO, managerSiloByEmail);

    // v1.10 — Tech Check-In tiles now render FIRST (top of report) so Roland can
    // glance at "is everyone clocked in?" without scrolling to the bottom.
    // Render order: Staff Status tiles → Labor chart → Per-Silo list → Manager accordions.
    const staffTilesHtml = renderStaffTiles();

    if (managerOrder.length === 0) {
        body.innerHTML = staffTilesHtml + laborChartHtml + perSiloHtml + '<div class="empty-state">No managers have work list entries yet.</div>';
        return;
    }

    // Render manager sections (staff tiles + chart + per-silo section go on top)
    body.innerHTML = staffTilesHtml + laborChartHtml + perSiloHtml + managerOrder.map((email, mIdx) => {
        const items = byManager[email];
        const isSr = _allStaff.find(s => s.email.toLowerCase() === email.toLowerCase())?.role === 'sr_manager';
        const roleBadge = isSr ? 'Sr Manager' : 'Manager';
        const displayName = email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const uniqueROs = new Set(items.map(i => i.ro_id)).size;

        // v1.3 — labor total for this manager: sum over UNIQUE ro_ids in their list.
        // (If a Sr Manager has the same RO in two silo tabs we don't double-count; labor is per RO.)
        const mgrROIds = [...new Set(items.map(i => i.ro_id))];
        const mgrLaborCost = mgrROIds.reduce((s, id) => s + (laborByRO[id]?.cost || 0), 0);

        // For Sr Managers, group by silo
        let innerHtml = '';
        if (isSr) {
            // Group by service_silo
            const bySilo = {};
            items.forEach(item => {
                const silo = item.service_silo || '_unsorted';
                if (!bySilo[silo]) bySilo[silo] = [];
                bySilo[silo].push(item);
            });

            // Render silos in SERVICE_SILOS order, then _unsorted
            const siloOrder = SERVICE_SILOS.map(s => s.key).filter(k => bySilo[k]);
            if (bySilo['_unsorted']) siloOrder.push('_unsorted');

            innerHtml = siloOrder.map(siloKey => {
                const siloItems = bySilo[siloKey];
                const silo = SILO_MAP[siloKey];
                const siloLabel = silo ? `${silo.emoji} ${silo.label}` : 'Unsorted';
                const siloCount = siloItems.length;

                // v1.3 — silo-level labor rollup (unique RO UUIDs inside this silo tab)
                // v1.10 — silo subheader now shows ONLY this silo's labor share, not the
                //         full RO totals. Resolves the "Roof shows all 60h, even though
                //         only 30h are Roof labor" complaint per Roland (GH#31 sub-item #8).
                //         Falls back to '_unsorted' which has no per-silo split — for that
                //         tab we keep the full-RO total since there's no silo to attribute to.
                const siloROIds = [...new Set(siloItems.map(i => i.ro_id))];
                const siloLabor = (siloKey === '_unsorted')
                    ? siloROIds.reduce((s, id) => s + (laborByRO[id]?.cost || 0), 0)
                    : siloROIds.reduce((s, id) => s + getSiloLaborForRO(laborByROSilo, id, siloKey).cost, 0);
                const siloLaborTitle = (siloKey === '_unsorted')
                    ? 'Labor cost across all ROs in this silo tab (full RO totals)'
                    : 'Labor attributed to this silo only (' + (SILO_MAP[siloKey]?.label || siloKey) + ' time logs)';

                return `
                    <div class="silo-subheader">
                        <span>${siloLabel}</span>
                        <span class="silo-count">${siloCount} RO${siloCount !== 1 ? 's' : ''}</span>
                        <span class="silo-labor" title="${siloLaborTitle}">&#129505; ${fmtUsd(siloLabor)}</span>
                    </div>
                    ${siloItems.map((item, idx) => renderRORow(item, idx, roLookup, logsByRO, mIdx, siloKey, laborByRO, laborByROSilo)).join('')}
                `;
            }).join('');
        } else {
            innerHtml = items.map((item, idx) => renderRORow(item, idx, roLookup, logsByRO, mIdx, 'flat', laborByRO, laborByROSilo)).join('');
        }

        return `
            <div class="manager-section">
                <div class="manager-header" onclick="toggleManager(${mIdx})">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span class="manager-name">${displayName}</span>
                        <span class="manager-role">${roleBadge}</span>
                        <span class="manager-ro-count">${uniqueROs} RO${uniqueROs !== 1 ? 's' : ''}</span>
                        <span class="manager-labor-total" title="Labor cost across all ROs on this manager's work list">&#129505; ${fmtUsd(mgrLaborCost)}</span>
                    </div>
                    <span class="manager-chevron" id="mChev${mIdx}">&#9660;</span>
                </div>
                <div class="manager-body open" id="mBody${mIdx}">
                    ${innerHtml}
                </div>
            </div>
        `;
    }).join('');
    // v1.10 — Staff Status tiles now rendered FIRST (above) instead of appended last.
}

function renderStaffTiles() {
    // Filter: show only operational staff (techs, managers, sr_managers, parts_managers)
    // Excludes anyone not in the staff table (i.e., admin-only users)
    // v1.5 — Also drop testers (hourly_rate = 0) so they don't clutter the tile grid.
    const staffToShow = _allStaff.filter(s => s.active !== false && !isTester(s.email));

    if (staffToShow.length === 0) return '';

    // Build active clock-in lookup by tech_email
    const activeByEmail = {};
    _allActiveClockIns.forEach(log => {
        const email = (log.tech_email || '').toLowerCase();
        if (!activeByEmail[email]) activeByEmail[email] = [];
        activeByEmail[email].push(log);
    });

    const activeCount = staffToShow.filter(s => activeByEmail[s.email.toLowerCase()]?.length > 0).length;
    const inactiveCount = staffToShow.length - activeCount;

    const roleLabels = {
        sr_manager: 'Sr Manager',
        manager: 'Manager',
        parts_manager: 'Parts',
        tech: 'Tech',
    };

    // Build today's time logs lookup by tech email
    const todayByEmail = {};
    _allTodayTimeLogs.forEach(log => {
        const em = (log.tech_email || '').toLowerCase();
        if (!todayByEmail[em]) todayByEmail[em] = [];
        todayByEmail[em].push(log);
    });

    // v1.7 — Build 14-day auto-close lookup by tech email.
    const autoClosedByEmail = {};
    _allAutoClosed.forEach(log => {
        const em = (log.tech_email || '').toLowerCase();
        if (!autoClosedByEmail[em]) autoClosedByEmail[em] = [];
        autoClosedByEmail[em].push(log);
    });

    // v1.10 — Pre-compute the 7-day per-tech-per-day grid ONCE per render
    // (instead of inside each tile's iteration) — used for the mini-bars below.
    const weekByEmailDay = buildWeekByEmailDay();

    const tiles = staffToShow.map((staff, sIdx) => {
        const email = staff.email.toLowerCase();
        const activeLogs = activeByEmail[email] || [];
        const isActive = activeLogs.length > 0;
        const tileClass = isActive ? 'tile-active' : 'tile-inactive';
        const dotClass = isActive ? 'dot-green' : 'dot-red';
        const roleLabel = roleLabels[staff.role] || staff.role;
        const tileId = 'techTile' + sIdx;

        let statusHtml = '';
        if (isActive) {
            statusHtml = activeLogs.map(log => {
                const ro = log.repair_orders;
                const roLabel = ro ? `${ro.customer_name || 'Unknown'} (${ro.ro_id || ''})` : 'Unknown RO';
                const rvLabel = ro?.rv || '';
                const clockInTime = log.clock_in
                    ? new Date(log.clock_in).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
                    : '';
                const elapsed = log.clock_in
                    ? ((Date.now() - new Date(log.clock_in).getTime()) / 3600000).toFixed(1) + 'h'
                    : '';
                return `
                    <div class="tile-status"><span class="tile-status-dot ${dotClass}"></span>Clocked in${clockInTime ? ' at ' + clockInTime : ''}</div>
                    <div class="tile-ro-info" title="${escHtml(roLabel + ' ' + rvLabel)}">${escHtml(roLabel)}</div>
                    ${rvLabel ? `<div class="tile-ro-info" style="color:#6ee7b7;opacity:0.7;">${escHtml(rvLabel)}</div>` : ''}
                    <div class="tile-duration">${elapsed} elapsed</div>
                `;
            }).join('');
        } else {
            statusHtml = `<div class="tile-status"><span class="tile-status-dot ${dotClass}"></span>Not clocked in</div>`;
        }

        // Build expandable daily time log detail
        const todayLogs = todayByEmail[email] || [];
        let detailHtml = '';
        if (todayLogs.length > 0) {
            // v1.11 — overlap detection drives the per-row OVERLAP badge AND the
            // total chip. Use the unified buildWeekByEmailDay numbers for today
            // (wall-clock + raw + overlap) so the tile summary matches the
            // drill-down modal.
            const todayKey = localDayKey(new Date());
            const todayWeek = (weekByEmailDay[email] || {})[todayKey];
            const overlappingIdx = detectOverlappingSessionIndices(todayLogs);
            const rows = [];
            for (let i = 0; i < todayLogs.length; i++) {
                const log = todayLogs[i];
                const ro = log.repair_orders;
                const roLabel = ro ? `${ro.customer_name || 'Unknown'} (${ro.ro_id || ''})` : 'Unknown RO';
                const inTime = log.clock_in
                    ? new Date(log.clock_in).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
                    : '';
                const overlapBadge = overlappingIdx.has(i)
                    ? '<span class="td-overlap-badge" title="This session overlaps with another clock-in — tech may not have clocked out before starting the next RO">&#9888; OVERLAP</span>'
                    : '';
                if (log.clock_out) {
                    const outTime = new Date(log.clock_out).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                    const mins = (new Date(log.clock_out) - new Date(log.clock_in)) / 60000;
                    const durStr = mins >= 60 ? (mins / 60).toFixed(1) + 'h' : Math.round(mins) + 'm';
                    // v1.7 / v1.9 — close_reason decides visual treatment.
                    //   'auto_eod_5pm' / 'auto_eod' (legacy)  → orange flag (tech didn't clock out)
                    //   'auto_eod_8h_recalc'                  → gray (retroactively corrected, not a flag)
                    //   other / NULL                          → normal style
                    const cr = log.close_reason || '';
                    if (cr === 'auto_eod_5pm' || cr === 'auto_eod') {
                        const label = cr === 'auto_eod_5pm' ? '5pm auto' : '12h auto';
                        rows.push(`<div class="tile-detail-row auto-eod" title="Auto-closed — tech did not clock out"><span class="td-time">${inTime}–${outTime}</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span>${overlapBadge}<span class="td-auto-badge">&#9888; ${label} ${durStr}</span></div>`);
                    } else if (cr === 'auto_replaced_by_new_session') {
                        // v1.12 — GH#33 Phase 4 trigger fired: tech started a new RO without clocking out.
                        rows.push(`<div class="tile-detail-row auto-switched" title="Auto-closed by trigger — tech clocked into a new RO without clocking out of this one"><span class="td-time">${inTime}–${outTime}</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span>${overlapBadge}<span class="td-switched-badge">&#8631; switched RO ${durStr}</span></div>`);
                    } else if (cr === 'auto_eod_8h_recalc') {
                        rows.push(`<div class="tile-detail-row recalc" title="Retroactively corrected from the old 12h cap to 8h"><span class="td-time">${inTime}–${outTime}</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span>${overlapBadge}<span class="td-recalc-badge">&#10003; 8h recalc</span></div>`);
                    } else if (cr === 'auto_cleanup_pre_uniq_index') {
                        // v1.12 — One-time cleanup row from the GH#33 Phase 4 migration.
                        rows.push(`<div class="tile-detail-row recalc" title="Closed by one-time migration cleanup before installing per-tech UNIQUE index"><span class="td-time">${inTime}–${outTime}</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span>${overlapBadge}<span class="td-recalc-badge">&#10003; cleanup</span></div>`);
                    } else {
                        rows.push(`<div class="tile-detail-row"><span class="td-time">${inTime}–${outTime}</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span>${overlapBadge}<span class="td-dur">${durStr}</span></div>`);
                    }
                } else {
                    // Currently active
                    rows.push(`<div class="tile-detail-row"><span class="td-time">${inTime}–now</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span>${overlapBadge}<span class="td-active-badge">ACTIVE</span></div>`);
                }
                // Show gap between sessions
                if (log.clock_out && i < todayLogs.length - 1) {
                    const nextIn = new Date(todayLogs[i + 1].clock_in);
                    const gapMins = (nextIn - new Date(log.clock_out)) / 60000;
                    if (gapMins > 5) {
                        const gapStr = gapMins >= 60 ? (gapMins / 60).toFixed(1) + 'h gap' : Math.round(gapMins) + 'm gap';
                        rows.push(`<div class="tile-detail-row"><span class="td-gap">⏸ ${gapStr}</span></div>`);
                    }
                }
            }
            // v1.11 — wall-clock total replaces raw sum. When overlap > 3 min,
            // append a small "(⚠ raw Xh)" suffix that exposes the inflated raw
            // sum without making the headline misleading.
            const wallH = todayWeek ? todayWeek.wallClockHours : 0;
            const rawH  = todayWeek ? todayWeek.rawSumHours   : 0;
            const overlapH = todayWeek ? todayWeek.overlapHours : 0;
            const totalStr = wallH >= 1 ? wallH.toFixed(1) + 'h' : Math.round(wallH * 60) + 'm';
            const overlapSuffix = overlapH > 0.05
                ? ` <span class="tile-overlap-warn" title="Sessions overlap — raw sum was ${rawH.toFixed(1)}h, wall-clock time worked = ${wallH.toFixed(1)}h">(&#9888; raw ${rawH.toFixed(1)}h)</span>`
                : '';
            detailHtml = `<div class="tile-detail" id="det_${tileId}">${rows.join('')}<div class="tile-detail-summary">${todayLogs.length} session${todayLogs.length > 1 ? 's' : ''} · ${totalStr} today${overlapSuffix}</div>${buildWeekBarsForTech(staff.email, weekByEmailDay)}${buildPriorAutoCloseSection(email, todayLogs, autoClosedByEmail)}</div>`;
        } else {
            detailHtml = `<div class="tile-detail" id="det_${tileId}"><div class="tile-detail-empty">No check-ins today</div>${buildWeekBarsForTech(staff.email, weekByEmailDay)}${buildPriorAutoCloseSection(email, [], autoClosedByEmail)}</div>`;
        }

        return `
            <div class="staff-tile ${tileClass}" onclick="toggleTechTile('${tileId}')">
                <span class="tile-chevron" id="chev_${tileId}">&#9660;</span>
                <div class="tile-name">
                    ${escHtml(staff.name)}
                    <span class="tile-role">${roleLabel}</span>
                </div>
                ${statusHtml}
                ${detailHtml}
            </div>
        `;
    }).join('');

    const collapseClass = _staffSectionOpen ? '' : 'collapsed';
    const chevClass = _staffSectionOpen ? 'open' : '';

    return `
        <div class="staff-section">
            <div class="staff-header" onclick="toggleStaffSection()">
                <div style="display:flex;align-items:center;gap:10px;">
                    <span class="staff-header-title">&#128101; Staff Status</span>
                    <span class="staff-header-stats">${activeCount} active &middot; ${inactiveCount} idle</span>
                </div>
                <span class="manager-chevron ${chevClass}" id="staffChev">&#9660;</span>
            </div>
            <div class="staff-body ${collapseClass}" id="staffBody">
                <div class="staff-grid">
                    ${tiles}
                </div>
            </div>
        </div>
    `;
}

    _staffSectionOpen = !_staffSectionOpen;
    const body = document.getElementById('staffBody');
    const chev = document.getElementById('staffChev');
    if (body) body.classList.toggle('collapsed');
    if (chev) chev.classList.toggle('open');

// v1.7 — Build the "Recent auto-closes (last 14 days)" audit sub-section
// shown inside a staff tile's expanded detail. Lists auto-closed sessions
// that are NOT already visible in today's sessions block (to avoid
// duplicates — today's auto-closes already show inline with orange styling).
function buildPriorAutoCloseSection(email, todayLogs, autoClosedByEmail) {
    const acRows = autoClosedByEmail[email] || [];
    if (acRows.length === 0) return '';
    const todayIds = new Set(todayLogs.map(l => l.id));
    const prior = acRows.filter(l => !todayIds.has(l.id));
    if (prior.length === 0) return '';

    // v1.9 — split prior rows into two piles: flagged (orange/red) vs recalc (gray).
    //        Only the flagged count shows in the section header.
    // v1.12 — auto_replaced_by_new_session is ALSO a discipline flag (tech started
    //         a new RO without clocking out). Bucketed with the orange/red flagged
    //         set so it shows up in the header count alongside EOD auto-closes.
    const flagged = prior.filter(l => {
        const c = l.close_reason || '';
        return c === 'auto_eod_5pm' || c === 'auto_eod' || c === 'auto_replaced_by_new_session';
    });

    const listHtml = prior.map(log => {
        const ro = log.repair_orders;
        const roLabel = ro ? `${ro.customer_name || 'Unknown'} (${ro.ro_id || ''})` : 'Unknown RO';
        const inD = log.clock_in ? new Date(log.clock_in) : null;
        const outD = log.clock_out ? new Date(log.clock_out) : null;
        const dateStr = inD ? inD.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
        const inT  = inD  ? inD.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
        const outT = outD ? outD.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
        const durStr = (inD && outD) ? ((outD - inD) / 3600000).toFixed(1) + 'h' : '';
        const cr = log.close_reason || '';
        if (cr === 'auto_eod_8h_recalc') {
            return `<div class="tile-detail-row recalc" title="Retroactively corrected from the old 12h cap to 8h"><span class="td-time">${dateStr} ${inT}–${outT}</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span><span class="td-recalc-badge">&#10003; 8h recalc</span></div>`;
        }
        if (cr === 'auto_cleanup_pre_uniq_index') {
            return `<div class="tile-detail-row recalc" title="Closed by GH#33 Phase 4 migration cleanup"><span class="td-time">${dateStr} ${inT}–${outT}</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span><span class="td-recalc-badge">&#10003; cleanup</span></div>`;
        }
        if (cr === 'auto_replaced_by_new_session') {
            // v1.12 — GH#33 Phase 4 trigger fired: tech started a new RO without clocking out.
            return `<div class="tile-detail-row auto-switched" title="Auto-closed by trigger — tech clocked into a new RO without clocking out of this one"><span class="td-time">${dateStr} ${inT}–${outT}</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span><span class="td-switched-badge">&#8631; switched RO ${durStr}</span></div>`;
        }
        const label = cr === 'auto_eod_5pm' ? '5pm auto' : '12h auto';
        return `<div class="tile-detail-row auto-eod" title="Auto-closed — tech did not clock out"><span class="td-time">${dateStr} ${inT}–${outT}</span><span class="td-ro" title="${escHtml(roLabel)}">${escHtml(roLabel)}</span><span class="td-auto-badge">&#9888; ${label} ${durStr}</span></div>`;
    }).join('');

    const headerText = flagged.length > 0
        ? `&#9888; ${flagged.length} auto-close discipline event${flagged.length > 1 ? 's' : ''} · last 14 days`
        : `&#128196; ${prior.length} auto-close record${prior.length > 1 ? 's' : ''} · last 14 days (all data-corrected)`;

    return `
        <div class="tile-auto-section">
            <div class="tile-auto-header">${headerText}</div>
            ${listHtml}
        </div>
    `;
}
