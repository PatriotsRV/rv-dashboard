<!DOCTYPE html>
<!--
    PRVS Active Work List Report v1.12
    Released: 2026-05-10
    Admin-only report: all managers' work lists + time logs per RO
    Auto-refreshes every 3 minutes
    v1.1: Staff status tiles — red/green color-coded grid showing who is clocked in and what RO they're working on
    v1.2: Clickable tech tiles — expand to show full daily time log (all clock-in/out sessions for the day)
    v1.3: Monetary analytics — labor cost per RO/silo/manager + grand-total strip.
          Hourly rate from staff.hourly_rate (migration add_staff_hourly_rate.sql).
          Labor = sum(hours × rate) over all time_logs for each RO.
          Active (not-clocked-out) logs count against Date.now(). Roland/Kevin at $0 so testers don't pollute totals.
    v1.4: Labor Load chart — pure-CSS stacked bars, one horizontal lane per active silo.
          Within each lane, vertical bars per RO sorted labor-cost desc.
          Per-tech segments stacked inside each bar (deterministic color-by-email).
          Urgency color top-border. $/Hrs metric toggle (localStorage).
          Collapsible section (default open). Click bar → scroll + flash the accordion row below.
    v1.5: Full exclusion of testers + training ROs from every report surface.
          Testers = staff.hourly_rate = 0 (Kevin, Roland, Sofia). Training ROs = repair_orders.is_training = true.
          Filters applied at load to _allWorkLists, _allROs, _allTimeLogs, _allActiveClockIns, _allTodayTimeLogs.
          Also drops tester managers from the accordion list.
          Bar width fix: bars now flex-grow to fill the silo lane (was compacting left).
          Bugfix: urgency now included in the repair_orders SELECT (v1.4 bars were defaulting to gray).
    v1.6: Labor chart bar-footer label now shows customer name (primary identifier) with
          RO ID tail directly below (secondary, dimmer). Answers 'who is this RO for?'
          at a glance. Both ellipsis-truncate for narrow bars.
    v1.7: Auto-logout audit on Staff Status tiles. Individual auto-closed sessions
          (close_reason='auto_eod' set by GH#32 nightly pg_cron) now render with orange
          left-border + orange ⚠ auto Xh badge in the expanded tile detail. Today's
          auto-closes flag inline; prior-day auto-closes from the last 14 days appear
          in a dedicated 'Recent auto-logouts' sub-section at the bottom of the detail.
          Tile's own green/red live status is unchanged — per-session highlight only.
    v1.8: Regular managers now appear in the Labor Load chart. Their work list rows
          have service_silo=NULL (only Sr Managers populate it via the silo tab picker),
          so buildSiloLanes was silently dropping every non-Sr-Manager row. Fix:
          fall back to staff.service_silo by manager_email. parts_insurance is
          excluded (not a service silo) — Bobby/Brandon stay out until the labor
          report is expanded to include parts/insurance hours.
          New section: Per-Silo Active Work List. Pivots work list data by silo
          instead of by manager. Dedupes by ro_id, shows which manager(s) have
          it on their list. Answers "how many active ROs are in Repair across
          all managers?" at a glance. Sits between the Labor Load chart and the
          manager accordions. Collapsible (localStorage persisted).
    v1.12: Surface the new auto_replaced_by_new_session close_reason — the
          BEFORE INSERT trigger added in supabase/migrations/cross_ro_clockin_guardrail.sql
          (GH#33 Phase 4) auto-closes any prior open session for a tech on a
          different RO when they clock into a new one. Three render paths
          updated to show this as a distinct purple "↻ switched RO" badge:
          (1) Today's session list inside the staff tile detail.
          (2) "Recent auto-closes" prior-day audit section — bucketed with
              orange-flagged auto-EODs in the header count, since both
              represent tech-discipline events. Header label changed to
              "auto-close discipline events" to encompass both.
          (3) Drill-down modal row classifier — purple badge + tinted row.
          Also handles the one-time auto_cleanup_pre_uniq_index close_reason
          (rows closed by the migration's pre-flight cleanup) as a gray
          "✓ cleanup" badge — informational, not a discipline flag.
          NOTE: After the trigger ships, NEW data will not have overlapping
          clock_in/clock_out windows (trigger sets clock_out = next session's
          clock_in instant). v1.11's OVERLAP detection will only catch
          historical pre-fix data going forward — the switched-RO badge is
          how the discipline signal will surface for new occurrences.
    v1.11: Per-tech-day total now uses WALL-CLOCK hours (union of overlapping
          session ranges) instead of raw sum. Roland reported Ignacio's drill-down
          showing 15.5h total from 3 sessions on 2026-05-05, when he only worked
          7:30-4:00. Root cause: tech started Tom's RO at 7:49 AM and Crystal's at
          11:26 AM without clocking out of Jeannie's 7:36 AM session — Jeannie's
          session sat open until 5 PM auto-close, then naive sum 9.4 + 1.8 + 4.2
          = 15.5h. Fix shipped in 4 places:
          (1) New unionHoursOfRanges() helper merges overlapping intervals via
              sort+sweep. New detectOverlappingSessionIndices() returns Set of
              indices that overlap another session.
          (2) buildWeekByEmailDay restructured to compute rawSumHours (old) +
              wallClockHours (union) + overlapHours per (email, day). totalHours
              aliased to wallClockHours so all callers default to the corrected
              number.
          (3) Drill-down modal: headline summary chip now reads "X.Xh wall-clock"
              (was raw sum). Aux line below shows raw-sum when overlap > 3 min.
              When overlap > 3 min, modal renders a red overlap-warning banner at
              the top explaining the gap + likely root cause + pointing to the
              per-row OVERLAP badges. Each overlapping session row gets a red
              left-bar tint + "⚠ OVERLAP" badge. Coaching banner now thresholds
              against wallClock (was raw sum) so over-counted days no longer
              hide an under-logging signal.
          (4) Tile inline summary "X.Xh today" + week mini-bars use wallClock.
              Tile summary appends "(⚠ raw X.Xh)" when overlap detected so the
              admin sees the discipline signal at a glance from the tile grid
              without expanding the modal.
          Note: per-RO labor cost / per-silo split / Labor Load chart numbers are
          UNCHANGED — those aggregations are per-RO (or per-RO-per-silo), not
          per-tech, so they don't suffer the over-counting. The "Total Logged"
          chip on the stat strip is still raw sum across all techs across all
          ROs (would need a second restructure to make it tech-deduped — flagged
          as a future GH#31 sub-item if Roland wants).
    v1.10: Three changes (Session 65, GH#31 sub-items + reorder + drill-down).
          (1) Per-silo labor split — each silo lane / silo subheader / silo-context
          per-RO labor + hours chip now shows ONLY the labor attributed to that
          silo. Driven by buildLaborByROSilo + getSiloLaborForRO. Maps
          time_logs.service_type → silo via SERVICE_TYPE_TO_SILO. Defensive
          comma-split (in practice every row is single-silo since checkin.html
          selectedService is singular). 'Shop' + NULL service_type are
          intentionally unattributed: they still flow into the RO total + manager
          total + grand total via buildLaborStats, but don't show in any silo
          lane. Resolves Roland's "Roof row showing all 60h instead of just 30h"
          complaint. Tooltips on chips, ratio tag, and bar tooltip clarify the
          per-silo scope and surface the full-RO total alongside when they differ.
          (2) Tech Check-In tiles section moved from end of report to TOP — sits
          directly under the stat strip so Roland can confirm "is everyone
          clocked in?" at a glance without scrolling. Section margin tightened
          from 16/16/24 → 12/16 to match the other top-of-report blocks.
          (3) Per-tech daily drill-down modal — each tile detail gains a 7-day
          mini-bar grid (last 7 days, today rightmost, color-banded by daily
          total: green ≥8h / amber 4-8h / red >0-4h / slate 0h). Click any day
          to open a modal showing that tech's clock-in sessions for that
          specific date with cumulative hours total, RO assignments, service
          types, and close-reason badges (active / 5pm auto / 12h auto / 8h
          recalc). On TODAY past 3 PM, an amber coaching banner fires when the
          tech's logged total is < 6h — flag for "may not be logging in
          accurately, may need a check-in." New SELECT in loadAllData
          populates _allWeekTimeLogs (last 7 days, all techs, joined to
          repair_orders for RO labels). Same tester + training-RO exclusion
          rules apply.
    v1.9: Auto-logout regime change — the 12h cap is dead. Replaced by a M-F 5 PM
          CDT pg_cron (close_open_time_logs_eod, migration
          replace_auto_logout_with_5pm_eod.sql) that hard-closes any open session
          at EOD. Old 12h-capped rows retroactively rewritten to 8h with
          close_reason='auto_eod_8h_recalc' (see retroactive_12h_to_8h_fix.sql).
          Report-side: the Recent auto-logouts audit now queries close_reason
          LIKE 'auto_%' so it handles all three flavors: auto_eod_5pm (orange
          flag, tech didn't clock out), auto_eod (legacy 12h, same orange
          treatment), auto_eod_8h_recalc (gray "✓ 8h recalc" — data corrected,
          not a flag). Section header count only reflects orange/flagged rows;
          when all prior auto-logouts are recalc'd, the header switches to
          "all data-corrected" messaging. Also shipped dormant Stage 1 SMS
          groundwork: time_logs.reminded_at + extended_at columns, staff
          phone_number + sms_opt_in_at columns, sms_log audit table, and
          twilio-sms + twilio-webhook edge functions (return 503 until
          TWILIO_* secrets set).
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRVS — Active Work List Report</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b1121;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────────── */
        .header {
            background: linear-gradient(135deg, #0f1a2e 0%, #1a2744 100%);
            border-bottom: 2px solid #1e3a5f;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header-title { font-size: 1.15rem; font-weight: 700; color: white; }
        .header-subtitle { font-size: 0.75rem; color: #64748b; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .refresh-bar {
            display: flex; align-items: center; gap: 8px;
            background: #1e293b; border: 1px solid #334155; border-radius: 6px;
            padding: 6px 12px; font-size: 0.75rem; color: #94a3b8;
        }
        .refresh-bar button {
            background: #3b82f6; color: white; border: none; border-radius: 4px;
            padding: 4px 10px; font-size: 0.72rem; cursor: pointer; font-weight: 600;
        }
        .refresh-bar button:hover { background: #2563eb; }
        .badge-admin {
            background: #7c3aed; color: white; padding: 3px 10px; border-radius: 12px;
            font-size: 0.7rem; font-weight: 600;
        }
        .back-link {
            color: #60a5fa; text-decoration: none; font-size: 0.8rem;
        }
        .back-link:hover { text-decoration: underline; }

        /* ── Auth gate ──────────────────────────────── */
        .auth-gate {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 80vh; gap: 20px;
        }
        .auth-gate h2 { color: #94a3b8; font-size: 1.1rem; font-weight: 500; }
        #g_id_onload { margin-top: 12px; }

        /* ── Stats bar ──────────────────────────────── */
        .stats-bar {
            display: flex; gap: 16px; padding: 12px 24px;
            background: #0f172a; border-bottom: 1px solid #1e293b;
            flex-wrap: wrap;
        }
        .stat-chip {
            background: #1e293b; border: 1px solid #334155; border-radius: 6px;
            padding: 6px 14px; font-size: 0.78rem; color: #cbd5e1;
        }
        .stat-chip strong { color: white; margin-right: 4px; }

        /* ── Manager accordion ──────────────────────── */
        .manager-section {
            margin: 12px 16px;
            border: 1px solid #1e293b;
            border-radius: 10px;
            overflow: hidden;
            background: #111827;
        }
        .manager-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px;
            background: linear-gradient(135deg, #1e293b, #263548);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .manager-header:hover { background: linear-gradient(135deg, #243447, #2d4058); }
        .manager-name { font-weight: 700; font-size: 0.95rem; color: white; }
        .manager-role {
            font-size: 0.7rem; color: #94a3b8; margin-left: 8px;
            background: #334155; padding: 2px 8px; border-radius: 10px;
        }
        .manager-ro-count {
            font-size: 0.75rem; color: #64748b;
        }
        .manager-chevron {
            color: #64748b; font-size: 1.2rem; transition: transform 0.2s;
        }
        .manager-chevron.open { transform: rotate(180deg); }
        .manager-body { display: none; }
        .manager-body.open { display: block; }

        /* ── Silo sub-header ────────────────────────── */
        .silo-subheader {
            padding: 8px 18px;
            background: #0f172a;
            border-top: 1px solid #1e293b;
            font-size: 0.8rem;
            font-weight: 700;
            color: #60a5fa;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .silo-subheader .silo-count {
            background: #1e3a5f; color: #93c5fd; padding: 1px 8px;
            border-radius: 10px; font-size: 0.68rem; font-weight: 600;
        }

        /* ── RO row ─────────────────────────────────── */
        .ro-row {
            border-top: 1px solid #1e293b;
            transition: background 0.15s;
        }
        .ro-row:hover { background: #1a2236; }
        .ro-row-main {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 18px;
            cursor: pointer;
            min-height: 42px;
        }
        .ro-priority {
            color: #475569; font-size: 0.72rem; font-weight: 700;
            min-width: 22px; text-align: center;
        }
        .ro-id {
            color: #94a3b8; font-size: 0.75rem; min-width: 75px;
            font-family: 'SF Mono', 'Consolas', monospace;
        }
        .ro-customer {
            color: white; font-size: 0.85rem; font-weight: 600;
            flex: 1; min-width: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .ro-rv {
            color: #64748b; font-size: 0.72rem; max-width: 180px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ── KPI chips ──────────────────────────────── */
        .kpi-chips { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .chip {
            padding: 2px 8px; border-radius: 4px; font-size: 0.7rem;
            font-weight: 600; white-space: nowrap; border: 1px solid transparent;
        }
        .chip-days-green { background: #064e3b; color: #6ee7b7; border-color: #065f46; }
        .chip-days-orange { background: #78350f; color: #fbbf24; border-color: #92400e; }
        .chip-days-red { background: #7f1d1d; color: #fca5a5; border-color: #991b1b; }
        .chip-dollar { background: #1e3a5f; color: #93c5fd; border-color: #1e40af; }
        .chip-techs-active { background: #064e3b; color: #34d399; border-color: #065f46; }
        .chip-techs-none { background: #1e293b; color: #64748b; border-color: #334155; }
        .chip-hours { background: #312e81; color: #a5b4fc; border-color: #3730a3; }
        /* v1.3 labor-cost chips */
        .chip-labor-green { background: #064e3b; color: #6ee7b7; border-color: #065f46; }
        .chip-labor-amber { background: #78350f; color: #fbbf24; border-color: #92400e; }
        .chip-labor-red   { background: #7f1d1d; color: #fca5a5; border-color: #991b1b; }
        .chip-labor-zero  { background: #1e293b; color: #64748b; border-color: #334155; }
        /* v1.3 silo subheader labor subtotal */
        .silo-subheader .silo-labor {
            margin-left: auto;
            color: #fbbf24;
            font-size: 0.72rem;
            font-weight: 700;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 1px 8px;
            border-radius: 10px;
        }
        /* v1.3 manager header labor subtotal */
        .manager-labor-total {
            font-size: 0.75rem;
            color: #fbbf24;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 2px 10px;
            border-radius: 10px;
            margin-left: 6px;
        }
        /* v1.3 grand-total strip chip */
        .stat-chip.stat-chip-labor {
            background: #1e293b;
            border-color: #fbbf24;
        }
        .stat-chip.stat-chip-labor strong { color: #fbbf24; }

        /* ── v1.4 Labor Load chart ───────────────────── */
        .labor-chart-section {
            margin: 12px 16px;
            border: 1px solid #1e293b;
            border-radius: 10px;
            overflow: hidden;
            background: #0f172a;
        }
        .labor-chart-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px;
            background: linear-gradient(135deg, #0f1a2e, #1a2744);
            user-select: none;
            gap: 12px;
            flex-wrap: wrap;
        }
        .labor-chart-title {
            font-weight: 700; font-size: 0.95rem; color: #fbbf24;
            display: flex; align-items: center; gap: 8px;
            cursor: pointer;
        }
        .labor-chart-controls { display: flex; align-items: center; gap: 10px; font-size: 0.72rem; color: #94a3b8; }
        .labor-metric-toggle {
            display: inline-flex; background: #0b1121; border: 1px solid #334155;
            border-radius: 6px; overflow: hidden;
        }
        .labor-metric-btn {
            padding: 4px 12px; font-size: 0.72rem; font-weight: 600;
            background: transparent; color: #64748b; border: 0; cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .labor-metric-btn:hover { color: #cbd5e1; }
        .labor-metric-btn.active { background: #fbbf24; color: #0b1121; }
        .labor-scale-readout { color: #fbbf24; font-weight: 700; font-family: 'SF Mono', monospace; }
        .labor-chart-chev { color: #64748b; font-size: 1.1rem; transition: transform 0.2s; }
        .labor-chart-chev.open { transform: rotate(180deg); }
        .labor-chart-body { padding: 10px 0; }
        .labor-chart-body.collapsed { display: none; }

        .labor-silo-lane {
            padding: 8px 14px;
            border-top: 1px solid #1e293b;
            display: flex; align-items: flex-end; gap: 14px;
        }
        .labor-silo-lane:first-child { border-top: 0; }
        .labor-silo-label {
            flex: 0 0 120px;
            font-size: 0.78rem;
            font-weight: 700;
            color: #60a5fa;
            display: flex; flex-direction: column; gap: 2px;
            padding-bottom: 4px;
        }
        .labor-silo-subtotal {
            font-size: 0.68rem;
            color: #fbbf24;
            font-weight: 600;
            font-family: 'SF Mono', monospace;
        }
        .labor-silo-bars {
            flex: 1;
            display: flex; align-items: flex-end; gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            min-height: 210px;
        }
        .labor-silo-bars::-webkit-scrollbar { height: 6px; }
        .labor-silo-bars::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .labor-silo-bars-empty {
            color: #475569; font-size: 0.75rem; font-style: italic; padding: 12px 0;
        }

        .labor-bar-wrap {
            /* v1.5 — grow to fill the lane (was flex: 0 0 48px which left dead space).
               Cap at 100px so wide lanes with few ROs don't produce ugly fat bars. */
            flex: 1 1 48px;
            min-width: 48px; max-width: 100px;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .labor-bar-wrap:hover { transform: translateY(-2px); }
        .labor-bar-wrap:hover .labor-bar-column { box-shadow: 0 0 0 1px #fbbf24; }
        .labor-bar-column {
            width: 100%;
            height: 180px;
            display: flex; flex-direction: column; justify-content: flex-end;
            background: #0b1121;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            border-top: 3px solid #334155; /* urgency-colored */
        }
        .labor-bar-column.urg-critical { border-top-color: #ef4444; }
        .labor-bar-column.urg-high     { border-top-color: #f97316; }
        .labor-bar-column.urg-medium   { border-top-color: #eab308; }
        .labor-bar-column.urg-low      { border-top-color: #22c55e; }
        .labor-bar-segment {
            width: 100%;
            display: block;
            border-top: 1px solid rgba(0,0,0,0.35);
        }
        .labor-bar-segment:first-child { border-top: 0; }
        .labor-bar-ref {
            position: absolute; left: 0; right: 0;
            border-top: 1px dashed #fbbf24;
            pointer-events: none;
            opacity: 0.55;
        }
        .labor-bar-ratio-tag {
            position: absolute; top: 2px; right: 2px;
            font-size: 0.58rem; font-weight: 700;
            color: #fbbf24;
            background: rgba(0,0,0,0.45);
            padding: 1px 3px; border-radius: 3px;
            line-height: 1;
        }
        .labor-bar-label {
            font-size: 0.62rem;
            color: #cbd5e1;
            font-family: 'SF Mono', monospace;
            text-align: center;
            line-height: 1.2;
            white-space: nowrap;
        }
        .labor-bar-label .lbl-primary { color: #fbbf24; font-weight: 700; display: block; }
        .labor-bar-label .lbl-days    { color: #64748b; display: block; font-size: 0.58rem; }
        /* v1.6 — customer name = primary bar footer identifier */
        .labor-bar-label .lbl-customer {
            color: #e2e8f0;
            font-weight: 600;
            display: block;
            font-size: 0.62rem;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* v1.6 — RO ID tail now secondary, below the customer name */
        .labor-bar-label .lbl-id {
            color: #64748b;
            display: block;
            font-size: 0.54rem;
            letter-spacing: -0.02em;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* flash highlight when scrolled to from the chart */
        .ro-row.flash-highlight { animation: ro-flash 1.6s ease-out; }
        @keyframes ro-flash {
            0%   { background: #1e3a5f; box-shadow: inset 0 0 0 2px #fbbf24; }
            100% { background: transparent; box-shadow: inset 0 0 0 0 transparent; }
        }

        @media (max-width: 768px) {
            .labor-silo-lane { flex-direction: column; align-items: stretch; }
            .labor-silo-label { flex: 1; flex-direction: row; justify-content: space-between; }
            /* v1.5 — keep bars flex-grow on mobile too, just drop the floor */
            .labor-bar-wrap { flex: 1 1 40px; min-width: 40px; max-width: 80px; }
        }

        /* ── v1.8 Per-Silo Active Work List section ─── */
        .persilo-section {
            margin: 12px 16px;
            border: 1px solid #1e293b;
            border-radius: 10px;
            overflow: hidden;
            background: #0f172a;
        }
        .persilo-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px;

 *  Empty array = unattributed (NULL service_type, 'Shop', or unknown value). Such logs
 *  contribute to the RO total + manager total + grand total via buildLaborStats, but
 *  do NOT appear in any per-silo lane / silo subtotal / silo-context labor chip. */
function getSilosForLog(log) {
    const raw = (log && log.service_type) ? String(log.service_type).trim() : '';
    if (!raw) return [];
    return raw
        .split(',')
        .map(s => s.trim())
        .map(s => SERVICE_TYPE_TO_SILO[s])
        .filter(Boolean);
}
