// ── v1.10 Per-tech daily drill-down ───────────────────────
// Helps Roland spot under-logging: click any of the 7 day-bars on a tech tile
// to see the detail of that tech's clock-ins for that specific day.

/** YYYY-MM-DD in LOCAL time (matches the boundary at which "the work day" rolls
 *  over for staff — a 11:30 PM clock-out belongs to that calendar day, not UTC). */
function localDayKey(date) {
    if (!(date instanceof Date)) date = new Date(date);
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

/** v1.11 — Wall-clock union of an array of {start, end} time ranges.
 *  Returns total hours covered by at least one range — overlapping ranges are
 *  counted once. Active (no end) ranges are clipped at end=Date.now() by caller.
 *
 *  Example: ranges [[7:36, 17:00], [7:49, 9:39], [11:26, 15:40]] returns 9.4h
 *  (the second and third ranges are entirely inside the first — no extra time).
 *
 *  Algorithm: sort by start, sweep, merge any range whose start ≤ current end. */
function unionHoursOfRanges(ranges) {
    const intervals = (ranges || [])
        .map(r => ({ s: +new Date(r.start), e: +new Date(r.end) }))
        .filter(r => Number.isFinite(r.s) && Number.isFinite(r.e) && r.e > r.s)
        .sort((a, b) => a.s - b.s);
    if (intervals.length === 0) return 0;
    let totalMs = 0;
    let curS = intervals[0].s;
    let curE = intervals[0].e;
    for (let i = 1; i < intervals.length; i++) {
        if (intervals[i].s <= curE) {
            // Overlaps or abuts — extend current run.
            if (intervals[i].e > curE) curE = intervals[i].e;
        } else {
            totalMs += (curE - curS);
            curS = intervals[i].s;
            curE = intervals[i].e;
        }
    }
    totalMs += (curE - curS);
    return totalMs / 3600000;
}

/** v1.11 — Return Set of indices of sessions that overlap with at least one
 *  other session in the array. Two sessions overlap iff their [clock_in,
 *  clock_out] intervals intersect (touching at a single instant doesn't count).
 *  Active sessions (no clock_out) treated as ending at Date.now(). O(n^2);
 *  fine for the < 50 sessions per tech-day we'll ever see. */
function detectOverlappingSessionIndices(sessions) {
    const out = new Set();
    const ranges = (sessions || []).map(s => ({
        s: s.clock_in ? +new Date(s.clock_in) : NaN,
        e: s.clock_out ? +new Date(s.clock_out) : Date.now(),
    }));
    for (let i = 0; i < ranges.length; i++) {
        if (!Number.isFinite(ranges[i].s)) continue;
        for (let j = i + 1; j < ranges.length; j++) {
            if (!Number.isFinite(ranges[j].s)) continue;
            // Open intervals: strict inequality so two sessions that abut at the
            // same instant (back-to-back) are NOT flagged as overlapping.
            if (ranges[i].e > ranges[j].s && ranges[j].e > ranges[i].s) {
                out.add(i);
                out.add(j);
            }
        }
    }
    return out;
}

/** Group _allWeekTimeLogs into { [tech_email]: { [YYYY-MM-DD]: { sessions, rawSumHours,
 *  wallClockHours, overlapHours, totalHours } } }.
 *  Sessions are sorted by clock_in ascending inside each day. Active (clock_out=NULL)
 *  sessions count against Date.now() — matches logHours()/the rest of the report.
 *
 *  v1.11 — Three totals tracked per day:
 *    - rawSumHours    = sum of each session's duration (the old "total")
 *    - wallClockHours = union of session ranges (the actual time tech was clocked
 *                       in somewhere — the "true" workday length)
 *    - overlapHours   = rawSum - wallClock (≥ 0; large value signals tech started a
 *                       new RO without clocking out of the previous one)
 *  totalHours is aliased to wallClockHours so all existing callers (mini-bars,
 *  modal grand total, tile summary) automatically get the corrected number. */
function buildWeekByEmailDay() {
    const out = {};
    _allWeekTimeLogs.forEach(log => {
        const em = (log.tech_email || '').toLowerCase();
        if (!em || !log.clock_in) return;
        const dKey = localDayKey(log.clock_in);
        if (!out[em]) out[em] = {};
        if (!out[em][dKey]) out[em][dKey] = {
            sessions: [], rawSumHours: 0, wallClockHours: 0, overlapHours: 0, totalHours: 0,
        };
        out[em][dKey].sessions.push(log);
        out[em][dKey].rawSumHours += logHours(log);
    });
    // Sort sessions chronologically + compute wall-clock union per day.
    Object.keys(out).forEach(em => {
        Object.keys(out[em]).forEach(d => {
            const day = out[em][d];
            day.sessions.sort((a, b) => new Date(a.clock_in) - new Date(b.clock_in));
            const ranges = day.sessions
                .filter(l => l.clock_in)
                .map(l => ({ start: l.clock_in, end: l.clock_out || new Date() }));
            day.wallClockHours = unionHoursOfRanges(ranges);
            day.overlapHours = Math.max(0, day.rawSumHours - day.wallClockHours);
            // Default "totalHours" is wall-clock — that's the number that should
            // appear anywhere a single "hours worked today" figure is shown.
            day.totalHours = day.wallClockHours;
        });
    });
    return out;
}

/** Render the 7-day mini-bar grid for one tech. Days run oldest-on-the-left to
 *  today-on-the-right. Color band by daily total: green ≥8h, amber 4-8h, red >0-4h,
 *  slate exactly-0h, dim slate for future days. Today gets a purple outline. */
function buildWeekBarsForTech(email, weekByEmailDay) {
    const days = [];
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        days.push(d);
    }
    const techData = weekByEmailDay[(email || '').toLowerCase()] || {};
    const todayKey = localDayKey(today);

    const MAX_PX = 44;
    // Per-tech scale based on this tech's own peak day (so a 2h day reads "low"
    // for a normal full-time tech but "okay" for a part-timer). Cap at 12h so a
    // single freak day doesn't compress the rest into nothing.
    let peak = 0;
    days.forEach(d => {
        const h = (techData[localDayKey(d)] || {}).totalHours || 0;
        if (h > peak) peak = h;
    });
    if (peak < 8) peak = 8;
    if (peak > 12) peak = 12;

    const dayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const barsHtml = days.map(d => {
        const dKey = localDayKey(d);
        const dayHours = (techData[dKey] || {}).totalHours || 0;
        const dayName = dayLabels[d.getDay()];
        const isToday = (dKey === todayKey);
        let band;
        if (dayHours <= 0)        band = 'tw-zero';
        else if (dayHours >= 8)   band = 'tw-good';
        else if (dayHours >= 4)   band = 'tw-ok';
        else                      band = 'tw-low';
        const heightPx = dayHours > 0
            ? Math.max(4, Math.round((Math.min(dayHours, peak) / peak) * MAX_PX))
            : 3;
        const todayCls = isToday ? ' tw-today' : '';
        const hrsLabel = dayHours > 0
            ? dayHours.toFixed(1) + 'h'
            : '—';
        const hrsCls = dayHours > 0 ? '' : ' tw-zero-hrs';
        const tipDate = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        const tip = `${tipDate}: ${dayHours > 0 ? dayHours.toFixed(1) + 'h logged' : 'no time logged'} — click for detail`;
        // stopPropagation so clicking a bar doesn't also toggle the tile collapse
        return `
            <div class="tw-bar" title="${escAttr(tip)}"
                 onclick="event.stopPropagation(); openTechDayModal('${escAttr(email)}','${dKey}')">
                <div class="tw-bar-day">${dayName}</div>
                <div class="tw-bar-col ${band}${todayCls}" style="height:${heightPx}px;"></div>
                <div class="tw-bar-hrs${hrsCls}">${hrsLabel}</div>
            </div>
        `;
    }).join('');

    return `
        <div class="tile-week-section">
            <div class="tile-week-header">
                <span>&#128197; Last 7 days</span>
                <span class="tw-hint">click a day &rarr;</span>
            </div>
            <div class="tile-week-bars">${barsHtml}</div>
        </div>
    `;
}

// Modal singleton — open one drill-down at a time.
function openTechDayModal(email, dayKey) {
    const overlay = document.getElementById('techDayOverlay');
    if (!overlay) return;
    const lcEmail = (email || '').toLowerCase();
    const weekByEmailDay = buildWeekByEmailDay();
    // v1.11 — dayData includes sessions + rawSumHours + wallClockHours + overlapHours
    const dayData = (weekByEmailDay[lcEmail] || {})[dayKey]
        || { sessions: [], rawSumHours: 0, wallClockHours: 0, overlapHours: 0, totalHours: 0 };

    // Tech display name + role from staff lookup (falls back to email-prefix titlecase).
    const staff = _allStaff.find(s => (s.email || '').toLowerCase() === lcEmail);
    const techName = staff?.name || lcEmail.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    // Date pretty-print + day-of-week derivation from the dayKey itself
    // (avoids timezone drift — dayKey is local YYYY-MM-DD).
    const [yy, mm, dd] = dayKey.split('-').map(Number);
    const dateObj = new Date(yy, mm - 1, dd);
    const datePretty = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    const dow = dateObj.getDay();
    const isWorkday = (dow >= 1 && dow <= 5);

    // v1.11 — Overlap warning banner. Fires whenever overlap > 3 min, regardless
    // of date. Explains the gap between raw-sum and wall-clock and tells the
    // admin what root cause to look for. Renders ABOVE the coaching banner so
    // the admin sees data-quality concerns before behavioral concerns.
    const overlapBannerHtml = (dayData.overlapHours > 0.05)
        ? `<div class="techday-overlap-banner">
            &#9888; <strong>${dayData.overlapHours.toFixed(1)}h of overlapping clock-ins.</strong>
            Wall-clock time worked: <strong>${dayData.wallClockHours.toFixed(1)}h</strong> &middot;
            Raw session sum: ${dayData.rawSumHours.toFixed(1)}h.
            <div class="techday-overlap-help">Usually means ${escHtml(techName)} started a new RO without clocking out of the previous one (often a 5 PM auto-close on the orphan session). Look for the OVERLAP badges below to see which sessions are stepping on each other.</div>
          </div>`
        : '';

    // Coaching banner: signal under-logging on a workday past mid-afternoon.
    // Only show for TODAY (the only date where "by now" is meaningful).
    // v1.11 — Threshold compares against wallClockHours (the real workday
    // length), not raw sum. Without this, an over-counted day could look
    // healthy at 12h raw sum when wall-clock was actually 5h.
    const todayKey = localDayKey(new Date());
    const showCoachBanner =
        isWorkday &&
        dayKey === todayKey &&
        dayData.wallClockHours < 6 &&
        new Date().getHours() >= 15;
    const coachBannerHtml = showCoachBanner
        ? `<div class="techday-coach-banner">&#9888; Only ${dayData.wallClockHours.toFixed(1)}h of actual clocked-in time so far on a workday past 3 PM. May warrant a check-in with ${escHtml(techName)} about login discipline or workload.</div>`
        : '';

    // v1.11 — pre-compute overlap indices once for the per-row OVERLAP badge.
    const overlappingIdx = detectOverlappingSessionIndices(dayData.sessions);

    // Sessions table rows.
    let bodyHtml;
    if (dayData.sessions.length === 0) {
        bodyHtml = '<div class="techday-empty">No clock-ins recorded for this day.</div>';
    } else {
        const rowsHtml = dayData.sessions.map((s, i) => {
            const inTime = s.clock_in
                ? new Date(s.clock_in).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
                : '';
            const outTime = s.clock_out
                ? new Date(s.clock_out).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
                : '';
            const isActive = !s.clock_out;
            const dur = isActive
                ? ((Date.now() - new Date(s.clock_in)) / 3600000)
                : ((new Date(s.clock_out) - new Date(s.clock_in)) / 3600000);
            const durStr = dur.toFixed(1) + 'h';
            const ro = s.repair_orders;
            const roLabel = ro
                ? `${ro.customer_name || 'Unknown'} (${ro.ro_id || ''})`
                : 'Unknown RO';
            const svc = s.service_type || '';
            const cr = s.close_reason || '';
            // v1.11 — combine row classes (overlap can stack with auto/recalc/active)
            const rowClasses = [];
            const badges = [];
            if (overlappingIdx.has(i)) {
                rowClasses.push('row-overlap');
                badges.push('<span class="techday-badge b-overlap" title="This session overlaps another clock-in">&#9888; OVERLAP</span>');
            }
            if (isActive) {
                rowClasses.push('row-active');
                badges.push('<span class="techday-badge b-active">ACTIVE</span>');
            } else if (cr === 'auto_eod_5pm' || cr === 'auto_eod') {
                rowClasses.push('row-auto');
                const lbl = cr === 'auto_eod_5pm' ? '5pm auto' : '12h auto';
                badges.push(`<span class="techday-badge b-auto">&#9888; ${lbl}</span>`);
            } else if (cr === 'auto_replaced_by_new_session') {
                // v1.12 — GH#33 Phase 4 trigger fired: tech started a new RO without clocking out.
                rowClasses.push('row-switched');
                badges.push('<span class="techday-badge b-switched" title="Tech clocked into a new RO without clocking out — server trigger auto-closed this session">&#8631; switched RO</span>');
            } else if (cr === 'auto_eod_8h_recalc') {
                rowClasses.push('row-recalc');
                badges.push('<span class="techday-badge b-recalc">&#10003; 8h recalc</span>');
            } else if (cr === 'auto_cleanup_pre_uniq_index') {
                rowClasses.push('row-recalc');
                badges.push('<span class="techday-badge b-recalc">&#10003; cleanup</span>');
            }
            return `
                <tr class="${rowClasses.join(' ')}">
                    <td class="td-time">${inTime}${isActive ? ' &rarr; now' : ' &rarr; ' + outTime}</td>
                    <td>${escHtml(roLabel)}${badges.join('')}</td>
                    <td>${escHtml(svc)}</td>
                    <td class="td-dur">${durStr}</td>
                </tr>
            `;
        }).join('');
        // v1.11 — Summary chip headlines wall-clock; raw sum surfaced in a smaller
        // line below when it differs (so the user can see the over-count signal
        // without losing access to the raw number).
        const showRaw = dayData.overlapHours > 0.05;
        bodyHtml = `
            <table class="techday-table">
                <thead><tr><th>Window</th><th>RO</th><th>Service</th><th>Hours</th></tr></thead>
                <tbody>${rowsHtml}</tbody>
            </table>
            <div class="techday-summary">
                <span class="ts-label">${dayData.sessions.length} session${dayData.sessions.length !== 1 ? 's' : ''}</span>
                <span class="ts-total" title="Wall-clock time — overlapping sessions counted once">${dayData.wallClockHours.toFixed(1)}h wall-clock</span>
            </div>
            ${showRaw ? `<div class="techday-summary-aux">Raw session sum (with double-counts): ${dayData.rawSumHours.toFixed(1)}h</div>` : ''}
        `;
    }

    overlay.innerHTML = `
        <div class="techday-modal" onclick="event.stopPropagation()">
            <div class="techday-header">
                <div>
                    <div class="techday-title">${escHtml(techName)}</div>
                    <div class="techday-sub">${escHtml(datePretty)}</div>
                </div>
                <button class="techday-close" onclick="closeTechDayModal()" aria-label="Close">&times;</button>
            </div>
            <div class="techday-body">
                ${overlapBannerHtml}
                ${coachBannerHtml}
                ${bodyHtml}
            </div>
        </div>
    `;
    overlay.classList.add('open');
    // ESC + click-outside dismissal handlers (re-bound each open is fine).
    overlay.onclick = (e) => { if (e.target === overlay) closeTechDayModal(); };
    document.addEventListener('keydown', _techDayEscHandler);
}
function closeTechDayModal() {
    const overlay = document.getElementById('techDayOverlay');
    if (overlay) overlay.classList.remove('open');
    document.removeEventListener('keydown', _techDayEscHandler);
}
function _techDayEscHandler(e) {
    if (e.key === 'Escape') closeTechDayModal();
}

function renderRORow(item, idx, roLookup, logsByRO, mIdx, siloKey, laborByRO, laborByROSilo) {
    const ro = roLookup[item.ro_id] || {};
    const logs = logsByRO[item.ro_id] || [];
    const rowId = `ro_${mIdx}_${siloKey}_${idx}`;
    // v1.10 — When this row is rendered inside a real silo block (Sr Manager silo
    // tab OR Per-Silo Active Work List), the labor chip + total-hours chip should
    // reflect ONLY that silo's share, not the whole RO. 'flat' (regular manager
    // accordion) and '_unsorted' (Sr Manager unsorted tab) keep the full-RO totals
    // since there's no silo context to narrow to.
    const isSiloScoped = !!(siloKey && SILO_MAP[siloKey]);
    const siloShare = isSiloScoped
        ? getSiloLaborForRO(laborByROSilo, item.ro_id, siloKey)
        : null;

    // KPIs
    // Match dashboard logic: use date_arrived if set, otherwise date_received; skip if Not On Lot with no arrival
    const startDate = ro.date_arrived || ro.date_received;
    const daysOnLot = (ro.status === 'Not On Lot' && !ro.date_arrived) ? null
        : startDate ? Math.floor((Date.now() - new Date(startDate).getTime()) / 86400000) : null;
    let daysChip = '';
    if (daysOnLot !== null) {
        const cls = daysOnLot <= 30 ? 'chip-days-green' : daysOnLot <= 50 ? 'chip-days-orange' : 'chip-days-red';
        daysChip = `<span class="chip ${cls}">${daysOnLot}d</span>`;
    }

    const dollarChip = ro.dollar_value
        ? `<span class="chip chip-dollar">$${Number(ro.dollar_value).toLocaleString()}</span>`
        : '';

    // v1.3 — labor-cost chip per RO.
    // Color gradient relative to dollar_value when available:
    //   < 25% → green · 25–50% → amber · > 50% → red
    // No dollar_value → neutral zero-style chip (still shows the $ amount).
    // v1.10 — In a silo context, the chip shows ONLY this silo's labor share
    // (e.g. "Roof: $260" not full RO "$540"). Tooltip clarifies the scope and,
    // when the silo share differs from the full-RO total, shows the full total
    // alongside so the user can see the wider context without leaving the row.
    const fullLaborEntry = (laborByRO && laborByRO[item.ro_id]) || null;
    const fullLaborCost = fullLaborEntry ? fullLaborEntry.cost : 0;
    const laborCost = isSiloScoped ? siloShare.cost : fullLaborCost;
    let laborChip = '';
    if (laborCost > 0) {
        const dv = Number(ro.dollar_value) || 0;
        let cls;
        if (dv > 0) {
            const ratio = laborCost / dv;
            cls = ratio < 0.25 ? 'chip-labor-green' : ratio < 0.50 ? 'chip-labor-amber' : 'chip-labor-red';
        } else {
            // No RO $ benchmark — use severity buckets by absolute labor dollars.
            cls = laborCost < 250 ? 'chip-labor-green' : laborCost < 750 ? 'chip-labor-amber' : 'chip-labor-red';
        }
        const chipTitle = isSiloScoped
            ? ((SILO_MAP[siloKey]?.label || siloKey) + ' labor only (hours × tech rate)'
                + (fullLaborCost > laborCost + 0.01 ? ' — RO total across all silos: ' + fmtUsd(fullLaborCost) : ''))
            : 'Cumulative labor cost for this RO (hours × tech rate)';
        laborChip = `<span class="chip ${cls}" title="${escAttr(chipTitle)}">&#129505; ${fmtUsd(laborCost)}</span>`;
    } else if (logs.length > 0 && !isSiloScoped) {
        // Logs exist but rate map missing / all testers → show $0 for transparency.
        // (Don't show in silo context — silo with $0 just means no logs tagged to that silo.)
        laborChip = `<span class="chip chip-labor-zero" title="Time logged but no priced rate in staff.hourly_rate">&#129505; $0</span>`;
    }

    // Time log summary
    // v1.10 — Hours chip is now silo-scoped when in a silo lane (matches the
    // labor chip behavior). Active-techs chip stays full-RO since "0 active"
    // means nobody is currently clocked into the RO at all — that signal
    // doesn't depend on silo attribution.
    const activeLogs = logs.filter(l => !l.clock_out);
    const activeTechNames = [...new Set(activeLogs.map(l => l.tech_email?.split('@')[0] || 'Unknown'))];
    const fullTotalHours = logs.reduce((sum, l) => {
        if (l.clock_in && l.clock_out) return sum + (new Date(l.clock_out) - new Date(l.clock_in)) / 3600000;
        return sum;
    }, 0);
    const totalHours = isSiloScoped ? siloShare.hours : fullTotalHours;

    const techChip = activeTechNames.length > 0
        ? `<span class="chip chip-techs-active">${activeTechNames.length} active</span>`
        : `<span class="chip chip-techs-none">0 active</span>`;

    const hoursChipTitle = isSiloScoped
        ? ((SILO_MAP[siloKey]?.label || siloKey) + ' hours only'
            + (fullTotalHours > totalHours + 0.01 ? ' — RO total across all silos: ' + fullTotalHours.toFixed(1) + 'h' : ''))
        : 'Total time logged on this RO';
    const hoursChip = totalHours > 0
        ? `<span class="chip chip-hours" title="${escAttr(hoursChipTitle)}">${totalHours.toFixed(1)}h</span>`
        : '';

    const roNumber = ro.ro_id || item.ro_name?.split(' — ')[1] || '';
    const customerName = ro.customer_name || item.ro_name?.split(' — ')[0] || 'Unknown';
    const rv = ro.rv || '';

    // Time detail table
    let timeDetailHtml = '';
    if (logs.length > 0) {
        const rows = logs.slice(0, 50).map(l => {
            const techName = l.tech_name || (l.tech_email || '').split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            const dateStr = l.clock_in ? new Date(l.clock_in).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
            const inTime = l.clock_in ? new Date(l.clock_in).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
            const outTime = l.clock_out ? new Date(l.clock_out).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
            const dur = l.clock_in && l.clock_out
                ? ((new Date(l.clock_out) - new Date(l.clock_in)) / 3600000).toFixed(1) + 'h'
                : '';
            const isActive = !l.clock_out;
            return `<tr class="${isActive ? 'active-row' : ''}">
                <td>${techName}</td>
                <td>${dateStr}</td>
                <td>${inTime}</td>
                <td>${isActive ? '<span class="active-badge">ACTIVE</span>' : outTime}</td>
                <td>${isActive ? '' : dur}</td>
            </tr>`;
        }).join('');
        timeDetailHtml = `
            <table>
                <thead><tr><th>Tech</th><th>Date</th><th>In</th><th>Out</th><th>Hours</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>`;
    } else {
        timeDetailHtml = '<div style="color:#475569;font-size:0.75rem;padding:6px 0;">No time entries logged</div>';
    }

    return `
        <div class="ro-row" data-ro-id="${item.ro_id || ''}">
            <div class="ro-row-main" onclick="toggleRODetail('${rowId}')">
                <span class="ro-priority">${idx + 1}</span>
                <span class="ro-id">${roNumber}</span>
                <span class="ro-customer">${escHtml(customerName)}</span>
                <span class="ro-rv">${escHtml(rv)}</span>
                <div class="kpi-chips">
                    ${daysChip}
                    ${dollarChip}
                    ${laborChip}
                    ${techChip}
                    ${hoursChip}
                </div>
                <span class="ro-expand" id="exp_${rowId}">&#9660;</span>
            </div>
            <div class="time-detail" id="det_${rowId}">
                ${timeDetailHtml}
            </div>
        </div>
    `;
}

// ── Interaction ──────────────────────────────────────────
function toggleManager(mIdx) {
    const body = document.getElementById('mBody' + mIdx);
    const chev = document.getElementById('mChev' + mIdx);
    if (!body) return;
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open');
    if (chev) chev.classList.toggle('open');
}

function toggleRODetail(rowId) {
    const det = document.getElementById('det_' + rowId);
    const exp = document.getElementById('exp_' + rowId);
    if (!det) return;
    det.classList.toggle('open');
    if (exp) exp.classList.toggle('open');
}

function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

window.addEventListener('load', () => {
    // Wait for Google Identity Services to load
    const checkGis = setInterval(() => {
        if (typeof google !== 'undefined' && google.accounts) {
            clearInterval(checkGis);
            initAuth();
        }
    }, 200);
    // Timeout fallback
    setTimeout(() => {
        clearInterval(checkGis);
        if (!currentUser) initAuth();
    }, 5000);
});

            </select>
            <label style="display:block;color:#fbbf24;font-size:0.8rem;font-weight:600;margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;">DESCRIBE YOUR WISH</label>
            <textarea id="erDescription" placeholder="What would you like to see improved or added?" style="width:100%;min-height:120px;padding:12px;background:#0f172a;color:white;border:1px solid #334155;border-radius:8px;font-size:0.95rem;resize:vertical;font-family:'Barlow Condensed',sans-serif;box-sizing:border-box;"></textarea>
            <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
                <button onclick="startERDictation()" style="background:#1e3a5f;color:#93c5fd;border:1px solid #334155;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:0.85rem;font-family:'Barlow Condensed',sans-serif;display:flex;align-items:center;gap:6px;"><span style="font-size:1.1rem;">🎤</span> Voice Dictation</button>
                <span id="erDictationStatus" style="font-size:0.8rem;color:#6b7280;"></span>
            </div>
            <button onclick="submitEnhancementRequest()" style="width:100%;margin-top:20px;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;">✨ Submit Wish</button>
        </div>
    </div>
</div>
<script>
function openERModal(){document.getElementById('erModalOverlay').style.display='flex';document.getElementById('erDescription').value='';document.getElementById('erDictationStatus').textContent='';}
function closeERModal(){document.getElementById('erModalOverlay').style.display='none';}
function startERDictation(){if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Voice dictation not supported. Use Chrome or Safari.');return;}const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const r=new SR();r.continuous=false;r.interimResults=false;r.lang='en-US';const s=document.getElementById('erDictationStatus'),inp=document.getElementById('erDescription');r.onstart=()=>{if(s){s.textContent='🎤 Listening...';s.style.color='#10b981';}};r.onresult=(e)=>{const t=e.results[0][0].transcript;if(inp){inp.value=inp.value?inp.value+' '+t:t;}if(s){s.textContent='✅ Transcribed!';s.style.color='#10b981';setTimeout(()=>{s.textContent='';},3000);}};r.onerror=(e)=>{if(s){s.textContent='❌ Error: '+e.error;s.style.color='#dc2626';setTimeout(()=>{s.textContent='';},3000);}};r.onend=()=>{if(s&&s.textContent.includes('Listening'))s.textContent='';};r.start();}
async function submitEnhancementRequest(){const desc=document.getElementById('erDescription').value.trim();const cat=document.getElementById('erCategory').value;if(!desc){alert('Please describe your request.');return;}const sb=getSB();if(!sb||!supabaseSession){alert('You must be signed in.');return;}const email=supabaseSession.user?.email||'unknown';const name=currentUser?.name||supabaseSession.user?.user_metadata?.full_name||email;try{const{error}=await sb.from('enhancement_requests').insert({submitted_by:email,submitted_by_name:name,source_page:'worklist-report',category:cat,description:desc});if(error)throw error;closeERModal();const toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:90px;left:24px;z-index:10051;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e;padding:12px 20px;border-radius:10px;font-weight:700;font-family:Barlow Condensed,sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.3);';toast.textContent='🪔 Wish submitted! Roland will review it.';document.body.appendChild(toast);setTimeout(()=>{toast.style.opacity='0';toast.style.transition='opacity 0.3s';setTimeout(()=>toast.remove(),300);},4000);}catch(err){console.error('ER submit error:',err);alert('Error: '+(err.message||err));}}
</script>
</body>
</html>
