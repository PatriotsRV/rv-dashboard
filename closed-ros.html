    </style>

<script>
// ── Constants ────────────────────────────────────────────
const SUPABASE_URL = 'https://axfejhudchdejoiwaetq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4ZmVqaHVkY2hkZWpvaXdhZXRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTE2NzEsImV4cCI6MjA4OTM2NzY3MX0.CF7XxtXOHg6Zpsb31m55YsMVd2QHSE5L3t7_FtMFfxY';
const GOOGLE_CLIENT_ID = '971946834908-fqhmdrie6ntt0mmmbh4rkpaop8edvgr8.apps.googleusercontent.com';

const ADMIN_EMAILS = ['roland@patriotsrvservices.com', 'lynn@patriotsrvservices.com'];
const SR_MANAGER_EMAILS = ['ryan@patriotsrvservices.com', 'kevin@patriotsrvservices.com', 'sofia@patriotsrvservices.com'];
const MANAGER_EMAILS = [
    'ryan@patriotsrvservices.com',
    'mauricio@patriotsrvservices.com',
    'jason@patriotsrvservices.com',
    'andrew@patriotsrvservices.com',
    'solar@patriotsrvservices.com',
    'bobby@patriotsrvservices.com',
    'brandon@patriotsrvservices.com',
];

const PAGE_SIZE = 24;

// ── State ────────────────────────────────────────────────
let _sb = null;
let supabaseSession = null;
let currentUser = null;
let allCashiered = [];
let filteredCashiered = [];
let currentPage = 1;

function getSB() {
    if (!_sb) {
        _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true, autoRefreshToken: true, storageKey: 'prvs_closed_auth' }
        });
    }
    return _sb;
}

// ── Auth ─────────────────────────────────────────────────
async function initAuth() {
    getSB().auth.onAuthStateChange((event, session) => {
        if (event === 'TOKEN_REFRESHED' || event === 'SIGNED_IN') {
            supabaseSession = session;
        } else if (event === 'SIGNED_OUT') {
            supabaseSession = null;
            currentUser = null;
        }
    });

    const { data: { session } } = await getSB().auth.getSession();
    if (session) {
        supabaseSession = session;
        currentUser = {
            email: session.user.email,
            name: session.user.user_metadata?.full_name || session.user.email,
        };
        localStorage.setItem('prvs_user_identity', JSON.stringify(currentUser));
        showApp();
        return;
    }

    // No stored Supabase session — require Google sign-in
    // (localStorage identity alone is not enough — DB writes need an authenticated session)
    initGoogleSignIn();
}

function initGoogleSignIn() {
    if (typeof google === 'undefined' || !google.accounts) {
        setTimeout(initGoogleSignIn, 200);
        return;
    }

    // Generate nonce
    const rawBytes = new Uint8Array(16);
    crypto.getRandomValues(rawBytes);
    const rawNonce = Array.from(rawBytes).map(b => b.toString(16).padStart(2, '0')).join('');
    window._rawNonce = rawNonce;

    crypto.subtle.digest('SHA-256', new TextEncoder().encode(rawNonce)).then(hash => {
        const hashedNonce = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');

        google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: handleGoogleCredential,
            nonce: hashedNonce,
        });

        google.accounts.id.renderButton(
            document.getElementById('g_id_onload'),
            { theme: 'filled_blue', size: 'large', shape: 'pill', text: 'signin_with' }
        );
    });
}

async function handleGoogleCredential(response) {
    try {
        const { data, error } = await getSB().auth.signInWithIdToken({
            provider: 'google',
            token: response.credential,
            nonce: window._rawNonce,
        });
        if (error) throw error;

        supabaseSession = data.session;
        currentUser = {
            email: data.user.email,
            name: data.user.user_metadata?.full_name || data.user.email,
        };
        localStorage.setItem('prvs_user_identity', JSON.stringify(currentUser));
        showApp();
    } catch (err) {
        console.error('Auth error:', err);
        alert('Sign-in failed: ' + (err.message || err));
    }
}

function isAdmin() {
    const email = (currentUser?.email || supabaseSession?.user?.email || '').toLowerCase();
    return ADMIN_EMAILS.includes(email);
}

function isManagerOrAdmin() {
    const email = (currentUser?.email || supabaseSession?.user?.email || '').toLowerCase();
    return ADMIN_EMAILS.includes(email) || SR_MANAGER_EMAILS.includes(email) || MANAGER_EMAILS.includes(email);
}

function showApp() {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    // Set role badge
    const badge = document.getElementById('userBadge');
    const name = currentUser?.name || currentUser?.email || '';
    if (isAdmin()) {
        badge.className = 'badge-role badge-admin';
        badge.textContent = name + ' (Admin)';
    } else if (isManagerOrAdmin()) {
        badge.className = 'badge-role badge-manager';
        badge.textContent = name + ' (Manager)';
    } else {
        badge.className = 'badge-role badge-user';
        badge.textContent = name;
    }

    loadCashieredData();
}

// ── Data Loading ─────────────────────────────────────────
async function loadCashieredData() {
    document.getElementById('loadingState').style.display = 'block';

    try {
        const { data, error } = await getSB()
            .from('cashiered')
            .select('*')
            .order('archived_at', { ascending: false });

        if (error) throw error;
        allCashiered = data || [];
        populateFilters();
        applyFilters();
        renderStats();
    } catch (err) {
        console.error('Load error:', err);
        document.getElementById('cardContainer').innerHTML =
            '<div class="empty-state"><p>Error loading data: ' + (err.message || err) + '</p></div>';
    }

    document.getElementById('loadingState').style.display = 'none';
}

function populateFilters() {
    // Repair types
    const types = [...new Set(allCashiered.map(r => r.repair_type).filter(Boolean))].sort();
    const typeSelect = document.getElementById('filterRepairType');
    typeSelect.innerHTML = '<option value="">All Repair Types</option>';
    types.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t; opt.textContent = t;
        typeSelect.appendChild(opt);
    });

    // Week labels
    const weeks = [...new Set(allCashiered.map(r => r.week_label).filter(Boolean))].sort().reverse();
    const weekSelect = document.getElementById('filterWeek');
    weekSelect.innerHTML = '<option value="">All Weeks</option>';
    weeks.forEach(w => {
        const opt = document.createElement('option');
        opt.value = w; opt.textContent = w;
        weekSelect.appendChild(opt);
    });
}

function renderStats() {
    const total = allCashiered.length;
    const totalValue = allCashiered.reduce((sum, r) => sum + (parseFloat(r.dollar_value) || 0), 0);
    const avgDays = total > 0
        ? Math.round(allCashiered.reduce((sum, r) => sum + (r.days_on_lot || 0), 0) / total)
        : 0;

    // Closed this week
    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay());
    weekStart.setHours(0, 0, 0, 0);
    const thisWeek = allCashiered.filter(r => new Date(r.archived_at) >= weekStart).length;

    document.getElementById('statsBar').innerHTML = `
        <div class="stat-chip"><strong>${total}</strong> Total Closed</div>
        <div class="stat-chip"><strong>${thisWeek}</strong> Closed This Week</div>
        <div class="stat-chip"><strong>$${totalValue.toLocaleString()}</strong> Total Value</div>
        <div class="stat-chip"><strong>${avgDays}</strong> Avg Days on Lot</div>
        <div class="stat-chip"><strong>${filteredCashiered.length}</strong> Showing</div>
    `;
}

// ── Filter + Sort ────────────────────────────────────────
function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const repairType = document.getElementById('filterRepairType').value;
    const weekLabel = document.getElementById('filterWeek').value;
    const sortBy = document.getElementById('sortBy').value;

    filteredCashiered = allCashiered.filter(r => {
        if (repairType && r.repair_type !== repairType) return false;
        if (weekLabel && r.week_label !== weekLabel) return false;
        if (search) {
            const haystack = [
                r.customer_name, r.ro_id, r.rv, r.vin, r.technician,
                r.description, r.repair_type, r.email, r.phone,
            ].filter(Boolean).join(' ').toLowerCase();
            if (!haystack.includes(search)) return false;
        }
        return true;
    });

    // Sort
    filteredCashiered.sort((a, b) => {
        switch (sortBy) {
            case 'archived_at_asc':
                return new Date(a.archived_at) - new Date(b.archived_at);
            case 'customer_name_asc':
                return (a.customer_name || '').localeCompare(b.customer_name || '');
            case 'dollar_value_desc':
                return (parseFloat(b.dollar_value) || 0) - (parseFloat(a.dollar_value) || 0);
            case 'days_on_lot_desc':
                return (b.days_on_lot || 0) - (a.days_on_lot || 0);
            default: // archived_at_desc
                return new Date(b.archived_at) - new Date(a.archived_at);
        }
    });

    currentPage = 1;
    renderCards();
    renderStats();
}

// ── Card Rendering ───────────────────────────────────────
function renderCards() {
    const container = document.getElementById('cardContainer');
    const totalPages = Math.ceil(filteredCashiered.length / PAGE_SIZE);
    const start = (currentPage - 1) * PAGE_SIZE;
    const pageItems = filteredCashiered.slice(start, start + PAGE_SIZE);

    if (filteredCashiered.length === 0) {
        container.innerHTML = '<div class="empty-state"><p style="font-size:1.2rem;">No closed ROs found</p><p style="margin-top:8px;font-size:0.85rem;">Try adjusting your search or filters</p></div>';
        document.getElementById('paginationBar').style.display = 'none';
        return;
    }

    const canReactivate = isManagerOrAdmin();

    let html = '<div class="card-grid">';
    pageItems.forEach(ro => {
        const dateClosed = ro.date_closed
            ? new Date(ro.date_closed + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            : '—';
        const dollarStr = ro.dollar_value ? '$' + parseFloat(ro.dollar_value).toLocaleString() : '';
        const desc = ro.description
            ? (ro.description.length > 80 ? ro.description.substring(0, 80) + '...' : ro.description)
            : '';

        html += `
        <div class="ro-card">
            ${ro.photo_url
                ? `<img class="ro-card-photo" src="${escapeHtml(ro.photo_url)}" alt="RV Photo" loading="lazy" onerror="this.outerHTML='<div class=\\'ro-card-photo-placeholder\\'>&#128663;</div>'">`
                : '<div class="ro-card-photo-placeholder">&#128663;</div>'
            }
            <div class="ro-card-body" onclick="openDetailModal('${ro.id}')" style="cursor:pointer;">
                <div class="ro-card-header">
                    <div class="ro-card-customer">${escapeHtml(ro.customer_name || 'Unknown')}</div>
                    <div class="ro-card-id">${escapeHtml(ro.ro_id || '—')}</div>
                </div>
                <div class="ro-card-rv">${escapeHtml(ro.rv || 'No RV info')}</div>
                ${desc ? `<div class="ro-card-desc">${escapeHtml(desc)}</div>` : ''}
                <div class="ro-card-meta">
                    ${ro.repair_type ? `<span class="meta-chip chip-repair-type">${escapeHtml(ro.repair_type)}</span>` : ''}
                    <span class="meta-chip chip-date-closed">Closed ${dateClosed}</span>
                    ${ro.days_on_lot ? `<span class="meta-chip chip-days">${ro.days_on_lot}d on lot</span>` : ''}
                    ${dollarStr ? `<span class="meta-chip chip-dollar">${dollarStr}</span>` : ''}
                </div>
            </div>
            <div class="ro-card-footer">
                <div class="ro-card-tech">${ro.technician ? '&#128736; ' + escapeHtml(ro.technician) : ''}</div>
                ${canReactivate
                    ? `<button class="btn-reactivate" onclick="event.stopPropagation();reactivateRO('${ro.id}')">&#9654; Reactivate</button>`
                    : ''
                }
            </div>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;

    // Pagination
    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const bar = document.getElementById('paginationBar');
    if (totalPages <= 1) {
        bar.style.display = 'none';
        return;
    }
    bar.style.display = 'flex';
    let html = `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&laquo; Prev</button>`;

    // Show max 7 page buttons
    let startP = Math.max(1, currentPage - 3);
    let endP = Math.min(totalPages, startP + 6);
    if (endP - startP < 6) startP = Math.max(1, endP - 6);

    for (let p = startP; p <= endP; p++) {
        html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
    }

    html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next &raquo;</button>`;
    bar.innerHTML = html;
}

function goToPage(p) {
    const totalPages = Math.ceil(filteredCashiered.length / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    renderCards();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Detail Modal ─────────────────────────────────────────
function openDetailModal(id) {
    const ro = allCashiered.find(r => r.id === id);
    if (!ro) return;

    document.getElementById('detailModalTitle').textContent = (ro.ro_id || 'RO') + ' — ' + (ro.customer_name || 'Unknown');

    const fields = [
        ['RO ID', ro.ro_id],
        ['Customer', ro.customer_name],
        ['Phone', ro.phone],
        ['Email', ro.email],
        ['Address', ro.address],
        ['RV', ro.rv],
        ['VIN', ro.vin],
        ['Repair Type', ro.repair_type],
        ['Description', ro.description],
        ['Technician', ro.technician],
        ['Status (at close)', ro.status],
        ['Urgency', ro.urgency],
        ['Customer Type', ro.customer_type],
        ['RO Type', ro.ro_type],
        ['% Complete', ro.pct_complete != null ? ro.pct_complete + '%' : null],
        ['Dollar Value', ro.dollar_value ? '$' + parseFloat(ro.dollar_value).toLocaleString() : null],
        ['Date Received', formatDate(ro.date_received)],
        ['Date Arrived', formatDate(ro.date_arrived)],
        ['Promised Date', formatDate(ro.promised_date)],
        ['Date Closed', formatDate(ro.date_closed)],
        ['Days on Lot', ro.days_on_lot],
        ['Week', ro.week_label],
        ['Archived At', ro.archived_at ? new Date(ro.archived_at).toLocaleString('en-US', { timeZone: 'America/Chicago' }) : null],
    ];

    let html = '';
    if (ro.photo_url) {
        html += `<img src="${escapeHtml(ro.photo_url)}" style="width:100%;max-height:300px;object-fit:cover;border-radius:8px;margin-bottom:16px;" onerror="this.style.display='none'">`;
    }

    fields.forEach(([label, value]) => {
        if (value == null || value === '' || value === 'null') return;
        html += `<div class="detail-row"><div class="detail-label">${escapeHtml(label)}</div><div class="detail-value">${escapeHtml(String(value))}</div></div>`;
    });

    if (isManagerOrAdmin()) {
        html += `<div style="margin-top:20px;padding-top:16px;border-top:1px solid #334155;text-align:center;">
            <button class="btn-reactivate" onclick="reactivateRO('${ro.id}');closeDetailModal();" style="font-size:1rem;padding:12px 28px;">&#9654; Reactivate this RO</button>
        </div>`;
    }

    document.getElementById('detailModalBody').innerHTML = html;
    document.getElementById('detailModal').classList.add('open');
}

function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('open');
}

function formatDate(d) {
    if (!d) return null;
    try {
        return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch { return d; }
}

// ── Reactivate ───────────────────────────────────────────
async function reactivateRO(cashieredId) {
    if (!isManagerOrAdmin()) {
        alert('Only managers and admins can reactivate ROs.');
        return;
    }

    const ro = allCashiered.find(r => r.id === cashieredId);
    if (!ro) { alert('RO not found.'); return; }

    if (!confirm(`Reactivate RO ${ro.ro_id} (${ro.customer_name}) back to the active dashboard?`)) return;

    try {
        // 1. Insert back into repair_orders
        const { data: inserted, error: insertErr } = await getSB()
            .from('repair_orders')
            .insert({
                ro_id:           ro.ro_id,
                customer_name:   ro.customer_name,
                phone:           ro.phone,
                email:           ro.email,
                address:         ro.address,
                rv:              ro.rv,
                vin:             ro.vin,
                repair_type:     ro.repair_type,
                description:     ro.description,
                technician:      ro.technician,
                date_received:   ro.date_received || null,
                date_arrived:    ro.date_arrived || null,
                promised_date:   ro.promised_date || null,
                pct_complete:    ro.pct_complete || 0,
                dollar_value:    ro.dollar_value || null,
                status:          'In Progress',
                urgency:         ro.urgency,
                customer_type:   ro.customer_type,
                ro_type:         ro.ro_type || 'standard',
                photo_url:       ro.photo_url,
                insurance_data:  ro.insurance_data || null,
            })
            .select()
            .single();

        if (insertErr) throw insertErr;

        // 2. Delete from cashiered
        const { error: delErr } = await getSB()
            .from('cashiered')
            .delete()
            .eq('id', cashieredId);

        if (delErr) throw delErr;

        // 3. Remove from local state + re-render
        allCashiered = allCashiered.filter(r => r.id !== cashieredId);
        applyFilters();

        // Toast
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;bottom:90px;right:24px;z-index:10051;background:linear-gradient(135deg,#10b981,#059669);color:white;padding:14px 22px;border-radius:10px;font-weight:700;font-family:Barlow Condensed,sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-size:1rem;';
        toast.textContent = '✅ ' + ro.ro_id + ' reactivated! Check the main dashboard.';
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);

        console.log('✅ RO reactivated:', ro.ro_id, '→ new ID:', inserted?.id);

    } catch (err) {
        console.error('Reactivate error:', err);
        alert('Error reactivating RO: ' + (err.message || err));
    }
}

// ── Utilities ────────────────────────────────────────────
function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ── Enhancement Request Functions ────────────────────────
function openERModal() { document.getElementById('erModalOverlay').style.display = 'flex'; document.getElementById('erDescription').value = ''; document.getElementById('erDictationStatus').textContent = ''; }
function closeERModal() { document.getElementById('erModalOverlay').style.display = 'none'; }

function startERDictation() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { alert('Voice dictation not supported. Use Chrome or Safari.'); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR(); r.continuous = false; r.interimResults = false; r.lang = 'en-US';
    const s = document.getElementById('erDictationStatus'), inp = document.getElementById('erDescription');
    r.onstart = () => { if (s) { s.textContent = '🎤 Listening...'; s.style.color = '#10b981'; } };
    r.onresult = (e) => { const t = e.results[0][0].transcript; if (inp) { inp.value = inp.value ? inp.value + ' ' + t : t; } if (s) { s.textContent = '✅ Transcribed!'; s.style.color = '#10b981'; setTimeout(() => { s.textContent = ''; }, 3000); } };
    r.onerror = (e) => { if (s) { s.textContent = '❌ Error: ' + e.error; s.style.color = '#dc2626'; setTimeout(() => { s.textContent = ''; }, 3000); } };
    r.onend = () => { if (s && s.textContent.includes('Listening')) s.textContent = ''; };
    r.start();
}

async function submitEnhancementRequest() {
    const desc = document.getElementById('erDescription').value.trim();
    const cat = document.getElementById('erCategory').value;
    if (!desc) { alert('Please describe your request.'); return; }
    const sb = getSB();
    if (!sb || !supabaseSession) { alert('You must be signed in.'); return; }
    const email = supabaseSession.user?.email || 'unknown';
    const name = currentUser?.name || supabaseSession.user?.user_metadata?.full_name || email;
    try {
        const { error } = await sb.from('enhancement_requests').insert({
            submitted_by: email,
            submitted_by_name: name,
            source_page: 'closed-ros',
            category: cat,
            description: desc,
        });
        if (error) throw error;
        closeERModal();
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;bottom:90px;left:24px;z-index:10051;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e;padding:12px 20px;border-radius:10px;font-weight:700;font-family:Barlow Condensed,sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
        toast.textContent = '🪔 Wish submitted! Roland will review it.';
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; setTimeout(() => toast.remove(), 300); }, 4000);
    } catch (err) {
        console.error('ER submit error:', err);
        alert('Error: ' + (err.message || err));
    }
}

    initAuth();
