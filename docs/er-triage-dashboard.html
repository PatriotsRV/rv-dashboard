<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRVS — Enhancement Request Triage</title>
<style>
  :root{
    --bg:#0b1220; --panel:#111c30; --panel2:#0e1626; --line:#1e2d45;
    --text:#e6edf7; --muted:#8aa0bd; --accent:#3b82f6;
    --xl:#ef4444; --l:#f59e0b; --m:#3b82f6; --s:#22c55e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:22px}
  h1{font-size:1.5rem;margin:0 0 2px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:18px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .n{font-size:1.9rem;font-weight:800;line-height:1}
  .stat .l{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .pill{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:6px 13px;font-size:.8rem;cursor:pointer;user-select:none}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  input#q{flex:1;min-width:200px;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 12px;font-size:.85rem}
  .theme{margin:20px 0 8px;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:5px}
  .er{background:var(--panel);border:1px solid var(--line);border-left-width:4px;border-radius:10px;padding:12px 14px;margin-bottom:9px}
  .er .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;flex-wrap:wrap}
  .er .desc{font-weight:600;margin:0}
  .er .meta{color:var(--muted);font-size:.76rem;margin-top:3px}
  .er .verdict{font-size:.82rem;margin-top:7px;color:#cdd9ec}
  .tag{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .b-XL{border-left-color:var(--xl)} .t-XL{background:rgba(239,68,68,.16);color:var(--xl)}
  .b-L{border-left-color:var(--l)} .t-L{background:rgba(245,158,11,.16);color:var(--l)}
  .b-M{border-left-color:var(--m)} .t-M{background:rgba(59,130,246,.18);color:#7fb0ff}
  .b-S{border-left-color:var(--s)} .t-S{background:rgba(34,197,94,.16);color:var(--s)}
</style>
</head>
<body>
  <h1>PRVS — Enhancement Request Triage</h1>
  <div class="sub">2026-07-18 | Headless nightly run | vs index.html v1.475 | 15 open ERs (all Needed)</div>

  <div class="cards" id="stats"></div>

  <div class="controls">
    <span class="pill active" data-f="all">All</span>
    <span class="pill" data-f="XL">XL</span>
    <span class="pill" data-f="L">L</span>
    <span class="pill" data-f="M">M</span>
    <span class="pill" data-f="S">S</span>
    <input id="q" placeholder="Search ERs…">
  </div>

  <div id="list"></div>

<script>
const ERS = [
 {id:"14f35f95",by:"Lynn",date:"04-09",cat:"Parts",loe:"XL",theme:"Parts",
  desc:"In-house parts inventory: order a box of 25, use 5, remaining 20 go to searchable priced stock.",
  verdict:"Needed. No inventory/stock subsystem exists (parts.js has only per-RO markPartReceived/date_received; no stock table, receive/consume/adjust, or searchable priced stock). New subsystem: inventory table + receive/consume/adjust + searchable stock + parts-request links. Largest board item."},
 {id:"ed1b873e",by:"Roland",date:"06-07",cat:"Auth/Cost",loe:"XL",theme:"Auth & Cost",
  desc:"Replace Google-email auth (~$500/mo total; most staff don't use the email) with database-specific auth.",
  verdict:"Needed. Auth is still Google id-token + email RBAC (auth.js signInWithIdToken; no signInWithPassword/OTP anywhere). Security-critical swap to DB-specific auth (Supabase password/magic-link or shared role accounts) to drop ~$500/mo of Workspace seats; touches every page's sign-in + RBAC. Roland wants to scope together."},
 {id:"5925fc01",by:"Lynn",date:"04-09",cat:"Notif/Digest",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Notify the right team on every RO update; daily list of all in-progress jobs with to-dos scraped from status notes.",
  verdict:"Needed (partial). The daily-digest half is largely served by the Manager Daily Report, but the two core asks are unbuilt: NO notification on every generic RO update (only urgent-update/service-add/key-date events), and NO to-do scraping from status-update notes into a per-job list. Prefer Needed over Done given the gap."},
 {id:"af14b3cb",by:"Lynn",date:"05-21",cat:"Task-Tracking",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Per-customer task tracker with a daily reminder; each task stays on the list until marked complete.",
  verdict:"Needed. No per-customer task tracker exists; js/shop-tasks.js is deliberately non-customer with no daily reminder. Needs a per-RO tasks table + add/complete UI + a daily open-task reminder (tasks persist until marked complete). Pairs with 5925fc01."},
 {id:"b19975d4",by:"Lynn",date:"04-09",cat:"Parts",loe:"L",theme:"Parts",
  desc:"Track a part that needs to be returned to the supplier or warrantied by the supplier.",
  verdict:"Needed. No structured supplier-return/warranty-claim workflow: only a static 'Returned' part status + free-text return_deadline/warranty_period fields; no return reasons, RMA, credit, or reverse-direction flow. = GH#24 Shop Ops Phase 2. Canonical for dup 86bbaf50."},
 {id:"0448de62",by:"Sofia",date:"06-11",cat:"Auth form",loe:"L",theme:"Messaging & e-sign",
  desc:"Send an authorization form remotely for e-signature.",
  verdict:"Needed. No remote-signing flow: RAF is in-person kiosk only (customer-checkin.html signature pad); no signing page, no tokenized public route, no signing edge fn. Needs a tokenized public signing page + delivery + signed-form storage. Pairs with the ProjectBlue/messaging phase."},
 {id:"0e172b2c",by:"Sofia",date:"07-16",cat:"RO/Data",loe:"L",theme:"RO fields/status",
  desc:"Merge duplicate customer accounts (e.g. Hubert vs Huebert) with a verify-which-is-correct step.",
  verdict:"Needed. No name-based account/RO merge: js/duplicates.js only groups by shared base RO-id and has no fuzzy customer-name match or verify step (will not catch Hubert vs Huebert). Needs name-based dedup detection + a verify-which-is-correct merge/delete flow. Data cleanup for this specific case is under 3f254929."},
 {id:"1c7f1410",by:"Andrew",date:"07-16",cat:"Messaging",loe:"M",theme:"Messaging & e-sign",
  desc:"Attach media (photos/videos) to outbound customer messages.",
  verdict:"Needed. Outbound messaging cannot attach media: js/messaging.js sendCustomerMessage posts body text only (no file input); inbound MMS media is render-only and the modal MMS-send is explicitly deferred. Needs a file/photo input + upload + media field to projectblue-send."},
 {id:"5fbfa299",by:"Brandon",date:"06-30",cat:"RO/Status",loe:"M",theme:"RO fields/status",
  desc:"Archive quote-only customers/units that never moved forward, to hide them from the board.",
  verdict:"Needed. No archive concept for quote-only units (no is_archived/archive status/flag or hide-quoted filter; the only 'archive' is the unrelated cashiered flow). Needs an archived status/flag + a filter to hide quoted-but-never-progressed customers."},
 {id:"8d885331",by:"Lynn",date:"04-09",cat:"Parts",loe:"S",theme:"Parts",
  desc:"Rework the field order on the parts-entry / ordering screen (move fields around).",
  verdict:"Needed but blocked on detail. The Add/Edit Part form has 5 sections (Supplier Contact, Core Info, Order Info, Pricing, Receipt); the request to 'move fields around' gives no target order. Quick once Lynn provides the desired layout/mockup."},
 {id:"e06d747e",by:"Riley",date:"04-10",cat:"Time Clock",loe:"S",theme:"Time Clock / Check-In",
  desc:"Tech check-in 'float' for ease of access.",
  verdict:"Needed but underspecified. No floating/sticky quick check-in exists (check-in is per-tile/QR; checkin.html requires ?ro=). Likely a floating check-in button, but page + behavior unclear; scope with the submitter before building."},
 {id:"29654af7",by:"Lynn",date:"07-06",cat:"Navigation",loe:"S",theme:"Navigation & UX",
  desc:"Back-to-top / jump-to-search button after scrolling down the dashboard.",
  verdict:"Needed. No back-to-top or jump-to-search control on the dashboard (index.html has none; scrollTo top exists only as post-action resets on other pages). Small: a scroll-triggered back-to-top / quick-to-search button."},
 {id:"5fec3eca",by:"Sofia",date:"07-15",cat:"Auth form",loe:"S",theme:"Messaging & e-sign",
  desc:"Show the customer's address on the emailed copy of the authorization form.",
  verdict:"Needed. Customer address is NOT on the emailed RAF copy: send-quote-email raf_copy renders Phone/Email/Vehicle/etc. but no address row, and sendRAFEmail never passes it (address is only on the separate staff-notify email). Small: add address to the raf_copy payload + template."},
 {id:"d1844e46",by:"Lynn",date:"07-16",cat:"Scheduling",loe:"S",theme:"Scheduling/Dates",
  desc:"Sort the board by promised date then oldest-on-lot, keeping Shop Operations pinned to top.",
  verdict:"Needed. Shop Operations pinning exists (render.js), but there is no strict 'promised date then oldest-on-lot' sort or user-facing sort control; the board uses a single blended calculatePriority score. Small: add a strict promised-then-days-on-lot sort (option) keeping shop-ops pinned."},
 {id:"972af03c",by:"Lynn",date:"07-17",cat:"RO/Status",loe:"S",theme:"RO fields/status",
  desc:"Add a Canceled RO status that keeps the record for notes instead of deleting it.",
  verdict:"Needed. No Canceled RO status exists: render.js ALL_STATUSES + the status dropdowns list only Not On Lot..Delivered/Cashed Out (the js cancel refs are UI buttons + reminder cancellation, not a status). Add a Canceled status that keeps the record for notes (no delete): status option + filter button (index.html), color/priority maps + ALL_STATUSES (render.js, config.js), exclude from on-lot/queue counts. Pairs with 5fbfa299 (archive quote-only units)."},
];

const ORDER={XL:0,L:1,M:2,S:3};
let activeFilter="all", query="";

function renderStats(){
  const c={XL:0,L:0,M:0,S:0};
  ERS.forEach(e=>c[e.loe]++);
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="n">${ERS.length}</div><div class="l">Open ERs (all Needed)</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--xl)">${c.XL}</div><div class="l">XL — new subsystem</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--l)">${c.L}</div><div class="l">L — multi-session</div></div>`+
    `<div class="stat"><div class="n" style="color:#7fb0ff">${c.M}</div><div class="l">M — ½–1 session</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--s)">${c.S}</div><div class="l">S — under 2h*</div></div>`;
}
function renderList(){
  const list=document.getElementById('list'); list.innerHTML="";
  const q=query.toLowerCase();
  const shown=ERS.filter(e=>{
    if(activeFilter!=="all"&&e.loe!==activeFilter) return false;
    if(q){const blob=(e.id+e.by+e.cat+e.desc+e.verdict+e.theme).toLowerCase(); if(!blob.includes(q)) return false;}
    return true;
  });
  const themes=[...new Set(shown.map(e=>e.theme))];
  themes.forEach(th=>{
    const h=document.createElement('div'); h.className="theme"; h.textContent=th; list.appendChild(h);
    shown.filter(e=>e.theme===th).sort((a,b)=>ORDER[a.loe]-ORDER[b.loe]).forEach(e=>{
      const d=document.createElement('div'); d.className="er b-"+e.loe;
      d.innerHTML=`<div class="top"><p class="desc">${e.desc}</p>
        <span class="tag t-${e.loe}">LOE ${e.loe}</span></div>
        <div class="meta">${e.id} · ${e.by} · ${e.date} · ${e.cat}</div>
        <div class="verdict">${e.verdict}</div>`;
      list.appendChild(d);
    });
  });
  if(!shown.length) list.innerHTML='<div class="sub">No ERs match.</div>';
}
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active'); activeFilter=p.dataset.f; renderList();
}));
document.getElementById('q').addEventListener('input',e=>{query=e.target.value; renderList();});
renderStats(); renderList();
</script>
</body>
</html>
