<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRVS — Enhancement Request Triage</title>
<style>
  :root{
    --bg:#0b1220; --panel:#111c30; --panel2:#0e1626; --line:#1e2d45;
    --text:#e6edf7; --muted:#8aa0bd; --accent:#3b82f6;
    --done:#22c55e; --bug:#ef4444; --needed:#f59e0b; --data:#a855f7; --dup:#64748b;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:22px}
  h1{font-size:1.5rem;margin:0 0 2px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:18px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .n{font-size:1.9rem;font-weight:800;line-height:1}
  .stat .l{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .pill{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:6px 13px;font-size:.8rem;cursor:pointer;user-select:none}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  input#q{flex:1;min-width:200px;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 12px;font-size:.85rem}
  .theme{margin:20px 0 8px;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:5px}
  .er{background:var(--panel);border:1px solid var(--line);border-left-width:4px;border-radius:10px;padding:12px 14px;margin-bottom:9px}
  .er .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;flex-wrap:wrap}
  .er .desc{font-weight:600;margin:0}
  .er .meta{color:var(--muted);font-size:.76rem;margin-top:3px}
  .er .verdict{font-size:.82rem;margin-top:7px;color:#cdd9ec}
  .tag{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .b-done{border-left-color:var(--done)} .t-done{background:rgba(34,197,94,.16);color:var(--done)}
  .b-needed{border-left-color:var(--needed)} .t-needed{background:rgba(245,158,11,.16);color:var(--needed)}
  .b-dup{border-left-color:var(--dup)} .t-dup{background:rgba(100,116,139,.2);color:#aab8cc}
  .loe{font-size:.7rem;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 6px;margin-left:6px}
</style>
</head>
<body>
  <h1>PRVS — Enhancement Request Triage</h1>
  <div class="sub">2026-06-27 - headless runner - incremental vs index.html v1.464 - 16 needed open (17 open in DB; 80390f36 shipped, awaiting status flip)</div>

  <div class="cards" id="stats"></div>

  <div class="controls">
    <span class="pill active" data-f="all">All</span>
    <span class="pill" data-f="done">Done</span>
    <span class="pill" data-f="needed">Needed</span>
    <span class="pill" data-f="dup">Duplicate</span>
    <input id="q" placeholder="Search ERs…">
  </div>

  <div id="list"></div>

<script>
const ERS = [
 {id:"e27311bf",by:"Ryan",date:"05-04",cat:"Work Orders",bucket:"done",loe:"",theme:"Work Orders",
  desc:"Edit WO templates; drag-drop, change order at will.",
  verdict:"DELIVERED v1.464 (S125): WO task drag-drop reorder (work-orders.js _initWOTaskDrag L442; sort_order via saveWOTemplate L598). With Load->modify->Overwrite this is full template edit+reorder. Close as done."},
 {id:"1fe68261",by:"Rod",date:"04-13",cat:"Work Orders",bucket:"needed",loe:"M",theme:"Work Orders",
  desc:"Tasks not tied to a customer unit (swap poly barrels, prep roof bays).",
  verdict:"Shop RO partly covers (checkin.html shop_activity) but all clock-ins require an ro_id; no non-RO task support."},
 {id:"3f415c88",by:"Lynn",date:"05-26",cat:"UI/UX",bucket:"done",loe:"",theme:"Notifications & Task-Tracking",
  desc:"Reminder button: schedule multiple days / weekly-recurring until complete.",
  verdict:"DELIVERED v1.463 (S125): Repeat selector (Daily/Weekly) + Repeat-until; expands to one scheduled_notifications row per occurrence (index.html L2703). 'Every Monday until X' supported. Close as done."},
 {id:"7f2d0d70",by:"Lynn",date:"06-26",cat:"UI/UX",bucket:"needed",loe:"M",theme:"Notifications & Task-Tracking",
  desc:"Weekly Monday report of drop-offs received that week; confirm the team has them in their worklist.",
  verdict:"NEW. send-manager-report has Monday/weekend scaffolding (chicagoMondayISO L139, manager_work_lists join L270) but NO orphan/coverage check for ROs missing from all worklists. Overlaps cd084233 (deferred) + cbc70a86. Scope onto the Manager Report."},
 {id:"cbc70a86",by:"Lynn",date:"05-21",cat:"UI/UX",bucket:"needed",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Returning-customer check-in auto-adds customer to each involved team lead's work list.",
  verdict:"No check-in -> work-list integration (confirmed absent). Extends customer-checkin + manager_work_lists. Overlaps 7f2d0d70."},
 {id:"5925fc01",by:"Lynn",date:"04-09",cat:"Feature",bucket:"needed",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Every RO update -> notify manager + daily task list scraped from status notes.",
  verdict:"send-manager-report covers the daily digest core; note-scraping to-do extraction + per-update notify still absent. Anchor of the theme."},
 {id:"17492066",by:"Lynn",date:"04-09",cat:"Notif",bucket:"needed",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Future/scheduled notifications (subcontractor pickup window; reminder a day out).",
  verdict:"In-progress. v1.459/1.460/1.463 partial; no general scheduled-task notifier with tech targeting. Overlaps 5925fc01/af14b3cb/3f415c88."},
 {id:"a7d1474e",by:"Lynn",date:"04-23",cat:"RO Mgmt",bucket:"needed",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Always-visible urgent-updates field on tile + notify on modify + font sizing.",
  verdict:"Tile shows only key-date chips today (render.js L327/L353-356); tile field + modify-notify are new. Overlaps b06a285f."},
 {id:"af14b3cb",by:"Lynn",date:"05-21",cat:"UI/UX",bucket:"needed",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Daily reminder + per-customer task tracker; tasks persist until marked complete.",
  verdict:"No task-tracker entity in code (confirmed absent across js/). Core of the task-tracker subsystem."},
 {id:"e06d747e",by:"Riley",date:"04-10",cat:"Time Clock",bucket:"needed",loe:"S",theme:"Time clock / off",
  desc:"Tech check-in float for ease of access.",
  verdict:"Vague. checkin.html requires a QR roId param today. Needs scoping with submitter before build."},
 {id:"88395acc",by:"Lynn",date:"06-19",cat:"UI/UX",bucket:"needed",loe:"M",theme:"Time clock / off",
  desc:"Time-off: exact absence window (clock-out to return; AM/PM half-day) not total hours.",
  verdict:"partial_hours captures duration only (time-off.html). Add start/end time-of-day + half-day fields."},
 {id:"a5ff3e2d",by:"Lynn",date:"04-21",cat:"RO Mgmt",bucket:"needed",loe:"M",theme:"RO display / fields",
  desc:"Add 'Warranty + Repair' RO type (roof warranty with additional repair).",
  verdict:"Types today: standard/insurance/hybrid/warranty/shop (setROType ~L1828). Hybrid=New+Warranty; this is Warranty+paid-Repair. PRODUCT DECISION needed; touches badges/filters/P&L."},
 {id:"b06a285f",by:"Lynn",date:"06-19",cat:"UI/UX",bucket:"needed",loe:"M",theme:"RO display / fields",
  desc:"Near customer name, show important dates/tasks as a hover list.",
  verdict:"Key-date chips exist (render.js L353-356) but no hover tooltip aggregating dates/tasks (L327). Overlaps a7d1474e."},
 {id:"80390f36",by:"Lynn",date:"06-23",cat:"UI/UX",bucket:"done",loe:"",theme:"RO display / fields",
  desc:"Pin Shop Operations tile to top of the list; search never finds it.",
  verdict:"SHIPPED in code v1.462 (S125): render.js pins shop ROs to top + 'shop operations shop' search token (L30+). DB status still unreviewed -> FLIP TO DONE (only stale status this pass)."},
 {id:"8d885331",by:"Lynn",date:"04-09",cat:"Parts",bucket:"needed",loe:"S",theme:"Parts & Inventory",
  desc:"Rework the parts-entry screen field order.",
  verdict:"Fixed-order sections parts.js L175-250. Needs a mockup from Lynn before building."},
 {id:"b19975d4",by:"Lynn",date:"04-09",cat:"Parts",bucket:"needed",loe:"L",theme:"Parts & Inventory",
  desc:"Part returned-to-supplier / warrantied-by-supplier tracking.",
  verdict:"parts.js has no return/warranty workflow ('Returned' is a display-only status with no set logic). Canonical for 86bbaf50."},
 {id:"14f35f95",by:"Lynn",date:"04-09",cat:"Parts",bucket:"needed",loe:"XL",theme:"Parts & Inventory",
  desc:"In-house parts inventory/stock (order 25, use 5, 20 to stock, searchable).",
  verdict:"No inventory/stock state in parts.js (confirmed absent). Largest parts ask; new subsystem."},
 {id:"86bbaf50",by:"Lynn",date:"05-13",cat:"RO Mgmt",bucket:"dup",loe:"",theme:"Parts & Inventory",
  desc:"gordon parts missing / window ordered and returned to vogt.",
  verdict:"Specific instance of supplier-return; folds into b19975d4. Already declined."},
 {id:"ed1b873e",by:"Roland",date:"06-07",cat:"UI/UX",bucket:"needed",loe:"XL",theme:"Auth & cost",
  desc:"Google-email auth ~$25/mo each (~$500/mo); most don't use email. Explore alt auth.",
  verdict:"Replace Google-email auth (auth.js) with a database-specific scheme. Touches auth.js + Supabase auth model; new subsystem, needs design input."},
 {id:"0448de62",by:"Sofia",date:"06-11",cat:"UI/UX",bucket:"needed",loe:"L",theme:"Auth & cost",
  desc:"Send authorization form remotely for e-signature.",
  verdict:"customer-checkin.html signs the RAF only on-site (getSignatureData canvas); no tokenized remote-signing route (confirmed absent)."},
];

const BUCKETS={done:"Done",needed:"Needed",dup:"Duplicate"};
let activeFilter="all", query="";

function renderStats(){
  const c={done:0,needed:0,dup:0};
  ERS.forEach(e=>c[e.bucket]++);
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="n">${ERS.length}</div><div class="l">Open ERs</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--done)">${c.done}</div><div class="l">Done — close</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--needed)">${c.needed}</div><div class="l">Needed</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--dup)">${c.dup}</div><div class="l">Duplicate</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--accent)">1</div><div class="l">Buildable now</div></div>`;
}
function renderList(){
  const list=document.getElementById('list'); list.innerHTML="";
  const q=query.toLowerCase();
  const shown=ERS.filter(e=>{
    if(activeFilter!=="all"&&e.bucket!==activeFilter) return false;
    if(q){const blob=(e.id+e.by+e.cat+e.desc+e.verdict+e.theme).toLowerCase(); if(!blob.includes(q)) return false;}
    return true;
  });
  const themes=[...new Set(shown.map(e=>e.theme))];
  themes.forEach(th=>{
    const h=document.createElement('div'); h.className="theme"; h.textContent=th; list.appendChild(h);
    shown.filter(e=>e.theme===th).forEach(e=>{
      const d=document.createElement('div'); d.className="er b-"+e.bucket;
      d.innerHTML=`<div class="top"><p class="desc">${e.desc}</p>
        <span class="tag t-${e.bucket}">${BUCKETS[e.bucket]}</span></div>
        <div class="meta">${e.id} · ${e.by} · ${e.date} · ${e.cat}${e.loe?`<span class="loe">LOE ${e.loe}</span>`:''}</div>
        <div class="verdict">${e.verdict}</div>`;
      list.appendChild(d);
    });
  });
  if(!shown.length) list.innerHTML='<div class="sub">No ERs match.</div>';
}
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active'); activeFilter=p.dataset.f; renderList();
}));
document.getElementById('q').addEventListener('input',e=>{query=e.target.value; renderList();});
renderStats(); renderList();
</script>
</body>
</html>
