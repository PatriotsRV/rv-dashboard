<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRVS — Enhancement Request Triage</title>
<style>
  :root{
    --bg:#0b1220; --panel:#111c30; --panel2:#0e1626; --line:#1e2d45;
    --text:#e6edf7; --muted:#8aa0bd; --accent:#3b82f6;
    --xl:#ef4444; --l:#f59e0b; --m:#3b82f6; --s:#22c55e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:22px}
  h1{font-size:1.5rem;margin:0 0 2px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:18px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .n{font-size:1.9rem;font-weight:800;line-height:1}
  .stat .l{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .pill{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:6px 13px;font-size:.8rem;cursor:pointer;user-select:none}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  input#q{flex:1;min-width:200px;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 12px;font-size:.85rem}
  .theme{margin:20px 0 8px;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:5px}
  .er{background:var(--panel);border:1px solid var(--line);border-left-width:4px;border-radius:10px;padding:12px 14px;margin-bottom:9px}
  .er .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;flex-wrap:wrap}
  .er .desc{font-weight:600;margin:0}
  .er .meta{color:var(--muted);font-size:.76rem;margin-top:3px}
  .er .verdict{font-size:.82rem;margin-top:7px;color:#cdd9ec}
  .tag{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .b-XL{border-left-color:var(--xl)} .t-XL{background:rgba(239,68,68,.16);color:var(--xl)}
  .b-L{border-left-color:var(--l)} .t-L{background:rgba(245,158,11,.16);color:var(--l)}
  .b-M{border-left-color:var(--m)} .t-M{background:rgba(59,130,246,.18);color:#7fb0ff}
  .b-S{border-left-color:var(--s)} .t-S{background:rgba(34,197,94,.16);color:var(--s)}
</style>
</head>
<body>
  <h1>PRVS — Enhancement Request Triage</h1>
  <div class="sub">2026-07-22 - Phase 2a nightly runner - full re-triage vs index.html v1.480 - 20 open ERs (all Needed)</div>

  <div class="cards" id="stats"></div>

  <div class="controls">
    <span class="pill active" data-f="all">All</span>
    <span class="pill" data-f="XL">XL</span>
    <span class="pill" data-f="L">L</span>
    <span class="pill" data-f="M">M</span>
    <span class="pill" data-f="S">S</span>
    <input id="q" placeholder="Search ERs…">
  </div>

  <div id="list"></div>

<script>
const ERS = [
 {id:"5925fc01",by:"Lynn",date:"04-09",cat:"Notif/Digest",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Notify the right team on every RO update; daily comprehensive list of all in-progress jobs with to-dos scraped from status notes.",
  verdict:"PARTIAL, kept Needed: the daily in-progress digest is served by the Manager Daily Report (send-manager-report). Still open: notify on every generic RO update + auto-scraping to-dos from status notes into a per-job list. Anchor of the Notifications/Task-Tracking initiative."},
 {id:"af14b3cb",by:"Lynn",date:"05-21",cat:"Task-Tracking",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Per-customer task tracker with a daily reminder; each task stays on the list until marked complete.",
  verdict:"Confirmed absent: shop-tasks.js is a non-customer shop checklist with no ro_id/customer link or reminder column. Needs a per-RO tasks table + add/complete UI + a daily open-task reminder. Pairs with 5925fc01."},
 {id:"14f35f95",by:"Lynn",date:"04-09",cat:"Parts",loe:"XL",theme:"Parts & Inventory",
  desc:"In-house parts inventory: order a box of 25, use 5, remaining 20 go to stock - listed as available, priced, and searchable.",
  verdict:"New subsystem. Confirmed js/parts.js has no inventory/stock symbols (grep 0); parts are per-RO line items only. Needs an inventory table + receive/consume/adjust + searchable priced stock + parts-request links. Largest item on the board."},
 {id:"b19975d4",by:"Lynn",date:"04-09",cat:"Parts",loe:"L",theme:"Parts & Inventory",
  desc:"Track a part that needs to be returned to the supplier or warrantied by the supplier.",
  verdict:"Partial infra only: config.js PART_STATUSES has 'Returned' + return/warranty date fields, but no RMA#, credit tracking, return reason, or reverse-direction flow. = GH#24 Shop Ops Phase 2. Canonical for the declined dup 86bbaf50."},
 {id:"8d885331",by:"Lynn",date:"04-09",cat:"Parts",loe:"S",theme:"Parts & Inventory",
  desc:"Rework the field order on the parts-entry / ordering screen (move fields around).",
  verdict:"Parts-entry form exists (parts.js); the request is only to reorder fields. Quick once Lynn provides the target layout/mockup. BLOCKED on detail, not on effort."},
 {id:"ed1b873e",by:"Roland",date:"06-07",cat:"Auth/Cost",loe:"XL",theme:"Auth & Cost",
  desc:"Replace Google-email auth (~$25/mo each, ~$500/mo total; most staff don't use the email) with database-specific auth.",
  verdict:"Confirmed still Google-based: auth.js signInWithIdToken + google.accounts One Tap + GOOGLE_CONFIG (33 refs); kiosk also signInWithIdToken. Swap to Supabase password/magic-link or shared role accounts to drop ~$500/mo; touches every page sign-in + RBAC. Roland to scope."},
 {id:"0448de62",by:"Sofia",date:"06-11",cat:"Auth form",loe:"L",theme:"Messaging & e-sign",
  desc:"Send an authorization form remotely for e-signature.",
  verdict:"Confirmed absent: signing is kiosk-only (customer-checkin.html on-device signature pad); raf_copy is a post-signing email, no tokenized public signing page or signing edge fn. Needs a tokenized public page + delivery + signed-form storage."},
 {id:"5fbfa299",by:"Brandon",date:"06-30",cat:"RO status",loe:"M",theme:"RO fields/status",
  desc:"Archive customers/units that are only in the system because they were quoted and never moved forward.",
  verdict:"Confirmed absent: only the cashiered archive exists (ro-crud.js archiveROInSupabase); no separate archived/abandoned status or filter for quoted-but-never-progressed units. Pairs with 972af03c (Canceled status)."},
 {id:"0e172b2c",by:"Sofia",date:"07-16",cat:"Data merge",loe:"M",theme:"Data Integrity & Merge",
  desc:"Merge duplicate customer accounts (e.g. Hubert vs Huebert) - ask the customer which is correct, then remove the wrong one.",
  verdict:"Partial: duplicates.js has an RO-level merge/delete engine (openDuplicateManager/executeDupeMerge) but groups by base RO id, not customer identity. Needs name/phone account-dedup detection + verify-which-is-correct merge/delete. The one-off data cleanup is 3f254929."},
 {id:"e06d747e",by:"Riley",date:"04-10",cat:"Time Clock",loe:"S",theme:"Time Clock",
  desc:"Tech check-in 'float' for ease of access.",
  verdict:"Confirmed absent: no floating/quick tech check-in button in index.html or checkin.html (the 'float' hits are the wish button and other floats). Underspecified; scope the page and exact behavior with the submitter before build."},
 {id:"29654af7",by:"Lynn",date:"07-06",cat:"UI Nav",loe:"S",theme:"Board Sort & Navigation",
  desc:"A button to jump back to the top of the page / the search bar after scrolling to the bottom or into a customer.",
  verdict:"Confirmed absent: index.html has only targeted scrollIntoView calls, no page-level scroll-to-top / jump-to-search FAB (grep 0). Small: add a scroll-triggered back-to-top / jump-to-search button."},
 {id:"5fec3eca",by:"Sofia",date:"07-15",cat:"Email",loe:"S",theme:"Notifications & Email",
  desc:"Show the customer's address on the emailed copy of the authorization form.",
  verdict:"Confirmed absent: send-quote-email raf_copy branch (L386) does not destructure or emit customerAddress; the address appears only in the lead_staff_notify branch (L549+). Small: add customerAddress to the raf_copy payload + email template."},
 {id:"d1844e46",by:"Lynn",date:"07-16",cat:"Board sort",loe:"S",theme:"Board Sort & Navigation",
  desc:"Sort the dashboard by promised date, then oldest on lot, keeping PRVS Shop Operations pinned to the top.",
  verdict:"Confirmed absent: the board uses a single blended calculatePriority score; shop-ops pinning exists (render.js) but there is no selectable strict 'promised date then oldest on lot' sort. Small: add the strict sort option."},
 {id:"972af03c",by:"Lynn",date:"07-17",cat:"RO status",loe:"S",theme:"RO fields/status",
  desc:"Add a 'Canceled' status that keeps the record (do not delete) for notes.",
  verdict:"Confirmed absent: no Canceled/Cancelled in render.js ALL_STATUSES/statusColorMap or config.js (grep 0). Small: add a 'Canceled' status + color/priority maps, exclude from on-lot/queue counts, keep the record. Pairs with 5fbfa299."},
 {id:"d432863a",by:"Brandon",date:"07-21",cat:"Branding",loe:"S",theme:"UI / Branding",
  desc:"Make the browser tab icon the Patriots logo so the site stands out among open tabs.",
  verdict:"Confirmed absent: no favicon / apple-touch-icon / rel=icon in index.html or any page (grep 0), so the tab shows a generic icon. Small: add a Patriots-logo favicon + apple-touch-icon to each page head."},
 {id:"9aab7550",by:"Brandon",date:"07-21",cat:"Messaging",loe:"S",theme:"Messaging",
  desc:"Highlight new/unchecked messages so they are more clearly visible.",
  verdict:"Partial (prefer Needed): messages.html already renders a gold unread-dot per conversation, but no row-level highlight/background for unchecked messages. Small: add a stronger unread treatment (bold row / tinted background) so new messages stand out."},
 {id:"21fc3a9d",by:"Brandon",date:"07-21",cat:"Messaging",loe:"S",theme:"Messaging",
  desc:"Add the ability to rescale the conversation list text for readability.",
  verdict:"Confirmed absent: messages.html uses fixed rem font sizes (html 17.5px) with no user text-size control for the conversation list. Small: add a persisted font-scale/zoom control."},
 {id:"2f752d40",by:"Jason",date:"07-21",cat:"Work Orders",loe:"S",theme:"Work Orders",
  desc:"On a work order, auto-populate the dollar amount from total task hours x the posted labor rate ($195/hr).",
  verdict:"Confirmed absent: work-orders.js has manual estimated_hours + dollar_value fields but no auto-calc; total hours does not populate a dollar amount. Small: auto-populate dollar_value = total hours x $195, editable override."},
 {id:"f1e6e311",by:"Brandon",date:"07-21",cat:"Messaging",loe:"S",theme:"Messaging",
  desc:"Add a button to clear the name in the messaging search bar faster.",
  verdict:"Confirmed absent: messages.html convoSearch is a plain text input (id convoSearch) with no clear/x button. Small: add a clear (x) button to reset the messaging conversation search."},
 {id:"6e9ca4dc",by:"Brandon",date:"07-21",cat:"Messaging",loe:"S",theme:"Messaging",
  desc:"Remove the redundant 'Added to every send' signature note at the bottom of every chat.",
  verdict:"Valid: messaging.js refreshSignaturePreview renders a persistent 'Added to every send:' signature preview (msgSigPreview) under the composer; users find it redundant. Small: remove or collapse the always-on signature preview."},
];

const ORDER={XL:0,L:1,M:2,S:3};
let activeFilter="all", query="";

function renderStats(){
  const c={XL:0,L:0,M:0,S:0};
  ERS.forEach(e=>c[e.loe]++);
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="n">${ERS.length}</div><div class="l">Open ERs (all Needed)</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--xl)">${c.XL}</div><div class="l">XL — new subsystem</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--l)">${c.L}</div><div class="l">L — multi-session</div></div>`+
    `<div class="stat"><div class="n" style="color:#7fb0ff">${c.M}</div><div class="l">M — ½–1 session</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--s)">${c.S}</div><div class="l">S — under 2h*</div></div>`;
}
function renderList(){
  const list=document.getElementById('list'); list.innerHTML="";
  const q=query.toLowerCase();
  const shown=ERS.filter(e=>{
    if(activeFilter!=="all"&&e.loe!==activeFilter) return false;
    if(q){const blob=(e.id+e.by+e.cat+e.desc+e.verdict+e.theme).toLowerCase(); if(!blob.includes(q)) return false;}
    return true;
  });
  const themes=[...new Set(shown.map(e=>e.theme))];
  themes.forEach(th=>{
    const h=document.createElement('div'); h.className="theme"; h.textContent=th; list.appendChild(h);
    shown.filter(e=>e.theme===th).sort((a,b)=>ORDER[a.loe]-ORDER[b.loe]).forEach(e=>{
      const d=document.createElement('div'); d.className="er b-"+e.loe;
      d.innerHTML=`<div class="top"><p class="desc">${e.desc}</p>
        <span class="tag t-${e.loe}">LOE ${e.loe}</span></div>
        <div class="meta">${e.id} · ${e.by} · ${e.date} · ${e.cat}</div>
        <div class="verdict">${e.verdict}</div>`;
      list.appendChild(d);
    });
  });
  if(!shown.length) list.innerHTML='<div class="sub">No ERs match.</div>';
}
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active'); activeFilter=p.dataset.f; renderList();
}));
document.getElementById('q').addEventListener('input',e=>{query=e.target.value; renderList();});
renderStats(); renderList();
</script>
</body>
</html>
