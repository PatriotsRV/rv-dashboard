<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRVS — Enhancement Request Triage</title>
<style>
  :root{
    --bg:#0b1220; --panel:#111c30; --panel2:#0e1626; --line:#1e2d45;
    --text:#e6edf7; --muted:#8aa0bd; --accent:#3b82f6;
    --xl:#ef4444; --l:#f59e0b; --m:#3b82f6; --s:#22c55e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:22px}
  h1{font-size:1.5rem;margin:0 0 2px}
  .sub{color:var(--muted);font-size:.85rem;margin-bottom:18px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .n{font-size:1.9rem;font-weight:800;line-height:1}
  .stat .l{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
  .pill{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:6px 13px;font-size:.8rem;cursor:pointer;user-select:none}
  .pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  input#q{flex:1;min-width:200px;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 12px;font-size:.85rem}
  .theme{margin:20px 0 8px;font-size:.8rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:5px}
  .er{background:var(--panel);border:1px solid var(--line);border-left-width:4px;border-radius:10px;padding:12px 14px;margin-bottom:9px}
  .er .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;flex-wrap:wrap}
  .er .desc{font-weight:600;margin:0}
  .er .meta{color:var(--muted);font-size:.76rem;margin-top:3px}
  .er .verdict{font-size:.82rem;margin-top:7px;color:#cdd9ec}
  .tag{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
  .b-XL{border-left-color:var(--xl)} .t-XL{background:rgba(239,68,68,.16);color:var(--xl)}
  .b-L{border-left-color:var(--l)} .t-L{background:rgba(245,158,11,.16);color:var(--l)}
  .b-M{border-left-color:var(--m)} .t-M{background:rgba(59,130,246,.18);color:#7fb0ff}
  .b-S{border-left-color:var(--s)} .t-S{background:rgba(34,197,94,.16);color:var(--s)}
</style>
</head>
<body>
  <h1>PRVS — Enhancement Request Triage</h1>
  <div class="sub">2026-07-24 - Phase 2a nightly runner - vs index.html v1.481 - 21 open ERs (all Needed)</div>

  <div class="cards" id="stats"></div>

  <div class="controls">
    <span class="pill active" data-f="all">All</span>
    <span class="pill" data-f="XL">XL</span>
    <span class="pill" data-f="L">L</span>
    <span class="pill" data-f="M">M</span>
    <span class="pill" data-f="S">S</span>
    <input id="q" placeholder="Search ERs…">
  </div>

  <div id="list"></div>

<script>
const ERS = [
 {id:"5925fc01",by:"Lynn",date:"04-09",cat:"Notif/Digest",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Notify the right team on every RO update; daily digest of all in-progress jobs with to-dos scraped from status notes.",
  verdict:"Partial: the daily in-progress digest is served by the Manager Daily Report (send-manager-report), but notify-on-every-RO-update and to-do scraping from status notes are unbuilt. Anchor of the Notifications/Task-Tracking initiative."},
 {id:"af14b3cb",by:"Lynn",date:"05-21",cat:"Task-Tracking",loe:"L",theme:"Notifications & Task-Tracking",
  desc:"Per-customer task tracker with a daily reminder; each task stays on the list until marked complete.",
  verdict:"Confirmed absent: shop-tasks.js is a non-customer checklist with no ro_id/customer link or reminder column. Needs a per-RO tasks table + add/complete UI + a daily open-task reminder. Pairs with 5925fc01."},
 {id:"14f35f95",by:"Lynn",date:"04-09",cat:"Parts",loe:"XL",theme:"Parts & Inventory",
  desc:"In-house parts inventory: order a box of 25, use 5, remaining 20 go to searchable priced stock.",
  verdict:"Confirmed absent: js/parts.js has no inventory/stock symbols; parts are per-RO line items only. New subsystem: inventory table + receive/consume/adjust + searchable priced stock + parts-request links. Largest board item."},
 {id:"b19975d4",by:"Lynn",date:"04-09",cat:"Parts",loe:"L",theme:"Parts & Inventory",
  desc:"Track a part that needs to be returned to the supplier or warrantied by the supplier.",
  verdict:"Partial infra only: config.js PART_STATUSES has Returned + return/warranty date fields, but no RMA#, credit tracking, return reason, or reverse-direction flow. = GH#24 Shop Ops Phase 2. Canonical for declined dup 86bbaf50."},
 {id:"8d885331",by:"Lynn",date:"04-09",cat:"Parts",loe:"S",theme:"Parts & Inventory",
  desc:"Rework the field order on the parts-entry / ordering screen (move fields around).",
  verdict:"Parts-entry form exists (parts.js); the ask is only to reorder fields. Quick once Lynn provides the target layout/mockup. Blocked on detail, not on effort."},
 {id:"5fbfa299",by:"Brandon",date:"06-30",cat:"RO status",loe:"M",theme:"RO fields & status",
  desc:"Archive customers/units only in the system because they were quoted and never moved forward.",
  verdict:"Confirmed absent: only the cashiered archive exists (ro-crud.js archiveROInSupabase); no archived/abandoned status flag or filter for quoted-but-never-progressed units. Pairs with 972af03c."},
 {id:"0e172b2c",by:"Sofia",date:"07-16",cat:"Merge",loe:"M",theme:"RO fields & status",
  desc:"Merge duplicate customer accounts (e.g. a misspelled Hubert vs Huebert) after verifying which is correct.",
  verdict:"Partial: duplicates.js has an RO-level merge/delete engine (openDuplicateManager/executeDupeMerge) but groups by base RO id, not customer identity. Needs name/phone account-dedup + verify-which-is-correct merge/delete. Data cleanup for this case is 3f254929."},
 {id:"972af03c",by:"Lynn",date:"07-17",cat:"RO status",loe:"S",theme:"RO fields & status",
  desc:"Add a Canceled status; keep the record for notes, do not delete.",
  verdict:"Confirmed absent: no Canceled/Cancelled in render.js ALL_STATUSES/statusColorMap or config.js. Small: add a Canceled status + color/priority maps, exclude from on-lot/queue counts, keep the record. Pairs with 5fbfa299."},
 {id:"9aab7550",by:"Brandon",date:"07-21",cat:"Messaging",loe:"S",theme:"Messaging",
  desc:"Highlight new/unchecked messages more clearly.",
  verdict:"Partial: messages.html already renders a gold unread-dot per conversation, but there is no row-level highlight for unchecked messages. Small: add a stronger unread treatment (bold row / tinted background)."},
 {id:"21fc3a9d",by:"Brandon",date:"07-21",cat:"Messaging",loe:"S",theme:"Messaging",
  desc:"Rescale the conversation-list text to make it easier to read.",
  verdict:"Confirmed absent: messages.html uses fixed rem font sizes (html 17.5px) with no user text-size control. Small: add a persisted font-scale/zoom for the conversation list."},
 {id:"f1e6e311",by:"Brandon",date:"07-21",cat:"Messaging",loe:"S",theme:"Messaging",
  desc:"A little button to clear the name faster in the messaging search bar.",
  verdict:"Confirmed absent: messages.html convoSearch is a plain text input with no clear/x button. Small: add a clear (x) button to reset the messaging conversation search quickly."},
 {id:"6e9ca4dc",by:"Brandon",date:"07-21",cat:"Messaging",loe:"S",theme:"Messaging",
  desc:"Remove the redundant 'Added to every send' signature note at the bottom of every chat.",
  verdict:"Valid: messaging.js refreshSignaturePreview renders a persistent 'Added to every send:' signature preview (msgSigPreview) under the composer; users find it redundant. Small: remove or collapse the always-on preview."},
 {id:"0448de62",by:"Sofia",date:"06-11",cat:"E-sign",loe:"L",theme:"E-sign & Auth form",
  desc:"Send an authorization form remotely for e-signature.",
  verdict:"Confirmed absent: signing is kiosk-only (customer-checkin.html on-device signature pad); raf_copy is only a post-signing email. Needs a tokenized public signing page + delivery + signed-form storage. Pairs with Sendblue Phase 3."},
 {id:"5fec3eca",by:"Sofia",date:"07-15",cat:"Auth form",loe:"S",theme:"E-sign & Auth form",
  desc:"Show the customer's address on the emailed copy of the authorization form.",
  verdict:"Confirmed absent: send-quote-email raf_copy branch (L387) does not destructure/emit customerAddress; the address appears only in the lead_staff_notify branch. Small: add customerAddress to the raf_copy payload + template."},
 {id:"e06d747e",by:"Riley",date:"04-10",cat:"Time Clock",loe:"S",theme:"Time clock",
  desc:"Tech check-in 'float' for ease of access.",
  verdict:"Confirmed absent: no floating/quick tech check-in button in index.html or checkin.html. Underspecified; scope the page and behavior with the submitter. Pairs with 6bb61db2."},
 {id:"6bb61db2",by:"Riley",date:"07-22",cat:"Time Clock",loe:"S",theme:"Time clock",
  desc:"Compact-view check-in/out button + a login-time 'clocked into X' reminder across views.",
  verdict:"Confirmed absent: render.js compact-col-actions has no check-in/out button and index.html shows no persistent clocked-into-X indicator. Small: add a compact check-in/out action + a login-time active time_log banner. Pairs with e06d747e."},
 {id:"2f752d40",by:"Jason",date:"07-21",cat:"Work Orders",loe:"S",theme:"Work Orders",
  desc:"Auto-populate the work-order dollar amount from total hours x the posted labor rate ($195/hr).",
  verdict:"Confirmed absent: work-orders.js has manual estimated_hours + dollar_value fields with no auto-calc. Small: auto-populate WO dollar_value = total hours x posted labor rate ($195/hr), editable override."},
 {id:"d1844e46",by:"Lynn",date:"07-16",cat:"Scheduling",loe:"S",theme:"Scheduling & Dates",
  desc:"Sort the dash by promised date then oldest on lot, keeping shop operations pinned to top.",
  verdict:"Confirmed absent: board uses a single blended calculatePriority score; shop-ops pinning exists (render.js) but no selectable strict promised-date-then-oldest-on-lot sort. Small: add the strict sort option."},
 {id:"ed1b873e",by:"Roland",date:"06-07",cat:"Auth/Cost",loe:"XL",theme:"Auth & cost",
  desc:"Replace Google-email auth (~$500/mo total; most staff don't use the email) with database-specific auth.",
  verdict:"Confirmed still Google-based: auth.js signInWithIdToken + google.accounts One Tap + GOOGLE_CONFIG; kiosk too. Swap to Supabase password/magic-link or shared role accounts to drop ~$500/mo; touches every page sign-in + RBAC. Roland to scope."},
 {id:"29654af7",by:"Lynn",date:"07-06",cat:"UI/UX",loe:"S",theme:"General UI/UX",
  desc:"A button to jump to the top of the page / search bar once scrolled to the bottom.",
  verdict:"Confirmed absent: index.html has only targeted scrollIntoView calls, no page-level scroll-to-top / jump-to-search button. Small: a scroll-triggered back-to-top / jump-to-search FAB."},
 {id:"d432863a",by:"Brandon",date:"07-21",cat:"UI/UX",loe:"S",theme:"General UI/UX",
  desc:"Make the browser tab icon the Patriots logo so the tab stands out.",
  verdict:"Confirmed absent: no favicon / apple-touch-icon / rel=icon in index.html or any page, so the tab shows a generic icon. Small: add a Patriots-logo favicon + apple-touch-icon to each page head."},
];

const ORDER={XL:0,L:1,M:2,S:3};
let activeFilter="all", query="";

function renderStats(){
  const c={XL:0,L:0,M:0,S:0};
  ERS.forEach(e=>c[e.loe]++);
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="n">${ERS.length}</div><div class="l">Open ERs (all Needed)</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--xl)">${c.XL}</div><div class="l">XL — new subsystem</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--l)">${c.L}</div><div class="l">L — multi-session</div></div>`+
    `<div class="stat"><div class="n" style="color:#7fb0ff">${c.M}</div><div class="l">M — ½–1 session</div></div>`+
    `<div class="stat"><div class="n" style="color:var(--s)">${c.S}</div><div class="l">S — under 2h*</div></div>`;
}
function renderList(){
  const list=document.getElementById('list'); list.innerHTML="";
  const q=query.toLowerCase();
  const shown=ERS.filter(e=>{
    if(activeFilter!=="all"&&e.loe!==activeFilter) return false;
    if(q){const blob=(e.id+e.by+e.cat+e.desc+e.verdict+e.theme).toLowerCase(); if(!blob.includes(q)) return false;}
    return true;
  });
  const themes=[...new Set(shown.map(e=>e.theme))];
  themes.forEach(th=>{
    const h=document.createElement('div'); h.className="theme"; h.textContent=th; list.appendChild(h);
    shown.filter(e=>e.theme===th).sort((a,b)=>ORDER[a.loe]-ORDER[b.loe]).forEach(e=>{
      const d=document.createElement('div'); d.className="er b-"+e.loe;
      d.innerHTML=`<div class="top"><p class="desc">${e.desc}</p>
        <span class="tag t-${e.loe}">LOE ${e.loe}</span></div>
        <div class="meta">${e.id} · ${e.by} · ${e.date} · ${e.cat}</div>
        <div class="verdict">${e.verdict}</div>`;
      list.appendChild(d);
    });
  });
  if(!shown.length) list.innerHTML='<div class="sub">No ERs match.</div>';
}
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active'); activeFilter=p.dataset.f; renderList();
}));
document.getElementById('q').addEventListener('input',e=>{query=e.target.value; renderList();});
renderStats(); renderList();
</script>
</body>
</html>
