name: Parts Status Report

# GH#18: Parts status email to all managers at 8 AM + 3 PM CDT, Mon-Fri
# MIGRATED TO SUPABASE pg_cron (Session 37, 2026-04-09) for reliable timing.
# Supabase cron jobs: parts-report-morning (0 13 * * 1-5) + parts-report-afternoon (0 20 * * 1-5)
# Service role key stored in Supabase Vault as 'service_role_key'.
# GitHub Actions schedule disabled to prevent double-sends.

on:
  # schedule:                  # DISABLED — now handled by Supabase pg_cron
  #   - cron: '0 13 * * 1-5'  # 8 AM CDT (Mon-Fri)
  #   - cron: '0 20 * * 1-5'  # 3 PM CDT (Mon-Fri)
  workflow_dispatch:           # keep manual trigger for testing

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send parts status report
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-parts-report")

          HTTP_BODY=$(echo "$RESPONSE" | head -n 1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $HTTP_BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Parts report failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Parts report sent successfully"
