name: Parts Status Report

# GH#18: Sends parts status email to all managers at 8 AM + 3 PM CDT, Mon-Fri
# 8 AM CDTM  = 13:00 UTC  (UTC-5 daylight saving; adjust to 14:00 Nov-Mar for CST)
# 3 PM CDT  = 20:00 UTC

on:
  schedule:
    - cron: '0 13 * * 1-5'   # 8 AM CDTM (Mon-Fri)
    - cron: '0 20 * * 1-5'   # 3 PM CDT (Mon-Fri)
  workflow_dispatch:           # allow manual trigger for testing

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send parts status report
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-parts-report")

          HTTP_BODY=$(echo "$RESPONSE" | head -n 1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $HTTP_BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Parts report failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Parts report sent successfully"
