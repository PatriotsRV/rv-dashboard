name: Daily Supabase Backup

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Export all Supabase tables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p backups/$DATE

          TABLES="repair_orders notes parts time_logs cashiered users user_roles roles audit_log config insurance_scans"

          for TABLE in $TABLES; do
            echo "Backing up $TABLE..."
            HTTP_STATUS=$(curl -s -o "backups/$DATE/$TABLE.json" -w "%{http_code}" \
              -H "apikey: $SUPABASE_SERVICE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
              -H "Accept: application/json" \
              "$SUPABASE_URL/rest/v1/$TABLE?select=*")
            if [ "$HTTP_STATUS" = "200" ]; then
              ROW_COUNT=$(jq 'length' backups/$DATE/$TABLE.json 2>/dev/null || echo 0)
              echo "  OK: $TABLE - $ROW_COUNT rows"
            else
              echo "  WARN: $TABLE - HTTP $HTTP_STATUS"
            fi
          done

          # Build manifest using jq
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          MANIFEST="{\"backup_date\":\"$DATE\",\"backup_time_utc\":\"$TIMESTAMP\",\"tables\":{}}"

          for TABLE in $TABLES; do
            if [ -f "backups/$DATE/$TABLE.json" ]; then
              COUNT=$(jq 'if type=="array" then length else 0 end' backups/$DATE/$TABLE.json 2>/dev/null || echo 0)
              MANIFEST=$(echo "$MANIFEST" | jq --arg t "$TABLE" --argjson c "$COUNT" '.tables[$t] = $c')
            fi
          done

          echo "$MANIFEST" | jq '.' > backups/$DATE/manifest.json
          echo "Manifest written:"
          cat backups/$DATE/manifest.json

      - name: Push backups to private backup repo
        env:
          GH_BACKUP_PAT: ${{ secrets.GH_BACKUP_PAT }}
        run: |
          DATE=$(date +%Y-%m-%d)

          git clone https://prvshepard:$GH_BACKUP_PAT@github.com/prvshepard/rv-dashboard-backups.git backup-repo

          cp -r backups/$DATE backup-repo/

          cd backup-repo

          echo "Cleaning up backups older than 30 days..."
          find . -maxdepth 1 -type d -name "20*" | sort | head -n -30 | while read dir; do
            echo "  Removing $dir"
            rm -rf "$dir"
          done

          git config user.name "PRVS Backup Bot"
          git config user.email "backup@patriotsrvservices.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily backup $DATE"
            git push
            echo "Backup pushed successfully"
          fi
