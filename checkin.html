<!--
    PRVS Tech Check-In v1.35
    Released: 2026-06-10
    v1.35: WEEKLY P&L (Session 99) — tech-lead "Our work is done" button on the clock-out
           summary screen (spec docs/specs/WEEKLY_PNL_SPEC.md section 5, Stage 1).
           After clocking out of a non-shop RO, the tech sees one row per service they
           logged: a green "✅ Our work is done" button (calls the mark_wo_tech_done
           SECURITY DEFINER RPC — sets ONLY tech_done_at/by on the silo's work order;
           techs cannot write service_work_orders directly under RLS), a blue chip if
           already tech-done, a green chip if the manager already completed it, or an
           amber "no work order exists — tell your manager" note (missing-WO surfacing
           at the point of work). Manager "Done-Done" in the dashboard WO modal is the
           revenue-recognition event; this is the leading indicator. Spanish strings added.
    v1.34: [ER BUGFIX S94] n22 (Tipton Scott) — added a "Return to Dashboard" button on the
           clock-out success screen so techs can get back to the dashboard to start another
           job without opening a new tab. + Spanish translation. No logic change.
    v1.33: GH#29c/GH#29d — FIX the ghost-write to repair_orders.status
           AND the long-standing casing bug ('In Progress' vs 'In progress').
           Tech clock-in has, since the very first upload of this file on
           2026-03-08, silently rewritten status on the parent RO with TWO
           independent bugs:
              (1) ZERO audit_log entry — Session 67 "ghost-write" pattern.
                  Manager audits "→ On Lot" / "→ Awaiting parts", a tech
                  opens checkin.html and clicks Clock In, status silently
                  flips, audit_log is silent. Production data scan (Session
                  71) shows 11 of 16 cross-RO ghost-write rows trace to
                  this single line — Ed Gordon, Jeannie Hickman, David
                  Hensley, Rick Hinton, Neal Silvers, Mark Saint Pe, Steve
                  & Alana Smith, Dez Rock, Don Mullins, Roland's training
                  RO PRVS-7CFE-2397, even PRVS-6020-CE43 (Shop).
              (2) WRONG CASING — pre-v1.33 wrote 'In Progress' (capital P)
                  but index.html's canonical value (used by every status
                  dropdown, filter button, STATUS_PROGRESS_MAP, statusColor
                  Map, ALL_STATUSES, Spanish key, stats filter) is
                  'In progress' (lowercase p). So every tech clock-in left
                  behind a row whose status didn't match the dropdown,
                  rendered with default-gray badge, missed the In-Progress
                  filter, undercounted stats, and fell back to literal
                  English for Spanish users. This is the same casing bug
                  GH#29c documented in audit_log (Bobby's manual lowercase
                  vs Brandon's auto-clock-in capital).
           Fix: keep the same auto-status behavior (techs still see the
           RO move into "In progress" the moment they clock in), but
              (a) constant IN_PROGRESS = 'In progress' (lowercase, canonical),
              (b) snapshot the prior status BEFORE mutating it,
              (c) write an audit_log row attributed to the tech with
                  field_changed='status', old_value=<prior>, new_value=
                  'In progress', user_name='<tech> (auto via clock-in)',
              (d) write a notes-table 'ro_status' line so the change is
                  visible on the RO card timeline ("⏱ AUTO-STATUS: ..."),
              (e) audit + note inserts wrapped in try/catch — non-fatal;
                  the status flip itself remains the primary action.
           No DB schema change. No behavior change for the user. Pure
           attribution + visibility + correctness fix. checkin.html now
           contains its first-ever calls to audit_log + notes — git blame
           shows the audit gap traces to commit b5ed919 on 2026-03-08
           (the original 'Add files via upload'), NOT a Claude regression.
    v1.32: GH#33 Phase 4 — Cross-RO clock-in guardrail. Closes the gap that
           allowed Ignacio Ochoa to be clocked into 3 ROs simultaneously on
           Tue May 5 2026 (the bug Roland flagged → display-side fix shipped
           in worklist-report.html v1.11). The cross-RO check in load() is
           CLIENT-SIDE ONLY and bypassable when (A) page loaded offline,
           (B) navigator.onLine returned true but the Supabase fetch
           silently failed, (C) PWA / cached page reuse skipped re-loading,
           or (D) offline queue replay reached the DB without the check.
           This release adds three layers of defense:
           (Server-side) supabase/migrations/cross_ro_clockin_guardrail.sql:
              - BEFORE INSERT trigger auto_close_prior_open_session() that
                auto-closes any prior open session for this tech on a
                different RO at NEW.clock_in (close_reason
                'auto_replaced_by_new_session'). Catches every code path.
              - UNIQUE partial index idx_time_logs_one_open_per_tech ON
                time_logs(tech_email) WHERE clock_out IS NULL — hard
                backstop. Throws 23505 if the trigger is ever bypassed.
           (Client-side, this file)
              (1) clockIn() 23505 handler now distinguishes per-(tech,ro)
                  vs per-(tech) conflicts. Per-(tech) shows a clear "you
                  are already clocked in on X — clock out first" message
                  and bails (rather than re-syncing local state with a
                  same-RO existing row, which would be wrong).
              (2) After successful clockIn() INSERT, queries for any prior
                  session this tech got auto-closed by the trigger in the
                  last 5s; if found, shows showAutoCloseToast() — top-of-
                  screen amber toast naming the prior RO. Self-dismisses
                  6s; tap to dismiss earlier.
              (3) drainQueue() accumulates trigger auto-closes during
                  replay. If any fired, the sync banner stays visible at
                  the end with "⚠ Sync auto-closed prior sessions: N"
                  instead of being hidden — surfaces the discipline signal
                  for offline-replay scenarios where the tech wasn't
                  present at clock-in time.
              (4) New Spanish translations for the new strings.
           Note: load()'s "Still Clocked In!" prompt remains the preferred
           UX path for online foreground clock-ins because it lets the tech
           specify how long ago they finished the prior RO (more accurate
           clock_out adjustment than the trigger's NEW.clock_in default).
    v1.31: GH#24 Phase 3 — Shop RO work item tracking. When a tech opens a Shop RO
           (ro_type='shop'), the Service Type picker is replaced by a Shop Activity
           picker: Shop Cleanup / Moving RVs / Work Break / Running Errands / Part Pickup.
           Selection is required before clocking in. The chosen activity is stored in the
           new time_logs.shop_activity column (migration: shop_activity_time_logs.sql).
           Clock-out summary shows the activity. Spanish translations added for all 5 items.
           For shop ROs the RO info panel shows a purple 🏪 Shop Operations banner and
           hides the RV row (shop ROs have no customer RV). service_type is set to 'Shop'
           on time_logs for shop clock-ins so worklist-report filtering remains clean.
    v1.30: GH#33 Phase 1 — rapid-fire clock-in dupe prevention. (1) Clock In button
           locks instantly on tap (disabled + spinner) to kill double-tap misfires. (2) Pre-INSERT
           SELECT guard checks for existing open row on (tech_email, ro_id) before inserting —
           if found, shows friendly toast and skips the INSERT. (3) Catches Postgres 23505
           unique_violation from the new UNIQUE partial index (migration gh33_unique_open_time_log.sql)
           and shows the same friendly toast instead of raw error. (4) Offline queue replay
           (drainQueue) now dedupes on replay — for each queued clock_in item, SELECTs first to
           verify no open row already exists for that (tech, ro) before INSERTing. Stops the
           Ignacio-style replay storm where an offline-queued clock-in gets flushed multiple times
           on reconnect. Pairs with the DB UNIQUE partial index as load-bearing guard of last resort.
    v1.28: Fix Supabase auth for time_logs — signInWithIdToken() now called on Google sign-in,
           establishes authenticated Supabase session so clock-in/out inserts use 'authenticated'
           role (not anon). getSession() restores session on reload (30-day persistence).
           generateNonce() added (hex SHA-256, matches index.html pattern). onAuthStateChange
           listener keeps supabaseSession in sync. clockIn() guards against online insert without
           session. Anon INSERT/UPDATE policies on time_logs can now be safely removed.
    v1.27: Spanish language toggle — globe button, TRANSLATIONS_ES dictionary, t() helper, full UI translation (check-in/out flow, auto clock-out modal, clock-out summary, offline banner, dictation button)
    v1.26: Supabase backend (replaces Google Sheets); offline-first IndexedDB queue; auto clock-out; one RO at a time
-->

// ── Nonce Generation (hex SHA-256, matches index.html pattern) ─
async function generateNonce() {
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    const rawNonce = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
    const msgBuffer = new TextEncoder().encode(rawNonce);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashedNonce = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    return { rawNonce, hashedNonce };
}

// ── IndexedDB Offline Queue ───────────────────────────────────
const IDB_NAME    = 'prvs_checkin';
const IDB_STORE   = 'sync_queue';
let idb = null;

function openIDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE, { keyPath: 'id', autoIncrement: true });
        req.onsuccess = e => { idb = e.target.result; resolve(idb); };
        req.onerror   = () => reject(req.error);
    });
}

async function queueOfflineAction(action) {
    if (!idb) return;
    return new Promise((resolve, reject) => {
        const tx  = idb.transaction(IDB_STORE, 'readwrite');
        const req = tx.objectStore(IDB_STORE).add({ ...action, queuedAt: new Date().toISOString() });
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
    });
}

async function getQueuedActions() {
    if (!idb) return [];
    return new Promise((resolve, reject) => {
        const tx  = idb.transaction(IDB_STORE, 'readonly');
        const req = tx.objectStore(IDB_STORE).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
    });
}

async function removeQueuedAction(id) {
    if (!idb) return;
    return new Promise((resolve, reject) => {
        const tx  = idb.transaction(IDB_STORE, 'readwrite');
        const req = tx.objectStore(IDB_STORE).delete(id);
        req.onsuccess = () => resolve();
        req.onerror   = () => reject(req.error);
    });
}

// ── Online/Offline Handling ───────────────────────────────────
window.addEventListener('online',  () => { isOnline = true;  updateSyncBanner(); drainQueue(); });
window.addEventListener('offline', () => { isOnline = false; updateSyncBanner(); });

function updateSyncBanner() {
    const el = document.getElementById('syncBanner');
    if (!el) return;
    if (!isOnline) {
        el.className = 'sync-banner offline';
        el.textContent = t('📵 Offline — actions will sync when reconnected');
        el.style.display = 'block';
    } else {
        el.style.display = 'none';
    }
}

async function drainQueue() {
    const items = await getQueuedActions();
    if (!items.length) return;

    const banner = document.getElementById('syncBanner');
    if (banner) { banner.className = 'sync-banner syncing'; banner.textContent = `🔄 Syncing ${items.length} offline action(s)...`; banner.style.display = 'block'; }

    // GH#33 Phase 4 — accumulator for trigger auto-closes during replay so we can
    // surface a single banner at the end ("⚠ N prior sessions auto-closed during sync").
    const triggerClosedRoIds = new Set();

    for (const item of items) {
        try {
            if (item.type === 'clock_in') {
                // GH#33 Phase 1 — dedupe on replay. If a row already exists for this
                // (tech_email, ro_id) with clock_out IS NULL, don't re-INSERT — the
                // previous replay or a concurrent foreground clock-in already landed.
                // This is the Ignacio rapid-fire replay-storm fix.
                const d = item.data || {};
                if (d.tech_email && d.ro_id) {
                    const { data: existing } = await getSB()
                        .from('time_logs')
                        .select('id')
                        .eq('tech_email', d.tech_email)
                        .eq('ro_id', d.ro_id)
                        .is('clock_out', null)
                        .maybeSingle();
                    if (existing) {
                        log('Queue replay skipped — open session already exists for', d.tech_email, d.ro_id);
                        await removeQueuedAction(item.id);
                        continue;
                    }
                }
                const { data: insertedRow, error } = await getSB()
                    .from('time_logs')
                    .insert(item.data)
                    .select('id, clock_in')
                    .single();
                if (!error) {
                    await removeQueuedAction(item.id);
                    // GH#33 Phase 4 — observability for the BEFORE INSERT trigger.
                    // If the trigger fired (because this tech had a prior open session
                    // on a different RO at the time of original offline tap), check for
                    // it and accumulate so we can surface a banner at the end.
                    if (d.tech_email && insertedRow?.clock_in) {
                        try {
                            const since = new Date(new Date(insertedRow.clock_in).getTime() - 1000).toISOString();
                            const { data: closed } = await getSB()
                                .from('time_logs')
                                .select('ro_id')
                                .eq('tech_email', d.tech_email)
                                .eq('close_reason', 'auto_replaced_by_new_session')
                                .gte('clock_out', since)
                                .neq('id', insertedRow.id);
                            if (closed) closed.forEach(r => r.ro_id && triggerClosedRoIds.add(r.ro_id));
                        } catch(e) { warn('Replay trigger-observability check failed:', e); }
                    }
                } else if (error.code === '23505') {
                    // Belt-and-suspenders with the DB unique partial indexes:
                    //   - Phase 1 (tech, ro)  — same-RO duplicate, drop the queued item
                    //   - Phase 4 (tech)       — cross-RO duplicate; trigger should have
                    //     pre-closed the prior, so this branch is rare. Still safe to drop.
                    log('Queue replay 23505 — dropping queued duplicate', d.tech_email, d.ro_id);
                    await removeQueuedAction(item.id);
                }
            } else if (item.type === 'clock_out') {
                const { error } = await getSB().from('time_logs').update(item.data).eq('id', item.logId);
                if (!error) await removeQueuedAction(item.id);
            }
        } catch(e) {
            warn('Queue drain error:', e);
        }
    }

    if (banner) {
        if (triggerClosedRoIds.size > 0) {
            // Show the trigger-fired summary instead of just hiding the banner.
            // Auto-dismiss after 8s; tap to dismiss earlier.
            banner.className = 'sync-banner';
            banner.style.background = 'linear-gradient(135deg, #7c2d12, #b45309)';
            banner.style.color = '#fef3c7';
            banner.style.cursor = 'pointer';
            banner.onclick = () => { banner.style.display = 'none'; };
            banner.innerHTML = `⚠ ${t('Sync auto-closed prior sessions:')} ${triggerClosedRoIds.size}`;
            setTimeout(() => { banner.style.display = 'none'; }, 8000);
        } else {
            banner.style.display = 'none';
        }
    }
    log('✅ Offline queue drained' + (triggerClosedRoIds.size > 0 ? ` (${triggerClosedRoIds.size} prior session(s) auto-closed by trigger)` : ''));
}

// ── Google Sign-In ────────────────────────────────────────────
async function showSignIn() {
    const { rawNonce, hashedNonce } = await generateNonce();
    localStorage.setItem('prvs_raw_nonce', rawNonce);

    document.getElementById('app').innerHTML = `
        <div class="signin-container">
            <p>${'Sign in with your Patriots RV Google account to check in or out.'}</p>
            <div id="googleSignInBtn"></div>
        </div>`;

    const tryInit = setInterval(() => {
        if (typeof google !== 'undefined' && google.accounts) {
            clearInterval(tryInit);
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleSignIn,
                auto_select: true,
                nonce: hashedNonce,
                params: { nonce: hashedNonce },
            });
            google.accounts.id.renderButton(
                document.getElementById('googleSignInBtn'),
                { theme: 'outline', size: 'large', text: 'sign_in_with', width: 300 }
            );
            google.accounts.id.prompt();
        }
    }, 200);
}

async function handleSignIn(response) {
    try {
        const rawNonce = localStorage.getItem('prvs_raw_nonce') || '';

        document.getElementById('app').innerHTML = '<div class="loading">🔐 Signing in...</div>';

        const { data, error } = await getSB().auth.signInWithIdToken({
            provider: 'google',
            token: response.credential,
            nonce: rawNonce,
        });

        if (error) throw error;

        supabaseSession = data.session;
        currentUser = {
            email: supabaseSession.user.email,
            name: supabaseSession.user.user_metadata?.full_name || supabaseSession.user.email.split('@')[0],
        };

        log('✅ Signed in + Supabase session established:', currentUser.name);

        localStorage.setItem('prvs_user_identity', JSON.stringify({
            email: currentUser.email, name: currentUser.name, savedAt: Date.now()
        }));
        localStorage.setItem('prvs_checkin_user', JSON.stringify(currentUser));
        localStorage.removeItem('prvs_raw_nonce');

        await loadAndRender();

    } catch(e) {
        console.error('Sign-in error:', e);
        try {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = { email: payload.email, name: payload.name };
            warn('⚠️ Supabase session NOT established — clock-in will be blocked online. Error:', e.message);
            localStorage.removeItem('prvs_raw_nonce');
            await loadAndRender();
        } catch(e2) {
            showError('Sign-in failed. Please try again.');
        }
    }
}

// ── Load RO + Active Session ──────────────────────────────────
async function loadAndRender() {
    showLoading(t('Loading RO...'));

    if (isOnline) {
        try {
            let ro = null;
            let roErr = null;

            if (roIdParam.startsWith('PRVS-')) {
                const result = await getSB()
                    .from('repair_orders')
                    .select('*')
                    .eq('ro_id', roIdParam)
                    .maybeSingle();
                ro = result.data;
                roErr = result.error;
            } else {
                const parts = roIdParam.replace('RO-', '').split('-');
                const namePart = parts.slice(0, -3).join(' ');
                warn('Legacy RO ID format detected:', roIdParam, '— searching by name:', namePart);
                const result = await getSB()
                    .from('repair_orders')
                    .select('*')
                    .ilike('customer_name', '%' + namePart + '%')
                    .limit(1)
                    .maybeSingle();
                ro = result.data;
                roErr = result.error;
                if (!ro) throw new Error('This QR code uses the old format. Please use the Tech Check-In button on the dashboard to get an updated QR code for ' + namePart + '.');
            }

            if (roErr) throw roErr;
            if (!ro) throw new Error('RO not found: ' + roIdParam);
            roData = ro;

            const { data: activeLogs } = await getSB()
                .from('time_logs')
                .select('*')
                .eq('tech_email', currentUser.email)
                .is('clock_out', null)
                .order('clock_in', { ascending: false })
                .limit(1);

            const anyActiveSession = activeLogs?.[0] || null;

            if (anyActiveSession && anyActiveSession.ro_id !== roData.id) {
                try {
                    await autoClockOut(anyActiveSession);
                } catch(e) {
                    if (e.message === 'CANCELLED') {
                        showError('Clock-in cancelled. You are still clocked in to the previous RO.');
                        return;
                    }
                    throw e;
                }
            }

            const { data: thisLogs } = await getSB()
                .from('time_logs')
                .select('*')
                .eq('ro_id', roData.id)
                .eq('tech_email', currentUser.email)
                .is('clock_out', null)
                .order('clock_in', { ascending: false })
                .limit(1);

            activeSession = thisLogs?.[0] || null;

        } catch(e) {
            warn('Online load failed, using cached data:', e);
            loadFromCache();
        }
    } else {
        loadFromCache();
    }

    render();
}

function loadFromCache() {
    const cachedRO = localStorage.getItem('prvs_ro_' + roIdParam);
    if (cachedRO) {
        roData = JSON.parse(cachedRO);
    } else {
        roData = { ro_id: roIdParam, customer_name: 'Unknown (Offline)', rv: '', status: '', technician: '' };
    }
    const cachedSession = localStorage.getItem('prvs_session_' + roIdParam + '_' + (currentUser?.email || ''));
    activeSession = cachedSession ? JSON.parse(cachedSession) : null;
}

async function autoClockOut(session) {
    let prevROName = 'previous RO';
    if (isOnline) {
        const { data: prevRO } = await getSB()
            .from('repair_orders')
            .select('customer_name, ro_id')
            .eq('id', session.ro_id)
            .maybeSingle();
        if (prevRO) prevROName = `${escapeHtml(prevRO.customer_name)} (${escapeHtml(prevRO.ro_id)})`;
    }

    const answer = await showFinishedTimePrompt(prevROName, session.clock_in);
    if (answer === null) throw new Error('CANCELLED');

    const now = new Date();
    const maxAdjustMinutes = Math.floor((now - new Date(session.clock_in)) / 60000);
    const adjustMinutes = Math.min(answer, maxAdjustMinutes);
    const clockOutTime = new Date(now.getTime() - (adjustMinutes * 60 * 1000));
    const duration = Math.max(0, Math.round((clockOutTime - new Date(session.clock_in)) / 1000));

    const updateData = {
        clock_out:        clockOutTime.toISOString(),
        duration_seconds: duration,
        updated_at:       now.toISOString(),
        work_notes:       (session.work_notes || '') + (session.work_notes ? '\n' : '') + '[Auto clocked out — tech indicated finished ' + answer + ' min ago]',
    };

    log(`🔄 Auto clocking out of ${prevROName}, adjusted by -${answer} min. Duration: ${Math.round(duration/60)} min`);

    if (isOnline) {
        await getSB().from('time_logs').update(updateData).eq('id', session.id);
    } else {
        await queueOfflineAction({ type: 'clock_out', logId: session.id, data: updateData });
    }
    localStorage.removeItem('prvs_session_' + roIdParam + '_' + currentUser.email);
    window._autoClockoutMsg = `Auto clocked out of ${prevROName} — adjusted by ${answer} min.`;
}

function showFinishedTimePrompt(prevROName, clockInTime) {
    return new Promise((resolve) => {
        const clockInStr = new Date(clockInTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const elapsed = Math.round((Date.now() - new Date(clockInTime)) / 60000);

        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
        overlay.innerHTML = `
            <div style="background:white;border-radius:16px;padding:28px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
                <div style="font-size:36px;text-align:center;margin-bottom:12px;">⚠️</div>
                <h2 style="color:#92400e;font-size:18px;font-weight:700;margin-bottom:8px;text-align:center;">${t('Still Clocked In!')}</h2>
                <p style="color:#64748b;font-size:14px;margin-bottom:6px;text-align:center;">
                    ${t('You are clocked in to:')}
                </p>
                <p style="color:#1e293b;font-size:15px;font-weight:700;margin-bottom:6px;text-align:center;">${prevROName}</p>
                <p style="color:#64748b;font-size:13px;margin-bottom:20px;text-align:center;">
                    Since ${clockInStr} (${elapsed} min ago)
                </p>

                <label style="display:block;font-size:14px;font-weight:600;color:#475569;margin-bottom:6px;">
                    ${t('How long ago did you finish that RO?')} <span style="color:#ef4444;font-weight:700;">*</span>
                    <span style="color:#94a3b8;font-weight:400;font-size:13px;"> ${t('(minutes — required)')}</span>
                </label>

                <input type="number" id="finishedMins" min="0" max="${elapsed}"
                    placeholder="${t('Enter minutes ago...')}"
                    oninput="document.getElementById('confirmAutoClockout').disabled = !this.value || parseInt(this.value) < 0"
                    style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;margin-bottom:16px;">

                <div style="display:flex;gap:8px;">
                    <button id="cancelAutoClockout" style="flex:1;padding:12px;background:#f1f5f9;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;color:#475569;">
                        ${t('Cancel')}
                    </button>
                    <button id="confirmAutoClockout" disabled style="flex:2;padding:12px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;color:white;opacity:0.5;">
                        ${t('✅ Clock Out & Switch RO')}
                    </button>
                </div>
            </div>`;

        document.body.appendChild(overlay);

        document.getElementById('finishedMins').addEventListener('input', function() {
            const btn = document.getElementById('confirmAutoClockout');
            const valid = this.value !== '' && parseInt(this.value) >= 0;
            btn.disabled = !valid;
            btn.style.opacity = valid ? '1' : '0.5';
        });

        document.getElementById('confirmAutoClockout').addEventListener('click', () => {
            const val = parseInt(document.getElementById('finishedMins').value);
            if (isNaN(val) || val < 0) { alert('Please enter how many minutes ago you finished.'); return; }
            overlay.remove();
            resolve(val);
        });

        document.getElementById('cancelAutoClockout').addEventListener('click', () => {
            overlay.remove();
            resolve(null);
        });
    });
}

function selectService(type) {
    selectedService = (selectedService === type) ? null : type;
    document.querySelectorAll('.service-chip').forEach(chip => {
        chip.classList.toggle('selected', chip.textContent.trim() === selectedService);

}

// ── Shop Activity Select (single) — v1.31 ────────────────────
function selectShopActivity(activity) {
    selectedShopActivity = (selectedShopActivity === activity) ? null : activity;
    document.querySelectorAll('.shop-chip').forEach(chip => {
        // Compare against translated label shown in chip
        const chipActivity = SHOP_ACTIVITIES.find(a => t(a) === chip.textContent.trim());
        chip.classList.toggle('selected', chipActivity === selectedShopActivity);
    });
}

// ── Clock In ─────────────────────────────────────────────────
// GH#33 Phase 1 — v1.30: locks clockIn() against concurrent re-entry for the whole
// tab lifetime of a click. Paired with the button-disabled state, kills double-tap
// dupes even if the user double-clicks faster than the UI can render the disabled
// state.
let _clockInPending = false;

async function clockIn() {
    if (_clockInPending) {
        log('Clock-in already in progress — ignoring duplicate tap');
        return;
    }

    // v1.31: shop ROs require a shop activity; regular ROs require a service type
    if (roData.ro_type === 'shop') {
        if (!selectedShopActivity) {
            alert(t('Please select a shop activity before clocking in.'));
            return;
        }
    } else {
        if (!selectedService) {
            alert(t('Please select a service type before clocking in.'));
            return;
        }
    }

    // Guard: online clock-in requires an authenticated Supabase session.
    // Without this, the insert hits anon role and fails RLS.
    if (isOnline && !supabaseSession) {
        alert('Your session is not ready yet. Please sign out and sign back in.');
        return;
    }

    // GH#33 Phase 1 — instant button lock + spinner. Disabled state prevents
    // tap-again loops; the in-memory _clockInPending is the authoritative guard.
    _clockInPending = true;
    const btn = document.getElementById('clockInBtn');
    const originalBtnText = btn ? btn.innerHTML : '';
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '⏳ ' + t('🟢 Clock In / Start Work');
        btn.style.opacity = '0.6';
    }

    const now = new Date().toISOString();
    const notes = document.getElementById('workNotes')?.value || '';

    // v1.31: shop ROs log activity type in shop_activity; service_type='Shop' for report clarity
    const isShopClockIn = roData.ro_type === 'shop';
    const logData = {
        ro_id:            roData.id,
        tech_email:       currentUser.email,
        tech_name:        currentUser.name,
        clock_in:         now,
        clock_out:        null,
        service_type:     isShopClockIn ? 'Shop' : selectedService,
        shop_activity:    isShopClockIn ? selectedShopActivity : null,
        work_notes:       notes,
        duration_seconds: 0,
    };

    try {
        if (isOnline) {
            // GH#33 Phase 1 — pre-INSERT SELECT guard. If an open row already exists
            // for this (tech, ro), don't INSERT. Gives a graceful UX ahead of the DB
            // unique_violation that would otherwise fire.
            const { data: existing, error: existingErr } = await getSB()
                .from('time_logs')
                .select('id, clock_in')
                .eq('tech_email', currentUser.email)
                .eq('ro_id', roData.id)
                .is('clock_out', null)
                .maybeSingle();
            if (!existingErr && existing) {
                alert(t('You are already clocked in on this RO. If you think this is wrong, sign out and sign back in.'));
                // Re-sync local state with the existing session so the UI reflects reality.
                activeSession = existing;
                localStorage.setItem('prvs_session_' + roIdParam + '_' + currentUser.email, JSON.stringify(activeSession));
                render();
                return;
            }

            const { data, error } = await getSB().from('time_logs').insert(logData).select().single();
            if (error) {
                // GH#33 Phase 1 — friendly handling for the DB unique_violation (23505).
                // Two unique partial indexes can fire here:
                //   - idx_time_logs_one_open_per_tech_ro (Phase 1, same RO)
                //   - idx_time_logs_one_open_per_tech    (Phase 4, any RO — should be
                //     unreachable in practice because the BEFORE INSERT trigger pre-closes
                //     the prior session; this branch is the belt-and-suspenders backstop)
                if (error.code === '23505') {
                    // First check if the conflict is on THIS RO (the original Phase 1 case).
                    const { data: sameRoOpen } = await getSB()
                        .from('time_logs')
                        .select('*')
                        .eq('tech_email', currentUser.email)
                        .eq('ro_id', roData.id)
                        .is('clock_out', null)
                        .maybeSingle();
                    if (sameRoOpen) {
                        alert(t('You are already clocked in on this RO. If you think this is wrong, sign out and sign back in.'));
                        activeSession = sameRoOpen;
                        localStorage.setItem('prvs_session_' + roIdParam + '_' + currentUser.email, JSON.stringify(activeSession));
                        render();
                        return;
                    }
                    // Phase 4 case — conflict is on a DIFFERENT RO. The trigger should
                    // have prevented this; if we're here, the trigger wasn't installed
                    // or was disabled. Fall back to a clear error message.
                    const { data: otherOpen } = await getSB()
                        .from('time_logs')
                        .select('*, repair_orders(ro_id, customer_name)')
                        .eq('tech_email', currentUser.email)
                        .is('clock_out', null)
                        .maybeSingle();
                    const otherLabel = otherOpen?.repair_orders
                        ? `${otherOpen.repair_orders.customer_name || ''} (${otherOpen.repair_orders.ro_id || ''})`
                        : t('another RO');
                    alert(t('You are already clocked in on:') + ' ' + otherLabel + '. ' + t('Please clock out of that RO before starting a new one.'));
                    return;
                }
                throw error;
            }
            activeSession = data;
            log('✅ Clocked in:', activeSession.id);

            // GH#33 Phase 4 — observability for the BEFORE INSERT trigger.
            // The trigger auto-closes any prior open session for this tech on a
            // different RO at NEW.clock_in. When that fires, the tech (or whoever
            // is looking at the page) should see a toast confirming the auto-close
            // — otherwise it's a silent state change. Best-effort query (failure
            // is non-blocking).
            try {
                const since = new Date(Date.now() - 5000).toISOString();
                const { data: closedByTrigger } = await getSB()
                    .from('time_logs')
                    .select('id, ro_id, repair_orders(ro_id, customer_name)')
                    .eq('tech_email', currentUser.email)
                    .eq('close_reason', 'auto_replaced_by_new_session')
                    .gte('clock_out', since)
                    .neq('id', activeSession.id);
                if (closedByTrigger && closedByTrigger.length > 0) {
                    const labels = closedByTrigger.map(r => {
                        const ro = r.repair_orders;
                        return ro ? `${ro.customer_name || ''} (${ro.ro_id || ''})` : t('previous session');
                    }).join(', ');
                    showAutoCloseToast(labels);
                }
            } catch(e) { warn('Trigger-observability check failed:', e); }
        } else {
            const tempId = 'offline_' + Date.now();
            activeSession = { ...logData, id: tempId, _offline: true };
            await queueOfflineAction({ type: 'clock_in', data: logData, tempId });
            log('📵 Clock-in queued for sync');
        }

        localStorage.setItem('prvs_session_' + roIdParam + '_' + currentUser.email, JSON.stringify(activeSession));

        // ── v1.33 (GH#29c/GH#29d) — Audited auto-status flip ─────────
        // Snapshot the prior status BEFORE the UPDATE so the audit_log
        // captures the actual reversion source. Then write the audit_log
        // row and a notes-table 'ro_status' entry so the change is visible
        // (a) in the RO Status Notes timeline on the card and
        // (b) in the per-RO audit query managers run from worklist-report.
        // Failure of the audit/note insert is non-fatal — the status flip
        // itself is the primary action, attribution is best-effort.
        //
        // CRITICAL casing fix: index.html's canonical status value is
        // 'In progress' (lowercase p) — used by every status dropdown,
        // filter button, STATUS_PROGRESS_MAP, statusColorMap, ALL_STATUSES,
        // Spanish translation key, and stats filter. Pre-v1.33 this file
        // wrote 'In Progress' (capital P), so EVERY tech clock-in not only
        // ghost-wrote without audit, it also wrote the wrong casing —
        // causing capital-P rows to render with default-gray badges,
        // disappear from the In-progress filter, undercount stats, and
        // fall back to literal English instead of "En Progreso" for
        // Spanish users. v1.33 fixes both: audit attribution + correct
        // casing in the same write.
        const IN_PROGRESS = 'In progress';  // canonical value matching index.html
        if (isOnline && roData.status !== IN_PROGRESS) {
            const priorStatus = roData.status || '';
            await getSB().from('repair_orders').update({
                status: IN_PROGRESS,
                pct_complete: 60,
                updated_at: now,
            }).eq('id', roData.id);
            roData.status = IN_PROGRESS;

            // Audit log — attributes the silent flip to the tech who clocked in.
            try {
                await getSB().from('audit_log').insert({
                    ro_id:         roData.id,
                    user_id:       supabaseSession?.user?.id || null,
                    user_email:    currentUser?.email || 'unknown',
                    user_name:     (currentUser?.name || currentUser?.email || 'Tech') + ' (auto via clock-in)',
                    field_changed: 'status',
                    old_value:     priorStatus,
                    new_value:     IN_PROGRESS,
                    changed_at:    now,
                });
            } catch(e) { warn('Clock-in audit_log write failed (non-fatal):', e); }

            // Status note — surfaces the flip on the RO card timeline so
            // a returning manager sees "auto-set by clock-in" instead of
            // wondering why their manual status change reverted.
            try {
                const ts = new Date(now).toLocaleString('en-US', {
                    timeZone: 'America/Chicago',
                    month: '2-digit', day: '2-digit', year: '2-digit',
                    hour: '2-digit', minute: '2-digit',
                });
                const who = currentUser?.name || currentUser?.email || 'Tech';
                const fromLabel = priorStatus ? `from "${priorStatus}" ` : '';
                await getSB().from('notes').insert({
                    ro_id: roData.id,
                    type:  'ro_status',
                    body:  `[${ts} - ${who}] ⏱ AUTO-STATUS: ${fromLabel}→ "${IN_PROGRESS}" (set automatically when ${who} clocked in)`,
                });
            } catch(e) { warn('Clock-in status note write failed (non-fatal):', e); }
        }

        render();
    } catch(e) {
        console.error('Clock-in error:', e);
        alert('Error clocking in: ' + e.message);
        // Restore button on error so tech can retry.
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = originalBtnText;
            btn.style.opacity = '';
        }
    } finally {
        _clockInPending = false;
        // On success, render() already redrew the UI and the button is gone. On
        // early-return paths above, we re-rendered before returning so the button
        // is either gone (success) or re-drawn fresh by render(). Nothing more to do.
    }
}

// ── Clock Out ────────────────────────────────────────────────
async function clockOut() {
    if (!activeSession) return;

    const now      = new Date().toISOString();
    const duration = Math.round((new Date(now) - new Date(activeSession.clock_in)) / 1000);
    const notes    = document.getElementById('workNotes')?.value || activeSession.work_notes || '';

    // v1.31: for shop ROs, show the shop activity in the clock-out summary
    const isShopClockOut = roData.ro_type === 'shop';
    const services = isShopClockOut
        ? (selectedShopActivity || activeSession.shop_activity || t('Shop'))
        : (selectedService || activeSession.service_type || '');

    const updateData = {
        clock_out:        now,
        duration_seconds: duration,
        work_notes:       notes,
        service_type:     isShopClockOut ? 'Shop' : (selectedService || activeSession.service_type || ''),
        updated_at:       now,
    };

    try {
        if (isOnline && !activeSession._offline) {
            const { error } = await getSB().from('time_logs').update(updateData).eq('id', activeSession.id);
            if (error) throw error;
            log('✅ Clocked out. Duration:', Math.round(duration / 60), 'minutes');
        } else {
            await queueOfflineAction({ type: 'clock_out', logId: activeSession.id, data: updateData });
            log('📵 Clock-out queued for sync');
        }

        localStorage.removeItem('prvs_session_' + roIdParam + '_' + currentUser.email);
        activeSession = null;

        stopTimer();
        showClockOutSummary(duration, notes, services, isShopClockOut);

    } catch(e) {
        console.error('Clock-out error:', e);
        alert('Error clocking out: ' + e.message);
    }
}

// ── v1.35: Tech-lead "Our work is done" (Weekly P&L, spec section 5 Stage 1) ──
const CHECKIN_SERVICE_TO_SILO = {
    'Roof': 'roof', 'Solar': 'solar', 'Vroom': 'vroom', 'Paint and Body': 'paint_body',
    'Repairs': 'repair', 'TrueTopper': 'truetopper', 'Detailing': 'detailing', 'Chassis': 'chassis',
};

async function renderTechDoneSlot(services) {
    const slot = document.getElementById('techDoneSlot');
    if (!slot || !roData?.id) return;
    const svcList = String(services || '').split(',').map(s => s.trim())
        .filter(s => CHECKIN_SERVICE_TO_SILO[s]);
    if (svcList.length === 0) return;
    let html = '';
    for (const svc of svcList) {
        const silo = CHECKIN_SERVICE_TO_SILO[svc];
        try {
            const { data: wos, error } = await getSB().from('service_work_orders')
                .select('id, tech_done_at, tech_done_by, completed_at')
                .eq('ro_id', roData.id).eq('service_silo', silo);
            if (error) throw error;
            const wo = (wos || [])[0];
            if (!wo) {
                html += `<div style="background:#fef3c7;color:#92400e;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;font-weight:600;text-align:left;">⚠ ${escapeHtml(svc)} — ${t('No work order exists for this service yet — let your manager know.')}</div>`;
            } else if (wo.completed_at) {
                html += `<div style="background:#dcfce7;color:#166534;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;font-weight:600;text-align:left;">✓ ${escapeHtml(svc)} — ${t('Already completed by manager')}</div>`;
            } else if (wo.tech_done_at) {
                html += `<div style="background:#dbeafe;color:#1e40af;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;font-weight:600;text-align:left;">🔵 ${escapeHtml(svc)} — ${t('Marked done')} ${String(wo.tech_done_at).slice(0, 10)}</div>`;
            } else {
                html += `<button class="btn" style="width:100%;margin-bottom:8px;background:#fff;border:2px solid #16a34a;color:#166534;font-weight:700;" onclick="markTechDone('${wo.id}', this)">✅ ${t('Our work is done')} — ${escapeHtml(svc)}</button>`;
            }
        } catch (e) { warn('techDoneSlot:', e); }
    }
    if (html) {
        slot.innerHTML = `<div style="margin:0 0 16px;">
            <div style="font-weight:700;font-size:14px;color:#1e293b;margin-bottom:8px;text-align:left;">${t("Is your team's work on this RV done?")}</div>${html}</div>`;
    }
}

async function markTechDone(woId, btn) {
    if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
    try {
        const { error } = await getSB().rpc('mark_wo_tech_done', { p_wo_id: woId, p_done: true });
        if (error) throw error;
        if (btn) {
            btn.outerHTML = `<div style="background:#dbeafe;color:#1e40af;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;font-weight:600;text-align:left;">🔵 ${t('Marked done')} — ${t('your manager will finalize it')}</div>`;
        }
    } catch (e) {
        console.error('markTechDone:', e);
        if (btn) { btn.disabled = false; btn.textContent = '✅ ' + t('Our work is done'); }
        alert(t('Could not update — try again or tell your manager.'));
    }
}

// ── Timer ─────────────────────────────────────────────────────
function startTimer(startTime) {
    stopTimer();
    timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const h = Math.floor(elapsed / 3600).toString().padStart(2, '0');
        const m = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
        const s = (elapsed % 60).toString().padStart(2, '0');
        const el = document.getElementById('timerDisplay');
        if (el) el.textContent = `${h}:${m}:${s}`;
    }, 1000);
}

function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ── Voice Dictation ───────────────────────────────────────────
function toggleDictation() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Voice dictation not supported in this browser. Try Chrome on Android or iOS Safari.');
        return;
    }

    if (isRecording) {
        recognition?.stop();
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onstart = () => {
        isRecording = true;
        const btn = document.getElementById('dictateBtn');
        if (btn) { btn.textContent = t('⏹ Stop Dictating'); btn.classList.add('recording'); }
    };

    recognition.onresult = (e) => {
        const textarea = document.getElementById('workNotes');
        if (!textarea) return;
        const transcript = Array.from(e.results).map(r => r[0].transcript).join(' ');
        textarea.value = (textarea.value ? textarea.value + ' ' : '') + transcript;
    };

    recognition.onend = () => {
        isRecording = false;
        const btn = document.getElementById('dictateBtn');
        if (btn) { btn.textContent = t('🎤 Dictate'); btn.classList.remove('recording'); }
    };

    recognition.onerror = (e) => {
        warn('Speech error:', e.error);
        isRecording = false;
        const btn = document.getElementById('dictateBtn');
        if (btn) { btn.textContent = t('🎤 Dictate'); btn.classList.remove('recording'); }
    };

    recognition.start();
}

// ── Sign Out ──────────────────────────────────────────────────
async function signOut() {
    localStorage.removeItem('prvs_user_identity');
    localStorage.removeItem('prvs_checkin_user');
    localStorage.removeItem('prvs_raw_nonce');
    currentUser = null;
    activeSession = null;
    supabaseSession = null;
    if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
    try { await getSB().auth.signOut(); } catch(e) { /* ignore */ }
    showSignIn();
}

// ── Helpers ───────────────────────────────────────────────────
function escapeHtml(unsafe) {
    if (unsafe === null || unsafe === undefined) return '';
    return String(unsafe)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
}

function showLoading(msg = 'Loading...') {
    document.getElementById('app').innerHTML = `<div class="loading">⏳ ${msg}</div>`;
}

function showError(msg) {
    document.getElementById('app').innerHTML = `<div class="error">❌ ${msg}</div>`;
}

// GH#33 Phase 4 — toast for the BEFORE INSERT trigger auto-close. Tells the
// tech that a prior session was just closed for them so the new clock-in
// could proceed. Self-dismissing after 6s; tap to dismiss earlier.
function showAutoCloseToast(prevROLabel) {
    const existing = document.getElementById('autoCloseToast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.id = 'autoCloseToast';
    toast.onclick = () => toast.remove();
    toast.style.cssText = 'position:fixed;top:16px;left:16px;right:16px;z-index:10080;background:linear-gradient(135deg,#7c2d12,#b45309);color:#fef3c7;padding:14px 16px;border:1px solid #f59e0b;border-radius:10px;font-size:14px;line-height:1.4;box-shadow:0 8px 24px rgba(0,0,0,0.4);cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,sans-serif;';
    toast.innerHTML = `<strong>⚠ ${escapeHtml(t('Auto-closed prior session'))}</strong><div style="margin-top:4px;font-size:13px;opacity:0.95;">${escapeHtml(t('You were still clocked in to:'))} <strong>${escapeHtml(prevROLabel)}</strong></div><div style="margin-top:6px;font-size:11px;opacity:0.7;">${escapeHtml(t('(tap to dismiss)'))}</div>`;
    document.body.appendChild(toast);
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
}

    <div style="background:#1a1a2e;border-radius:16px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid #fbbf24;box-shadow:0 0 40px rgba(251,191,36,0.2);">
        <div style="background:linear-gradient(135deg,#f59e0b,#d97706);padding:18px 24px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center;">
            <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:28px;">🪔</span><div><h2 style="margin:0;font-size:1.2rem;color:#1a1a2e;font-family:'Barlow Condensed',sans-serif;font-weight:700;">Make a Wish</h2><p style="margin:0;font-size:0.75rem;color:#451a03;">Submit an Enhancement Request</p></div></div>
            <button onclick="closeERModal()" style="background:none;border:none;color:#1a1a2e;font-size:1.5rem;cursor:pointer;font-weight:700;line-height:1;">&times;</button>
        </div>
        <div style="padding:20px 24px;">
            <label style="display:block;color:#fbbf24;font-size:0.8rem;font-weight:600;margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;">CATEGORY</label>
            <select id="erCategory" style="width:100%;padding:10px 12px;background:#0f172a;color:white;border:1px solid #334155;border-radius:8px;font-size:0.95rem;margin-bottom:16px;font-family:'Barlow Condensed',sans-serif;">
                <option value="RO Management">RO Management</option><option value="Parts & Ordering">Parts &amp; Ordering</option><option value="Work Orders">Work Orders</option><option value="Time Clock / Check-In" selected>Time Clock / Check-In</option><option value="Calendar">Calendar</option><option value="Work List">Work List</option><option value="Notifications / Email">Notifications / Email</option><option value="General UI/UX">General UI/UX</option><option value="New Feature Idea">New Feature Idea</option><option value="Bug Report">Bug Report</option>
            </select>
            <label style="display:block;color:#fbbf24;font-size:0.8rem;font-weight:600;margin-bottom:6px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;">DESCRIBE YOUR WISH</label>
            <textarea id="erDescription" placeholder="What would you like to see improved or added?" style="width:100%;min-height:120px;padding:12px;background:#0f172a;color:white;border:1px solid #334155;border-radius:8px;font-size:0.95rem;resize:vertical;font-family:'Barlow Condensed',sans-serif;box-sizing:border-box;"></textarea>
            <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
                <button onclick="startERDictation()" style="background:#1e3a5f;color:#93c5fd;border:1px solid #334155;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:0.85rem;font-family:'Barlow Condensed',sans-serif;display:flex;align-items:center;gap:6px;"><span style="font-size:1.1rem;">🎤</span> Voice Dictation</button>
                <span id="erDictationStatus" style="font-size:0.8rem;color:#6b7280;"></span>
            </div>
            <button onclick="submitEnhancementRequest()" style="width:100%;margin-top:20px;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e;border:none;border-radius:10px;font-size:1.05rem;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;">✨ Submit Wish</button>
        </div>
    </div>
</div>
<script>
function openERModal(){document.getElementById('erModalOverlay').style.display='flex';document.getElementById('erDescription').value='';document.getElementById('erDictationStatus').textContent='';}
function closeERModal(){document.getElementById('erModalOverlay').style.display='none';}
function startERDictation(){if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Voice dictation not supported. Use Chrome or Safari.');return;}const SR=window.SpeechRecognition||window.webkitSpeechRecognition;const r=new SR();r.continuous=false;r.interimResults=false;r.lang='en-US';const s=document.getElementById('erDictationStatus'),inp=document.getElementById('erDescription');r.onstart=()=>{if(s){s.textContent='🎤 Listening...';s.style.color='#10b981';}};r.onresult=(e)=>{const t=e.results[0][0].transcript;if(inp){inp.value=inp.value?inp.value+' '+t:t;}if(s){s.textContent='✅ Transcribed!';s.style.color='#10b981';setTimeout(()=>{s.textContent='';},3000);}};r.onerror=(e)=>{if(s){s.textContent='❌ Error: '+e.error;s.style.color='#dc2626';setTimeout(()=>{s.textContent='';},3000);}};r.onend=()=>{if(s&&s.textContent.includes('Listening'))s.textContent='';};r.start();}
async function submitEnhancementRequest(){const desc=document.getElementById('erDescription').value.trim();const cat=document.getElementById('erCategory').value;if(!desc){alert('Please describe your request.');return;}const sb=getSB();if(!sb||!supabaseSession){alert('You must be signed in.');return;}const email=supabaseSession.user?.email||'unknown';const name=currentUser?.name||supabaseSession.user?.user_metadata?.full_name||email;try{const{error}=await sb.from('enhancement_requests').insert({submitted_by:email,submitted_by_name:name,source_page:'checkin',category:cat,description:desc});if(error)throw error;closeERModal();const toast=document.createElement('div');toast.style.cssText='position:fixed;bottom:90px;left:24px;z-index:10051;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e;padding:12px 20px;border-radius:10px;font-weight:700;font-family:Barlow Condensed,sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.3);';toast.textContent='🪔 Wish submitted! Roland will review it.';document.body.appendChild(toast);setTimeout(()=>{toast.style.opacity='0';toast.style.transition='opacity 0.3s';setTimeout(()=>toast.remove(),300);},4000);}catch(err){console.error('ER submit error:',err);alert('Error: '+(err.message||err));}}
</script>
</body>
</html>
